    function renderContractList(search) {
      const list = document.getElementById('mat-contract-list');
      const q = (search || '').toLowerCase();
      const filtered = contractsCache.filter(c => {
        if (!q) return true;
        const name = (c.name || '').toLowerCase();
        const contractor = (c.contractor_name_en || c.contractor_name_th || '').toLowerCase();
        const ref = (c.external_ref || '').toLowerCase();
        return name.includes(q) || contractor.includes(q) || ref.includes(q);
      });
      if (!filtered.length) {
        list.innerHTML = '<div style="padding:16px;color:#bbb;text-align:center">' + t('ganttContractsNotFound') + '</div>';
        return;
      }
      const fmt = v => { const n = parseFloat(v?.value ?? v ?? 0); return isNaN(n) ? '—' : n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); };
      list.innerHTML = filtered.map(c => {
        const isSel = matMode === 'whole' ? selectedContractIds.has(c.id) : c.id === selectedContractId;
        const contractor = c.contractor_name_en || c.contractor_name_th || '—';
        return `<div class="contract-pick-row${isSel ? ' selected' : ''}" data-contract-id="${c.id}">
          ${matMode === 'whole' ? `<span style="font-size:1rem;width:20px;text-align:center">${isSel ? '☑' : '☐'}</span>` : ''}
          <div class="c-name">${c.name || c.external_ref || c.id.substring(0,8)}</div>
          <div class="c-contractor">${contractor}</div>
          <div class="c-amount">${fmt(c.total_amount)}</div>
          <span class="badge" style="font-size:0.68rem">${c.status || '—'}</span>
        </div>`;
      }).join('');
      // Show selected count for whole mode
      if (matMode === 'whole' && selectedContractIds.size > 0) {
        list.insertAdjacentHTML('beforeend', `<div style="padding:8px 14px;font-size:0.78rem;color:#1a73e8;font-weight:600;border-top:1px solid #e8e8e8">${t('ganttSelected')}: ${selectedContractIds.size}</div>`);
      }

    function openContractPicker(mode) {

    // ─── Procurement view ───

    function renderProcurement() {
      const filtersEl = document.getElementById('proc-filters');
      const tableWrap = document.getElementById('proc-table-wrap');

      // Filter pills
      const counts = { all: 0, red: 0, yellow: 0, purple: 0 };
      allMaterialReqs.forEach(m => {
        const ds = m.line_item_id ? (allDeliverySchedules[m.line_item_id] || []) : (m.contract_id ? (allDeliverySchedules['c_' + m.contract_id] || []) : []);
        const risk = computeRisk(m, ds, getTaskStartForMat(m));
        counts.all++;
        if (risk.color === 'red') counts.red++;
        if (risk.color === 'yellow') counts.yellow++;
        if (risk.color === 'purple') counts.purple++;
      });

      filtersEl.innerHTML = [
        { key: 'all', label: `All (${counts.all})` },
        { key: 'red', label: `🔴 Late (${counts.red})` },
        { key: 'yellow', label: `🟡 Order now (${counts.yellow})` },
        { key: 'purple', label: `🟣 No contract (${counts.purple})` },
      ].map(f => `<button class="proc-filter-pill ${procFilterColor === f.key ? 'active' : ''}" data-proc-filter="${f.key}">${f.label}</button>`).join('');

      filtersEl.querySelectorAll('.proc-filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          procFilterColor = btn.dataset.procFilter;
          renderProcurement();
        });
      });

      // Table
      let rows = allMaterialReqs.map(m => {
        const ds = m.line_item_id ? (allDeliverySchedules[m.line_item_id] || []) : (m.contract_id ? (allDeliverySchedules['c_' + m.contract_id] || []) : []);
        const risk = computeRisk(m, ds, getTaskStartForMat(m));
        const needBy = m.required_by_date ? new Date(m.required_by_date.value || m.required_by_date) : null;
        let worstETA = null;
        ds.forEach(d => {
          const lc = computeLifecycle(d);
          if (lc !== 'on_site' && lc !== 'installed') {
            const eta = computeETA(d);
            if (!worstETA || eta > worstETA) worstETA = eta;
          }
        });
        const margin = (needBy && worstETA) ? Math.round((needBy - worstETA) / 86400000) : null;
        const lcAgg = ds.length ? computeLifecycle(ds[0]) : '—';
        return { m, risk, needBy, worstETA, margin, lcAgg, ds };
      });

      if (procFilterColor !== 'all') {
        rows = rows.filter(r => r.risk.color === procFilterColor);
      }

      if (!rows.length) {
        tableWrap.innerHTML = '<div style="text-align:center;padding:32px;color:#bbb">' + t('ganttNoMaterials') + '</div>';
        return;
      }

      let html = `<table class="proc-table"><thead><tr>
        <th>${t('ganttMaterials')}</th><th>${t('contract')}</th><th>Lifecycle</th><th>Need by</th><th>ETA</th><th>Margin</th><th>Risk</th>
      </tr></thead><tbody>`;

      rows.forEach(r => {
        const m = r.m;
        const name = m.line_item_id ? (m.contract_item_name || m.contract_item_description || '—') : `<span style="color:#8b5cf6">SLOT</span> ${m.category || '—'}`;
        const contract = m.contractor_name || '—';
        const lc = r.ds.length ? lifecycleLabels[computeLifecycle(r.ds[0])] || computeLifecycle(r.ds[0]) : '—';
        const needByStr = r.needBy ? fmtDateDMY(r.needBy) : '—';
        const etaStr = r.worstETA ? fmtDateDMY(r.worstETA) : '—';
        const marginStr = r.margin !== null ? (r.margin >= 0 ? `+${r.margin}d` : `${r.margin}d`) : '—';
        const marginColor = r.margin !== null ? (r.margin < 0 ? 'color:#ef4444' : (r.margin < 7 ? 'color:#f59e0b' : 'color:#10b981')) : '';

        html += `<tr>
          <td>${name}<div style="color:#999;font-size:11px">${m.task_name || ''}</div></td>
          <td>${contract}</td>
          <td>${lc}</td>
          <td>${needByStr}</td>
          <td>${etaStr}</td>
          <td style="${marginColor};font-weight:600">${marginStr}</td>
          <td><span class="proc-pill ${r.risk.color}">${r.risk.label}</span></td>
        </tr>`;
      });

      html += '</tbody></table>';
      tableWrap.innerHTML = html;

    function exportExcel() {

      const wb = XLSX.utils.book_new();

    function printGantt() {
      if (!tasksData.length && !phasesData.length) return;

      const folder = foldersCache.find(f => f.id === filterFolder);
      const company = companiesCache.find(c => c.id === filterCompany);
      const projectName = folder ? folder.name : '';
      const companyName = company ? company.name : '';
      const dayW = 5; // slightly smaller for print
      const rowH = 32;

      // Calculate date range
      let minDate = null, maxDate = null;
      tasksData.forEach(t => {
        const s = t.planned_start ? new Date(t.planned_start.value || t.planned_start) : null;
        const endRaw = t.planned_end || t._computed_end;
        const e = endRaw ? new Date(endRaw.value || endRaw) : null;
        if (s && (!minDate || s < minDate)) minDate = s;
        if (e && (!maxDate || e > maxDate)) maxDate = e;
        if (s && !e && (!maxDate || s > maxDate)) maxDate = s;
      });
      if (!minDate) minDate = new Date();
      if (!maxDate) maxDate = new Date();
      const startDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
      const endDate = new Date(maxDate.getFullYear(), maxDate.getMonth() + 2, 0);
      const totalDays = Math.ceil((endDate - startDate) / 86400000);
      const totalW = totalDays * dayW;
      const today = new Date(); today.setHours(0,0,0,0);
      const pDayOffset = d => Math.round((new Date(d) - startDate) / 86400000);

      // Build rows
      const rows = [];
      phasesData.forEach(phase => {
        rows.push({ type: 'phase', data: phase });
        tasksData.filter(t => t.phase_id === phase.id)
          .sort((a, b) => (b.sort_order || 0) - (a.sort_order || 0))
          .forEach(task => { rows.push({ type: 'task', data: task }); });
      });

      // Month headers
      let monthsHTML = '';
      let cursor = new Date(startDate);
      const langLocale = currentLang === 'ru' ? 'ru-RU' : (currentLang === 'th' ? 'th-TH' : 'en-GB');
      while (cursor < endDate) {
        const next = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
        const span = Math.min(Math.ceil((next - cursor) / 86400000), totalDays - pDayOffset(cursor));
        if (span <= 0) break;
        const label = cursor.toLocaleDateString(langLocale, { month: 'short', year: '2-digit' });
        monthsHTML += `<div style="display:inline-block;width:${span * dayW}px;text-align:center;font-size:9px;font-weight:600;border-right:1px solid #ddd;line-height:20px">${label}</div>`;
        cursor = next;
      }

      // Today line
      const todayOff = pDayOffset(today);
      const todayLine = (todayOff >= 0 && todayOff <= totalDays)
        ? `<div style="position:absolute;top:0;bottom:0;left:${todayOff * dayW}px;width:1.5px;background:#ef4444;z-index:5"></div>` : '';

      // Task rows
      let leftRows = '', rightRows = '';
      rows.forEach(row => {
        if (row.type === 'phase') {
          const p = row.data;
          const name = p['name_' + currentLang] || p.name || p.name_en || '—';
          leftRows += `<div style="height:${rowH}px;padding:0 8px;display:flex;align-items:center;font-weight:700;font-size:9px;color:#666;text-transform:uppercase;letter-spacing:0.5px;background:#dee1fc;border-bottom:1px solid #e8e8e8">${name}</div>`;
          rightRows += `<div style="height:${rowH}px;background:#dee1fc;border-bottom:1px solid #e8e8e8"></div>`;
        } else {
          const tk = row.data;
          const name = tk['name_' + currentLang] || tk.name || tk.name_en || '—';
          const s = tk.planned_start ? new Date(tk.planned_start.value || tk.planned_start) : null;
          const endRaw = tk.planned_end || tk._computed_end;
          const e = endRaw ? new Date(endRaw.value || endRaw) : null;
          const dur = tk.duration_days || '';
          const startStr = s ? fmtDateDMY(s) : '';

          leftRows += `<div style="height:${rowH}px;padding:0 8px;display:flex;align-items:center;gap:6px;font-size:10px;border-bottom:1px solid #f0f0f0">
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
            <span style="color:#999;font-size:9px;white-space:nowrap">${startStr}${dur ? ' · ' + dur + 'd' : ''}</span>
          </div>`;

          let barHTML = '';
          if (s) {
            const barEnd = e || s;
            const left = pDayOffset(s) * dayW;
            const width = Math.max((pDayOffset(barEnd) - pDayOffset(s) + 1) * dayW, 3);
            const critical = tk.is_critical ? 'box-shadow:0 0 0 1.5px #ef4444;' : '';
            barHTML = `<div style="position:absolute;height:${rowH * 0.55}px;top:${rowH * 0.22}px;left:${left}px;width:${width}px;border-radius:3px;background:#10b981;${critical}">
              <span style="position:absolute;left:4px;top:50%;transform:translateY(-50%);color:#fff;font-size:8px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${width - 8}px">${name}</span>
            </div>`;
          }
          rightRows += `<div style="height:${rowH}px;position:relative;border-bottom:1px solid #f0f0f0">${barHTML}</div>`;
        }
      });

      const leftW = 240;
      const printHTML = `<!DOCTYPE html><html><head><title>Gantt — ${projectName}</title>
        <style>
          @page { size: landscape; margin: 10mm; }
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; color: #333; }
          .print-header { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 2px solid #0f4c81; margin-bottom: 12px; }
          .print-title { font-size: 14px; font-weight: 700; color: #0f4c81; }
          .print-sub { font-size: 10px; color: #888; }
          .gantt-print { display: grid; grid-template-columns: ${leftW}px 1fr; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
          .gantt-print-left { border-right: 1px solid #ddd; }
          .gantt-print-right { overflow: hidden; position: relative; }
        </style>
      </head><body>
        <div class="print-header">
          <div class="print-title">SUNTI — ${projectName}</div>
          <div class="print-sub">${companyName} · ${fmtDateDMY(today)}</div>
        </div>
        <div class="gantt-print">
          <div class="gantt-print-left">
            <div style="height:20px;background:#f8f8f8;border-bottom:1px solid #ddd;padding:0 8px;font-size:9px;font-weight:600;color:#888;line-height:20px;text-transform:uppercase">NAME</div>
            ${leftRows}
          </div>
          <div class="gantt-print-right">
            <div style="height:20px;background:#f8f8f8;border-bottom:1px solid #ddd;white-space:nowrap">${monthsHTML}</div>
            <div style="position:relative;width:${totalW}px">
              ${todayLine}
              ${rightRows}
            </div>
          </div>
        </div>
        <script>setTimeout(() => window.print(), 300)<\/script>
      </body></html>`;

      const w = window.open('', '_blank');
      w.document.write(printHTML);
      w.document.close();
    }

    // ─── Init ───

    window.onLogin = async () => {
      updateTexts();
      await loadRefs();
    };
    window.onLogout = () => { updateTexts(); };
    window.onLangChange = () => {
      updateTexts();
      if (tasksData.length) renderGantt();
    };

    renderHeader('gantt');
    updateTexts();
  </script>
</body>
</html>
