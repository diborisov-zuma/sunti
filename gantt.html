<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunti — Gantt</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="_i18n.js"></script>
<script src="_config.js"></script>
<script src="_auth.js"></script>
<script src="_header.js"></script>
<style>
  :root {
    --gantt-bg: #f5f7fa;
    --gantt-card: #ffffff;
    --gantt-border: #e2e8f0;
    --gantt-text: #0f172a;
    --gantt-muted: #64748b;
    --gantt-primary: #0f4c81;
    --gantt-green: #10b981;
    --gantt-yellow: #f59e0b;
    --gantt-red: #ef4444;
    --gantt-purple: #8b5cf6;
    --gantt-grey: #94a3b8;
    --row-h: 40px;
    --day-w: 6px;
    --left-w: 300px;
  }

  .gantt-page { padding: 16px 24px; }

  .gantt-toolbar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .gantt-toolbar h2 { font-size: 1.1rem; color: #222; }
  .gantt-toolbar .spacer { flex: 1; }
  .gantt-toolbar .legend { display: flex; gap: 14px; align-items: center; font-size: 11px; color: var(--gantt-muted); }
  .gantt-toolbar .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  select.filter-select {
    border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; color: #333; outline: none; background: #fff;
  }

  .gantt-wrap {
    background: var(--gantt-card);
    border: 1px solid var(--gantt-border);
    border-radius: 8px;
    overflow: hidden;
    display: grid;
    grid-template-columns: var(--left-w) 1fr;
  }
  .gantt-left { border-right: 1px solid var(--gantt-border); overflow: hidden; }
  .gantt-right { overflow-x: auto; overflow-y: hidden; }
  .gantt-right-inner { position: relative; }

  .gantt-header-row {
    background: #fafbfc;
    border-bottom: 1px solid var(--gantt-border);
    font-size: 11px;
    color: var(--gantt-muted);
    height: 50px;
  }
  .gantt-left .gantt-header-row {
    padding: 16px 16px 0 16px;
    font-weight: 600;
    font-size: 12px;
    color: var(--gantt-text);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .month-row { display: flex; height: 24px; border-bottom: 1px solid var(--gantt-border); }
  .month-cell { text-align: center; line-height: 24px; border-right: 1px solid var(--gantt-border); font-weight: 600; color: var(--gantt-text); font-size: 11px; }
  .week-row { display: flex; height: 26px; }
  .week-cell { text-align: center; line-height: 26px; border-right: 1px solid #f1f5f9; font-size: 10px; color: var(--gantt-muted); }

  .task-row {
    height: var(--row-h);
    padding: 0 16px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #f1f5f9;
    cursor: pointer;
    gap: 8px;
    font-size: 13px;
  }
  .task-row:hover { background: #f8fafc; }
  .task-row.active { background: #eff6ff; }
  .task-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-row .badge {
    font-size: 10px; padding: 2px 6px; border-radius: 10px;
    background: #e2e8f0; color: var(--gantt-muted); font-weight: 600;
  }
  .task-row .badge.red { background: #fee2e2; color: #991b1b; }
  .task-row .badge.yellow { background: #fef3c7; color: #92400e; }
  .task-row .badge.empty { background: #ede9fe; color: #6d28d9; border: 1px dashed var(--gantt-purple); }
  .task-row.phase {
    background: #f8fafc; font-weight: 700; text-transform: uppercase;
    font-size: 11px; color: var(--gantt-muted); letter-spacing: 0.5px;
  }

  .bar-row { height: var(--row-h); position: relative; border-bottom: 1px solid #f1f5f9; }
  .bar-row.phase { background: #f8fafc; }
  .bar {
    position: absolute; height: 20px; top: 10px; border-radius: 4px;
    cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); transition: transform 0.1s;
    background: linear-gradient(135deg, var(--gantt-green), #059669);
  }
  .bar:hover { transform: scaleY(1.15); }
  .bar.critical { box-shadow: 0 0 0 2px var(--gantt-red), 0 1px 4px rgba(239,68,68,0.4); }
  .bar .bar-label {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    color: white; font-size: 11px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 16px);
    text-shadow: 0 1px 1px rgba(0,0,0,0.2);
  }

  .today-line {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--gantt-red); pointer-events: none; z-index: 10;
  }
  .today-label {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    background: var(--gantt-red); color: white; padding: 2px 6px;
    font-size: 10px; border-radius: 3px; white-space: nowrap; font-weight: 600;
  }

  .empty-state { text-align: center; padding: 64px 24px; color: #bbb; }
  .loading { text-align: center; padding: 48px; color: #bbb; }
</style>
</head>
<body>
  <header id="header"></header>

  <div id="guest-view">
    <h2 id="t-guest-title"></h2>
    <p id="t-guest-sub"></p>
  </div>

  <div id="app-view" style="display:none">
    <div class="gantt-page">
      <div class="gantt-toolbar">
        <h2 id="t-page-title">Gantt</h2>
        <select class="filter-select" id="filter-company"><option value="">—</option></select>
        <select class="filter-select" id="filter-folder"><option value="">—</option></select>
        <button class="btn btn-primary" id="btn-add-phase" style="display:none;font-size:0.82rem;padding:5px 12px">+ Phase</button>
        <div class="spacer"></div>
        <div class="legend">
          <span><span class="dot" style="background:var(--gantt-green)"></span>On track</span>
          <span><span class="dot" style="background:var(--gantt-yellow)"></span>At risk</span>
          <span><span class="dot" style="background:var(--gantt-red)"></span>Late</span>
          <span><span class="dot" style="background:var(--gantt-purple)"></span>Slot empty</span>
        </div>
      </div>

      <div id="gantt-container">
        <div class="empty-state" id="gantt-empty">Выберите компанию и проект</div>
      </div>
    </div>
  </div>

  <!-- Modal: phase -->
  <div class="modal-overlay" id="modal-phase">
    <div class="modal" style="width:500px;max-width:95vw">
      <h3 id="t-modal-phase-title">Phase</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="field-group"><label>RU</label><input type="text" id="g-ph-name"></div>
        <div class="field-group"><label>EN</label><input type="text" id="g-ph-name-en"></div>
        <div class="field-group"><label>TH</label><input type="text" id="g-ph-name-th"></div>
      </div>
      <div class="field-group"><label>Sort order</label><input type="number" id="g-ph-sort" min="0" value="0"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-gph-cancel"></button>
        <button class="btn btn-primary" id="btn-gph-save"></button>
      </div>
    </div>
  </div>

  <!-- Modal: task -->
  <div class="modal-overlay" id="modal-task">
    <div class="modal" style="width:900px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column">
      <h3 id="t-modal-task-title" style="padding:16px 20px 0;margin:0">Task</h3>
      <div style="padding:0 20px 20px;overflow-y:auto;flex:1">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:12px">
          <div class="field-group"><label>RU</label><input type="text" id="g-tk-name"></div>
          <div class="field-group"><label>EN</label><input type="text" id="g-tk-name-en"></div>
          <div class="field-group"><label>TH</label><input type="text" id="g-tk-name-th"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="field-group"><label>Start</label><input type="date" id="g-tk-start"></div>
          <div class="field-group"><label>Duration (days)</label><input type="number" id="g-tk-dur" min="1" value="14"></div>
          <div class="field-group"><label>Sort order</label><input type="number" id="g-tk-sort" min="0" value="0"></div>
        </div>
        <div class="field-group" style="margin-top:4px">
          <label><input type="checkbox" id="g-tk-critical" style="width:auto;margin-right:6px">Critical path</label>
        </div>

        <!-- Materials section -->
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid #e8e8e8">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <h4 style="font-size:0.85rem;color:#555;margin:0;text-transform:uppercase;letter-spacing:0.5px">Материалы</h4>
            <div style="display:flex;gap:6px">
              <button class="btn btn-primary" style="font-size:0.78rem;padding:4px 10px" id="btn-add-mat-contract">+ Из контракта</button>
              <button class="btn btn-outline" style="font-size:0.78rem;padding:4px 10px;color:#8b5cf6;border-color:#8b5cf6" id="btn-add-mat-slot">+ Слот</button>
            </div>
          </div>
          <div id="task-materials-list"></div>
        </div>
      </div>
      <div class="modal-actions" style="padding:12px 20px;border-top:1px solid #e8e8e8;margin:0">
        <button class="btn btn-outline" id="btn-gtk-cancel"></button>
        <button class="btn btn-primary" id="btn-gtk-save"></button>
      </div>
    </div>
  </div>

  <!-- Modal: add material from contract -->
  <div class="modal-overlay" id="modal-mat-contract">
    <div class="modal" style="width:700px;max-width:95vw">
      <h3 style="padding:16px 20px 0;margin:0">Привязать позицию контракта</h3>
      <div style="padding:12px 20px 20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field-group">
            <label>Контракт</label>
            <select id="mat-contract-select"><option value="">— Выберите контракт —</option></select>
          </div>
          <div class="field-group">
            <label>Позиция</label>
            <select id="mat-lineitem-select"><option value="">— Выберите позицию —</option></select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="field-group"><label>Кол-во</label><input type="number" id="mat-qty" min="0" step="0.01"></div>
          <div class="field-group"><label>Ед. изм.</label><input type="text" id="mat-unit" placeholder="м³, шт, м²"></div>
          <div class="field-group"><label>Нужно к дате</label><input type="date" id="mat-required-by"></div>
        </div>
        <div class="field-group"><label>Примечание</label><input type="text" id="mat-notes"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" id="btn-mat-contract-cancel">Отмена</button>
          <button class="btn btn-primary" id="btn-mat-contract-save">Привязать</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: add slot -->
  <div class="modal-overlay" id="modal-mat-slot">
    <div class="modal" style="width:500px;max-width:95vw">
      <h3 style="padding:16px 20px 0;margin:0">Создать слот (без контракта)</h3>
      <div style="padding:12px 20px 20px">
        <div class="field-group"><label>Категория / что нужно</label><input type="text" id="slot-category" placeholder="Bathroom suite, Kitchen appliances..."></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="field-group"><label>Кол-во</label><input type="number" id="slot-qty" min="0" step="0.01"></div>
          <div class="field-group"><label>Ед. изм.</label><input type="text" id="slot-unit" placeholder="шт, м²"></div>
          <div class="field-group"><label>Нужно к дате</label><input type="date" id="slot-required-by"></div>
        </div>
        <div class="field-group"><label>Примечание</label><input type="text" id="slot-notes"></div>
        <div class="modal-actions">
          <button class="btn btn-outline" id="btn-mat-slot-cancel">Отмена</button>
          <button class="btn btn-primary" id="btn-mat-slot-save">Создать слот</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <style>
    .field-group { margin-bottom:12px; }
    .field-group label { display:block;font-size:0.82rem;color:#666;margin-bottom:4px; }
    .field-group input, .field-group select { width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:0.9rem;outline:none;box-sizing:border-box;background:#fff; }
    .field-group input:focus, .field-group select:focus { border-color:#1a73e8; }
    .phase-add-btn {
      background:none;border:none;cursor:pointer;font-size:11px;color:var(--gantt-primary);
      font-weight:600;padding:2px 8px;margin-left:auto;opacity:0.7;
    }
    .phase-add-btn:hover { opacity:1; }
  </style>

  <script>
    let companiesCache = [];
    let foldersCache = [];
    let phasesData = [];
    let tasksData = [];
    let depsData = [];
    let filterCompany = '';
    let filterFolder = '';
    let editPhaseId = null;
    let editTaskId = null;
    let editTaskPhaseId = null;
    let taskMaterials = [];
    let contractsCache = [];
    let contractItemsCache = {}; // contract_id → items[]

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 3000);
    }

    function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

    function updateTexts() {
      setText('t-guest-title', t('guestTitle'));
      setText('t-guest-sub', t('guestSub'));
      setText('t-page-title', 'Gantt');
      setText('btn-gph-cancel', t('cancel'));
      setText('btn-gph-save', t('save'));
      setText('btn-gtk-cancel', t('cancel'));
      setText('btn-gtk-save', t('save'));
      updateHeaderTexts();
    }

    // ─── Filters ───

    async function loadRefs() {
      const [companies, folders] = await Promise.all([
        apiFetch('/companies').catch(() => []),
        apiFetch('/folders').catch(() => []),
      ]);
      companiesCache = companies;
      foldersCache = folders;
      fillCompanyFilter();
    }

    function fillCompanyFilter() {
      const sel = document.getElementById('filter-company');
      sel.innerHTML = `<option value="">${t('selectCompanyFirst')}</option>`;
      companiesCache.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name;
        sel.appendChild(opt);
      });
    }

    function fillFolderFilter() {
      const sel = document.getElementById('filter-folder');
      sel.innerHTML = `<option value="">— ${t('allFolders')} —</option>`;
      const list = filterCompany ? foldersCache.filter(f => f.company_id === filterCompany) : foldersCache;
      list.forEach(f => {
        if (f.is_template) return;
        const opt = document.createElement('option');
        opt.value = f.id; opt.textContent = f.name;
        sel.appendChild(opt);
      });
    }

    document.getElementById('filter-company').addEventListener('change', e => {
      filterCompany = e.target.value;
      filterFolder = '';
      fillFolderFilter();
      document.getElementById('gantt-container').innerHTML = '<div class="empty-state">Выберите проект</div>';
    });

    document.getElementById('filter-folder').addEventListener('change', e => {
      filterFolder = e.target.value;
      document.getElementById('btn-add-phase').style.display = filterFolder ? '' : 'none';
      if (filterFolder) loadGanttData();
      else document.getElementById('gantt-container').innerHTML = '<div class="empty-state">Выберите проект</div>';
    });

    // ─── Load data ───

    async function loadGanttData() {
      const container = document.getElementById('gantt-container');
      container.innerHTML = '<div class="loading">Загрузка…</div>';
      try {
        const [phases, tasks, deps] = await Promise.all([
          apiFetch(`/phases?folder_id=${filterFolder}`),
          apiFetch(`/gantt_tasks?folder_id=${filterFolder}`),
          apiFetch(`/task_dependencies?folder_id=${filterFolder}`),
        ]);
        phasesData = phases;
        tasksData = tasks;
        depsData = deps;
        renderGantt();
      } catch(e) {
        container.innerHTML = `<div class="empty-state" style="color:#c33">${e.message}</div>`;
      }
    }

    // ─── Render Gantt ───

    function renderGantt() {
      const container = document.getElementById('gantt-container');

      if (!tasksData.length && !phasesData.length) {
        container.innerHTML = '<div class="empty-state">Нет задач. Добавьте фазу кнопкой "+ Phase"</div>';
        return;
      }

      // Build rows: interleave phases and their tasks
      const rows = [];
      phasesData.forEach(phase => {
        rows.push({ type: 'phase', data: phase });
        tasksData.filter(t => t.phase_id === phase.id).forEach(task => {
          rows.push({ type: 'task', data: task });
        });
      });
      const orphanTasks = tasksData.filter(t => !phasesData.some(p => p.id === t.phase_id));
      orphanTasks.forEach(task => rows.push({ type: 'task', data: task }));

      // Calculate date range
      let minDate = null, maxDate = null;
      tasksData.forEach(t => {
        const s = t.planned_start ? new Date(t.planned_start.value || t.planned_start) : null;
        const e = t.planned_end ? new Date(t.planned_end.value || t.planned_end) : null;
        if (s && (!minDate || s < minDate)) minDate = s;
        if (e && (!maxDate || e > maxDate)) maxDate = e;
      });

      if (!minDate || !maxDate) {
        // Show phases and tasks as list without chart
        let listHTML = '<div class="gantt-wrap" style="grid-template-columns:1fr"><div class="gantt-left" style="border:none">';
        listHTML += `<div class="gantt-header-row">${t('name')}</div>`;
        rows.forEach(row => {
          if (row.type === 'phase') {
            const p = row.data;
            const name = p['name_' + currentLang] || p.name || p.name_en || '—';
            listHTML += `<div class="task-row phase"><span class="name">${name}</span>
              <button class="phase-add-btn" data-action="add-task" data-phase-id="${p.id}" title="+ Task">+</button></div>`;
          } else {
            const tk = row.data;
            const name = tk['name_' + currentLang] || tk.name || tk.name_en || '—';
            listHTML += `<div class="task-row" data-action="edit-task" data-id="${tk.id}" data-phase-id="${tk.phase_id}">
              <span class="name">${name}</span><span style="color:#bbb;font-size:0.78rem">${tk.duration_days || '—'}д</span></div>`;
          }
        });
        listHTML += '</div></div>';
        container.innerHTML = listHTML;
        return;
      }

      // Add padding: 1 month before, 1 month after
      const startDate = new Date(minDate.getFullYear(), minDate.getMonth() - 1, 1);
      const endDate = new Date(maxDate.getFullYear(), maxDate.getMonth() + 2, 0);
      const totalDays = Math.ceil((endDate - startDate) / 86400000);
      const dayW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--day-w'));
      const totalW = totalDays * dayW;

      const today = new Date();
      today.setHours(0,0,0,0);

      function dayOffset(date) {
        return Math.round((new Date(date) - startDate) / 86400000);
      }

      // Left panel
      let leftHTML = `<div class="gantt-left"><div class="gantt-header-row">${t('name')}</div>`;
      rows.forEach(row => {
        if (row.type === 'phase') {
          const p = row.data;
          const name = p['name_' + currentLang] || p.name || p.name_en || '—';
          leftHTML += `<div class="task-row phase">
            <span class="name">${name}</span>
            <button class="phase-add-btn" data-action="add-task" data-phase-id="${p.id}" title="+ Task">+</button>
          </div>`;
        } else {
          const tk = row.data;
          const name = tk['name_' + currentLang] || tk.name || tk.name_en || '—';
          leftHTML += `<div class="task-row" data-task-id="${tk.id}" data-action="edit-task" data-id="${tk.id}" data-phase-id="${tk.phase_id}">
            <span class="name">${name}</span>
          </div>`;
        }
      });
      leftHTML += '</div>';

      // Right panel
      let rightHTML = `<div class="gantt-right"><div class="gantt-right-inner" style="width:${totalW}px">`;

      // Month header
      rightHTML += '<div class="gantt-header-row"><div class="month-row">';
      let cursor = new Date(startDate);
      while (cursor < endDate) {
        const next = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
        const spanDays = Math.min(Math.ceil((next - cursor) / 86400000), totalDays - dayOffset(cursor));
        if (spanDays <= 0) break;
        const label = cursor.toLocaleDateString('ru-RU', { month: 'short', year: '2-digit' });
        rightHTML += `<div class="month-cell" style="width:${spanDays * dayW}px">${label}</div>`;
        cursor = next;
      }
      rightHTML += '</div>';

      // Week header
      rightHTML += '<div class="week-row">';
      const weeks = Math.ceil(totalDays / 7);
      for (let i = 0; i < weeks; i++) rightHTML += `<div class="week-cell" style="width:${7 * dayW}px">W${i + 1}</div>`;
      rightHTML += '</div></div>';

      // Today line
      const todayOff = dayOffset(today);
      if (todayOff >= 0 && todayOff <= totalDays) {
        const todayLabel = today.toLocaleDateString('ru-RU', { day: '2-digit', month: 'short' });
        rightHTML += `<div class="today-line" style="left:${todayOff * dayW}px"><div class="today-label">${todayLabel}</div></div>`;
      }

      // Bars
      rows.forEach(row => {
        if (row.type === 'phase') {
          rightHTML += '<div class="bar-row phase"></div>';
          return;
        }
        const tk = row.data;
        const s = tk.planned_start ? new Date(tk.planned_start.value || tk.planned_start) : null;
        const e = tk.planned_end ? new Date(tk.planned_end.value || tk.planned_end) : null;

        rightHTML += '<div class="bar-row">';
        if (s && e) {
          const left = dayOffset(s) * dayW;
          const width = Math.max((dayOffset(e) - dayOffset(s) + 1) * dayW, 4);
          const critical = tk.is_critical ? ' critical' : '';
          const name = tk['name_' + currentLang] || tk.name || tk.name_en || '';
          rightHTML += `<div class="bar${critical}" style="left:${left}px;width:${width}px">
            <div class="bar-label">${name}</div>
          </div>`;
        }
        rightHTML += '</div>';
      });

      rightHTML += '</div></div>';

      container.innerHTML = `<div class="gantt-wrap">${leftHTML}${rightHTML}</div>`;

      // Sync scroll
      const ganttRight = container.querySelector('.gantt-right');
      if (ganttRight && todayOff > 0) {
        const scrollTo = Math.max(0, todayOff * dayW - ganttRight.clientWidth / 3);
        ganttRight.scrollLeft = scrollTo;
      }
    }

    // ─── Actions ───

    document.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'add-task') {
        e.stopPropagation();
        editTaskId = null;
        editTaskPhaseId = btn.dataset.phaseId;
        document.getElementById('g-tk-name').value = '';
        document.getElementById('g-tk-name-en').value = '';
        document.getElementById('g-tk-name-th').value = '';
        document.getElementById('g-tk-start').value = '';
        document.getElementById('g-tk-end').value = '';
        document.getElementById('g-tk-dur').value = '14';
        document.getElementById('g-tk-sort').value = '0';
        document.getElementById('g-tk-critical').checked = false;
        document.getElementById('task-materials-list').innerHTML = '<div style="color:#bbb;font-size:0.82rem">Сначала сохраните задачу</div>';
        contractsCache = [];
        setText('t-modal-task-title', 'New Task');
        openModal('modal-task');
      }

      if (action === 'edit-task') {
        const tk = tasksData.find(t => t.id === btn.dataset.id);
        if (!tk) return;
        editTaskId = tk.id;
        editTaskPhaseId = tk.phase_id;
        document.getElementById('g-tk-name').value = tk.name || '';
        document.getElementById('g-tk-name-en').value = tk.name_en || '';
        document.getElementById('g-tk-name-th').value = tk.name_th || '';
        const ps = tk.planned_start ? (tk.planned_start.value || tk.planned_start) : '';
        document.getElementById('g-tk-start').value = ps ? ps.substring(0,10) : '';
        document.getElementById('g-tk-dur').value = tk.duration_days || 14;
        document.getElementById('g-tk-sort').value = tk.sort_order || 0;
        document.getElementById('g-tk-critical').checked = tk.is_critical === true;
        contractsCache = [];
        setText('t-modal-task-title', 'Edit Task');
        openModal('modal-task');
        loadTaskMaterials(tk.id);
      }
    });

    // + Phase button
    document.getElementById('btn-add-phase').addEventListener('click', () => {
      if (!filterFolder) return;
      editPhaseId = null;
      document.getElementById('g-ph-name').value = '';
      document.getElementById('g-ph-name-en').value = '';
      document.getElementById('g-ph-name-th').value = '';
      document.getElementById('g-ph-sort').value = phasesData.length * 1000;
      setText('t-modal-phase-title', 'New Phase');
      openModal('modal-phase');
    });

    // Phase modal save
    document.getElementById('btn-gph-cancel').addEventListener('click', () => closeModal('modal-phase'));
    document.getElementById('btn-gph-save').addEventListener('click', async () => {
      const name = document.getElementById('g-ph-name').value.trim();
      if (!name) { showToast(t('fillAllFields'), 'error'); return; }
      closeModal('modal-phase');
      try {
        const body = {
          folder_id: filterFolder,
          name,
          name_en: document.getElementById('g-ph-name-en').value.trim(),
          name_th: document.getElementById('g-ph-name-th').value.trim(),
          sort_order: parseInt(document.getElementById('g-ph-sort').value) || 0,
        };
        if (editPhaseId) {
          await apiFetch(`/phases/${editPhaseId}`, { method: 'PUT', body: JSON.stringify(body) });
        } else {
          await apiFetch('/phases', { method: 'POST', body: JSON.stringify(body) });
        }
        showToast(t('saved'), 'success');
        await loadGanttData();
      } catch(e) { showToast(e.message, 'error'); }
    });

    // Task modal save
    document.getElementById('btn-gtk-cancel').addEventListener('click', () => closeModal('modal-task'));
    document.getElementById('btn-gtk-save').addEventListener('click', async () => {
      const name = document.getElementById('g-tk-name').value.trim();
      if (!name) { showToast(t('fillAllFields'), 'error'); return; }
      closeModal('modal-task');
      try {
        const startVal = document.getElementById('g-tk-start').value || '';
        const durDays = parseInt(document.getElementById('g-tk-dur').value) || 14;
        let endVal = '';
        if (startVal) {
          const endDate = new Date(startVal);
          endDate.setDate(endDate.getDate() + durDays);
          endVal = endDate.toISOString().substring(0, 10);
        }
        const body = {
          phase_id: editTaskPhaseId,
          name,
          name_en: document.getElementById('g-tk-name-en').value.trim(),
          name_th: document.getElementById('g-tk-name-th').value.trim(),
          planned_start: startVal,
          planned_end: endVal,
          duration_days: durDays,
          sort_order: parseInt(document.getElementById('g-tk-sort').value) || 0,
          is_critical: document.getElementById('g-tk-critical').checked,
        };
        if (editTaskId) {
          await apiFetch(`/gantt_tasks/${editTaskId}`, { method: 'PUT', body: JSON.stringify(body) });
        } else {
          await apiFetch('/gantt_tasks', { method: 'POST', body: JSON.stringify(body) });
        }
        showToast(t('saved'), 'success');
        await loadGanttData();
      } catch(e) { showToast(e.message, 'error'); }
    });

    // ─── Task materials ───

    async function loadTaskMaterials(taskId) {
      const list = document.getElementById('task-materials-list');
      if (!taskId) { list.innerHTML = '<div style="color:#bbb;font-size:0.82rem">Сначала сохраните задачу</div>'; return; }
      try {
        taskMaterials = await apiFetch(`/material_requirements?task_id=${taskId}`);
        renderTaskMaterials();
      } catch(e) { list.innerHTML = `<div style="color:#c33;font-size:0.82rem">${e.message}</div>`; }
    }

    function renderTaskMaterials() {
      const list = document.getElementById('task-materials-list');
      if (!taskMaterials.length) {
        list.innerHTML = '<div style="color:#bbb;font-size:0.82rem">Нет привязанных материалов</div>';
        return;
      }
      list.innerHTML = taskMaterials.map(m => {
        const isSlot = !m.line_item_id;
        const name = isSlot
          ? `<span style="color:#8b5cf6;font-weight:600">SLOT</span> ${m.category || '—'}`
          : (m.contract_item_name || m.contract_item_description || '—');
        const lifecycle = m.delivery_lifecycle
          ? `<span style="background:#e2e8f0;padding:2px 6px;border-radius:8px;font-size:0.7rem;font-weight:600">${m.delivery_lifecycle}</span>`
          : '';
        const date = m.required_by_date ? (m.required_by_date.value || m.required_by_date).substring(0, 10) : '—';
        const border = isSlot ? 'border-left:3px solid #8b5cf6' : 'border-left:3px solid #e2e8f0';
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:6px;background:#fafafa;border-radius:6px;${border};font-size:0.85rem">
          <div style="flex:1">
            <div>${name}</div>
            <div style="color:#999;font-size:0.78rem">${m.qty || '—'} ${m.unit || ''} · к ${date}</div>
          </div>
          ${lifecycle}
          <button class="btn btn-outline" style="padding:2px 6px;font-size:0.7rem;color:#c5221f" data-action="delete-mat" data-mat-id="${m.id}">×</button>
        </div>`;
      }).join('');
    }

    // Delete material requirement
    document.addEventListener('click', async e => {
      const delBtn = e.target.closest('[data-action="delete-mat"]');
      if (!delBtn) return;
      if (!confirm(t('confirmDelete'))) return;
      delBtn.disabled = true;
      try {
        await apiFetch(`/material_requirements/${delBtn.dataset.matId}`, { method: 'DELETE' });
        await loadTaskMaterials(editTaskId);
      } catch(err) { showToast(err.message, 'error'); delBtn.disabled = false; }
    });

    // ─── Add material from contract ───

    document.getElementById('btn-add-mat-contract').addEventListener('click', async () => {
      if (!editTaskId) { showToast('Сначала сохраните задачу', 'error'); return; }
      // Load contracts for this folder
      try {
        if (!contractsCache.length) {
          const companyId = companiesCache.find(c =>
            foldersCache.find(f => f.id === filterFolder && f.company_id === c.id)
          )?.id;
          if (companyId) {
            contractsCache = await apiFetch(`/contracts?company_id=${companyId}&folder_id=${filterFolder}`);
          }
        }
      } catch(e) { contractsCache = []; }

      const sel = document.getElementById('mat-contract-select');
      sel.innerHTML = '<option value="">— Выберите контракт —</option>';
      contractsCache.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.name || c.external_ref || c.id.substring(0,8)}</option>`;
      });
      document.getElementById('mat-lineitem-select').innerHTML = '<option value="">— Сначала контракт —</option>';
      document.getElementById('mat-qty').value = '';
      document.getElementById('mat-unit').value = '';
      document.getElementById('mat-required-by').value = '';
      document.getElementById('mat-notes').value = '';
      openModal('modal-mat-contract');
    });

    // When contract selected → load line items
    document.getElementById('mat-contract-select').addEventListener('change', async e => {
      const contractId = e.target.value;
      const sel = document.getElementById('mat-lineitem-select');
      if (!contractId) { sel.innerHTML = '<option value="">— Сначала контракт —</option>'; return; }
      try {
        if (!contractItemsCache[contractId]) {
          contractItemsCache[contractId] = await apiFetch(`/contract_items?contract_id=${contractId}`);
        }
        const items = contractItemsCache[contractId];
        sel.innerHTML = '<option value="">— Выберите позицию —</option>';
        items.forEach(it => {
          const label = it.description || `Line ${it.sort_order || '?'}`;
          sel.innerHTML += `<option value="${it.id}" data-qty="${it.quantity || ''}" data-unit="${it.item_type || ''}">${label}</option>`;
        });
      } catch(err) { sel.innerHTML = '<option value="">Ошибка загрузки</option>'; }
    });

    document.getElementById('btn-mat-contract-cancel').addEventListener('click', () => closeModal('modal-mat-contract'));
    document.getElementById('btn-mat-contract-save').addEventListener('click', async () => {
      const lineItemId = document.getElementById('mat-lineitem-select').value;
      if (!lineItemId) { showToast('Выберите позицию контракта', 'error'); return; }
      closeModal('modal-mat-contract');
      try {
        await apiFetch('/material_requirements', {
          method: 'POST',
          body: JSON.stringify({
            task_id: editTaskId,
            line_item_id: lineItemId,
            required_by_date: document.getElementById('mat-required-by').value || '',
            qty: document.getElementById('mat-qty').value || '0',
            unit: document.getElementById('mat-unit').value || '',
            notes: document.getElementById('mat-notes').value || '',
          }),
        });
        showToast(t('saved'), 'success');
        await loadTaskMaterials(editTaskId);
      } catch(e) { showToast(e.message, 'error'); }
    });

    // ─── Add slot ───

    document.getElementById('btn-add-mat-slot').addEventListener('click', () => {
      if (!editTaskId) { showToast('Сначала сохраните задачу', 'error'); return; }
      document.getElementById('slot-category').value = '';
      document.getElementById('slot-qty').value = '';
      document.getElementById('slot-unit').value = '';
      document.getElementById('slot-required-by').value = '';
      document.getElementById('slot-notes').value = '';
      openModal('modal-mat-slot');
    });

    document.getElementById('btn-mat-slot-cancel').addEventListener('click', () => closeModal('modal-mat-slot'));
    document.getElementById('btn-mat-slot-save').addEventListener('click', async () => {
      const category = document.getElementById('slot-category').value.trim();
      if (!category) { showToast('Укажите категорию', 'error'); return; }
      closeModal('modal-mat-slot');
      try {
        await apiFetch('/material_requirements', {
          method: 'POST',
          body: JSON.stringify({
            task_id: editTaskId,
            category,
            required_by_date: document.getElementById('slot-required-by').value || '',
            qty: document.getElementById('slot-qty').value || '0',
            unit: document.getElementById('slot-unit').value || '',
            notes: document.getElementById('slot-notes').value || '',
          }),
        });
        showToast(t('saved'), 'success');
        await loadTaskMaterials(editTaskId);
      } catch(e) { showToast(e.message, 'error'); }
    });

    // Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal('modal-phase'); closeModal('modal-task'); closeModal('modal-mat-contract'); closeModal('modal-mat-slot'); }
    });

    // ─── Init ───

    window.onLogin = async () => {
      updateTexts();
      await loadRefs();
    };
    window.onLogout = () => { updateTexts(); };
    window.onLangChange = () => {
      updateTexts();
      if (tasksData.length) renderGantt();
    };

    renderHeader('gantt');
    updateTexts();
  </script>
</body>
</html>
