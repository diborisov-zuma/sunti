<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunti — Пользователи</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="_i18n.js"></script>
  <script src="_config.js"></script>
  <script src="_auth.js"></script>
  <script src="_header.js"></script>
  <style>
    .page-content { max-width: 1000px; margin: 32px auto; padding: 0 24px; }
    .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
    .page-header h1 { font-size:1.2rem;color:#222; }

    .table-wrap { background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden; }
    table { width:100%;border-collapse:collapse; }
    thead { background:#f8f8f8;border-bottom:1px solid #e8e8e8; }
    th { padding:10px 14px;font-size:0.78rem;font-weight:600;color:#888;text-align:left;text-transform:uppercase;letter-spacing:0.04em; }
    td { padding:11px 14px;font-size:0.88rem;color:#333;border-bottom:1px solid #f0f0f0; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#fafafa; }

    .user-avatar { width:32px;height:32px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:#1a73e8;font-weight:600;flex-shrink:0; }
    .user-cell { display:flex;align-items:center;gap:10px; }
    .user-name { font-weight:500;color:#222; }
    .user-email { font-size:0.75rem;color:#999;margin-top:1px; }

    .tg-badge { display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:0.75rem; }
    .tg-set { background:#e3f2fd;color:#0277bd; }
    .tg-missing { background:#f1f3f4;color:#999; }

    .status-badge { display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:500; }
    .status-active  { background:#e6f4ea;color:#1e8e3e; }
    .status-blocked { background:#fce8e6;color:#c5221f; }

    .access-badge { display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:500; }
    .access-admin  { background:#fce8e6;color:#c5221f; }

    .bool-yes { color:#1e8e3e;font-weight:500; }
    .bool-no  { color:#bbb; }

    .empty-state { text-align:center;padding:48px 24px;color:#bbb; }
    .loading { text-align:center;padding:48px;color:#bbb; }

    .field-group { margin-bottom:14px; }
    .field-group label { display:block;font-size:0.82rem;color:#666;margin-bottom:4px; }
    .field-group input, .field-group select { width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:0.9rem;outline:none;box-sizing:border-box; }
    .field-group input:focus, .field-group select:focus { border-color:#1a73e8; }
    .fields-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }

    .section-divider { font-size:0.78rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid #f0f0f0; }

    .access-denied { text-align:center;padding:100px 24px;color:#bbb; }
    .access-denied h2 { font-size:1.2rem;color:#c5221f;margin-bottom:8px; }

    .checkbox-row { display:flex;align-items:center;gap:10px;padding:10px 0; }
    .checkbox-row input[type=checkbox] { width:18px;height:18px;cursor:pointer; }
    .checkbox-row label { font-size:0.9rem;color:#333;cursor:pointer;flex:1; }

    .folder-access-list { display:flex;flex-direction:column;gap:8px;margin-top:4px; }
    .folder-access-row { display:grid;grid-template-columns:1fr 180px;align-items:center;gap:10px; }
    .folder-access-row .folder-name { font-size:0.88rem;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .folder-access-row select { padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:0.85rem;outline:none; }
    .folder-access-row select:focus { border-color:#1a73e8; }
    .folders-loading { color:#bbb;font-size:0.85rem;padding:8px 0; }
  </style>
</head>
<body>

  <header id="header"></header>

  <div id="guest-view">
    <h2 id="t-guest-title"></h2>
    <p id="t-guest-sub"></p>
    <div style="display:flex;justify-content:center;margin-top:24px">
      <a href="index.html" class="btn btn-primary" id="t-login"></a>
    </div>
  </div>

  <div id="app-view">
    <div class="page-content" id="page-content"></div>
  </div>

  <div class="modal-overlay" id="modal-edit">
    <div class="modal" style="width:520px;max-width:95vw;max-height:90vh;overflow-y:auto">
      <h3 id="t-modal-title"></h3>

      <div class="section-divider" id="t-section-main"></div>

      <div class="field-group">
        <label id="t-label-name"></label>
        <input type="text" id="edit-name">
      </div>

      <div class="fields-row">
        <div class="field-group">
          <label id="t-label-telegram"></label>
          <input type="text" id="edit-telegram" placeholder="@username">
        </div>
        <div class="field-group">
          <label>Telegram Chat ID <span style="color:#bbb;font-size:0.75rem">(внутр.)</span></label>
          <input type="text" id="edit-chat-id" placeholder="66782755">
        </div>
      </div>

      <div class="fields-row">
        <div class="field-group">
          <label id="t-label-status"></label>
          <select id="edit-active">
            <option value="true"  id="edit-opt-active"></option>
            <option value="false" id="edit-opt-blocked"></option>
          </select>
        </div>
        <div class="field-group">
          <label>is_admin</label>
          <select id="edit-is-admin">
            <option value="false" id="edit-opt-no-admin"></option>
            <option value="true" id="edit-opt-yes-admin"></option>
          </select>
        </div>
      </div>

      <div class="section-divider" id="t-section-doc-access"></div>
      <div id="folder-access-container">
        <div class="folders-loading">Загрузка проектов…</div>
      </div>

      <div class="section-divider" id="t-section-statement-access"></div>
      <div id="statement-access-container">
        <div class="folders-loading">Загрузка…</div>
      </div>

      <div class="section-divider" id="t-section-data-vis"></div>

      <div class="checkbox-row">
        <input type="checkbox" id="edit-can-see-salary">
        <label for="edit-can-see-salary" id="t-can-see-salary"></label>
      </div>

      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-cancel"></button>
        <button class="btn btn-primary" id="btn-save"></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let editingEmail = null;
    let allFolders = [];
    let currentUserFolderAccess = {};
    let allCompanies = [];
    let currentUserStatementAccess = {};

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.className = 'toast', 3000);
    }

    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function formatDate(val) {
      if (!val) return '—';
      const d = new Date(val.value || val);
      if (isNaN(d)) return '—';
      return `${String(d.getUTCDate()).padStart(2,'0')}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${d.getUTCFullYear()}`;
    }

    function updateTexts() {
      document.getElementById('t-guest-title').textContent  = t('guestTitle');
      document.getElementById('t-guest-sub').textContent    = t('guestSub');
      document.getElementById('t-login').textContent        = t('login');
      document.getElementById('t-modal-title').textContent  = t('editUser');
      document.getElementById('t-label-name').textContent   = t('name');
      document.getElementById('t-label-telegram').textContent = t('telegramChatId');
      document.getElementById('t-label-status').textContent = t('statusLabel');
      document.getElementById('edit-opt-active').textContent  = t('userActive');
      document.getElementById('edit-opt-blocked').textContent = t('userBlocked');
      document.getElementById('btn-cancel').textContent     = t('cancel');
      document.getElementById('btn-save').textContent       = t('save');
      const secMain   = document.getElementById('t-section-main');
      const secDoc    = document.getElementById('t-section-doc-access');
      const secStmt   = document.getElementById('t-section-statement-access');
      const secData   = document.getElementById('t-section-data-vis');
      if (secMain) secMain.textContent  = t('sectionMain');
      if (secDoc)  secDoc.textContent   = t('sectionDocAccess');
      if (secStmt) secStmt.textContent  = t('sectionStatementAccess');
      if (secData) secData.textContent  = t('sectionDataVisibility');
      const optNo  = document.getElementById('edit-opt-no-admin');
      const optYes = document.getElementById('edit-opt-yes-admin');
      const canSee = document.getElementById('t-can-see-salary');
      if (optNo)  optNo.textContent  = t('isAdminNo');
      if (optYes) optYes.textContent = t('isAdminYes');
      if (canSee) canSee.textContent = t('canSeeSalary');
      updateHeaderTexts();
    }

    function renderAdminPage() {
      document.getElementById('page-content').innerHTML = `
        <div class="page-header">
          <h1>${t('usersPage')}</h1>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>${t('user')}</th>
                <th>Telegram</th>
                <th>ЗП</th>
                <th>Admin</th>
                <th>${t('statusLabel')}</th>
                <th>${t('lastLogin')}</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="7" class="loading">${t('loading')}</td></tr>
            </tbody>
          </table>
        </div>
      `;
      loadFolders();
      loadUsers();
    }

    function renderAccessDenied() {
      document.getElementById('page-content').innerHTML = `
        <div class="access-denied">
          <h2>${t('accessDenied')}</h2>
          <p>${t('adminOnly')}</p>
        </div>
      `;
    }

    async function loadFolders() {
      try {
        allFolders = await apiFetch('/folders');
      } catch(e) {
        allFolders = [];
        console.error('loadFolders error:', e);
      }
    }

    async function loadUsers() {
      const tbody = document.getElementById('users-tbody');
      if (!tbody) return;
      try {
        const users = await apiFetch('/users');
        if (!users.length) {
          tbody.innerHTML = `<tr><td colspan="7" class="empty-state">${t('noUsers')}</td></tr>`;
          return;
        }
        tbody.innerHTML = users.map(u => {
          const initials = (u.name || u.email).split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
          const hasTg    = u.telegram_username && u.telegram_username !== '';
          const isAdminUser = u.is_admin === true;
          return `
            <tr>
              <td>
                <div class="user-cell">
                  <div class="user-avatar">${initials}</div>
                  <div>
                    <div class="user-name">${u.name || '—'}</div>
                    <div class="user-email">${u.email}</div>
                  </div>
                </div>
              </td>
              <td>
                ${hasTg
                  ? `<a href="https://t.me/${u.telegram_username.replace('@','')}" target="_blank" class="tg-badge tg-set">✓ ${u.telegram_username}</a>`
                  : `<span class="tg-badge tg-missing">${t('notSet')}</span>`
                }
              </td>
              <td><span class="${u.can_see_salary ? 'bool-yes' : 'bool-no'}">${u.can_see_salary ? '✓' : '—'}</span></td>
              <td><span class="${isAdminUser ? 'access-badge access-admin' : 'bool-no'}">${isAdminUser ? '✓ Admin' : '—'}</span></td>
              <td>
                <span class="status-badge ${u.is_active ? 'status-active' : 'status-blocked'}">
                  ${u.is_active ? t('userActive') : t('userBlocked')}
                </span>
              </td>
              <td style="color:#999;font-size:0.83rem">${formatDate(u.last_login)}</td>
              <td>
                <button class="btn btn-outline" data-action="edit"
                  data-email="${u.email}"
                  data-name="${u.name||''}"
                  data-telegram="${u.telegram_username||''}"
                  data-chatid="${u.telegram_chat_id||''}"
                  data-active="${u.is_active}"
                  data-is-admin="${isAdminUser}"
                  data-can-see-salary="${u.can_see_salary||false}"
                  >${t('edit')}</button>
              </td>
            </tr>
          `;
        }).join('');

        document.getElementById('users-tbody').addEventListener('click', async e => {
          const btn = e.target.closest('button[data-action]');
          if (!btn) return;
          editingEmail = btn.dataset.email;
          document.getElementById('edit-name').value     = btn.dataset.name;
          document.getElementById('edit-telegram').value = btn.dataset.telegram;
          document.getElementById('edit-chat-id').value  = btn.dataset.chatid;
          document.getElementById('edit-active').value   = btn.dataset.active;
          document.getElementById('edit-is-admin').value = btn.dataset.isAdmin;
          document.getElementById('edit-can-see-salary').checked = btn.dataset.canSeeSalary === 'true';

          openModal('modal-edit');
          setTimeout(() => document.getElementById('edit-name').focus(), 100);
          await Promise.all([
            loadUserFolderAccess(editingEmail),
            loadUserStatementAccess(editingEmail),
          ]);
        });

      } catch(e) {
        console.error(e);
        if (tbody) tbody.innerHTML = `<tr><td colspan="7" class="empty-state">${e.message}</td></tr>`;
      }
    }

    async function loadUserFolderAccess(userEmail) {
      const container = document.getElementById('folder-access-container');
      container.innerHTML = '<div class="folders-loading">' + t('loadingAccess') + '</div>';
      try {
        const records = await apiFetch(`/users_folders?user_email=${encodeURIComponent(userEmail)}`);
        currentUserFolderAccess = {};
        for (const r of records) {
          currentUserFolderAccess[r.folder_id] = { id: r.id, docs_access: r.docs_access };
        }

        if (!allFolders.length) {
          try { allFolders = await apiFetch('/folders'); } catch(e) {}
        }

        if (!allFolders.length) {
          container.innerHTML = '<div class="folders-loading">' + t('noFolders') + '</div>';
          return;
        }

        const rows = allFolders.map(f => {
          const current = currentUserFolderAccess[f.id]?.docs_access || 'none';
          return `
            <div class="folder-access-row" data-folder-id="${f.id}">
              <span class="folder-name" title="${f.name}">${f.name}</span>
              <select class="folder-access-select">
                <option value="none"   ${current === 'none'   ? 'selected' : ''}>${t('accessNone')}</option>
                <option value="viewer" ${current === 'viewer' ? 'selected' : ''}>${t('accessViewer')}</option>
                <option value="editor" ${current === 'editor' ? 'selected' : ''}>${t('accessEditor')}</option>
              </select>
            </div>
          `;
        }).join('');

        container.innerHTML = `<div class="folder-access-list">${rows}</div>`;
      } catch(e) {
        container.innerHTML = '<div class="folders-loading" style="color:#c5221f">' + t('accessLoadError') + '</div>';
        console.error(e);
      }
    }

    async function loadUserStatementAccess(userEmail) {
      const container = document.getElementById('statement-access-container');
      container.innerHTML = '<div class="folders-loading">' + t('loadingAccess') + '</div>';
      try {
        const records = await apiFetch(`/users_statements?user_email=${encodeURIComponent(userEmail)}`);
        currentUserStatementAccess = {};
        for (const r of records) {
          currentUserStatementAccess[r.company_id] = { id: r.id, statement_access: r.statement_access };
        }

        if (!allCompanies.length) {
          try { allCompanies = await apiFetch('/companies'); } catch(e) {}
        }

        if (!allCompanies.length) {
          container.innerHTML = '<div class="folders-loading">—</div>';
          return;
        }

        const rows = allCompanies.map(c => {
          const current = currentUserStatementAccess[c.id]?.statement_access || 'none';
          return `
            <div class="folder-access-row" data-company-id="${c.id}">
              <span class="folder-name" title="${c.name}">${c.name}</span>
              <select class="statement-access-select">
                <option value="none"   ${current === 'none'   ? 'selected' : ''}>${t('accessNone')}</option>
                <option value="viewer" ${current === 'viewer' ? 'selected' : ''}>${t('accessViewer')}</option>
                <option value="editor" ${current === 'editor' ? 'selected' : ''}>${t('accessEditor')}</option>
              </select>
            </div>
          `;
        }).join('');

        container.innerHTML = `<div class="folder-access-list">${rows}</div>`;
      } catch(e) {
        container.innerHTML = '<div class="folders-loading" style="color:#c5221f">' + t('accessLoadError') + '</div>';
        console.error(e);
      }
    }

    async function saveStatementAccess(userEmail) {
      const rows = document.querySelectorAll('.folder-access-row[data-company-id]');
      const promises = [];
      for (const row of rows) {
        const companyId = row.dataset.companyId;
        const newAccess = row.querySelector('.statement-access-select').value;
        const existing  = currentUserStatementAccess[companyId];
        if (existing) {
          if (existing.statement_access !== newAccess) {
            if (newAccess === 'none') {
              promises.push(apiFetch(`/users_statements/${existing.id}`, { method: 'DELETE' }));
            } else {
              promises.push(apiFetch(`/users_statements/${existing.id}`, {
                method: 'PUT',
                body: JSON.stringify({ statement_access: newAccess }),
              }));
            }
          }
        } else if (newAccess !== 'none') {
          promises.push(apiFetch('/users_statements', {
            method: 'POST',
            body: JSON.stringify({ user_email: userEmail, company_id: companyId, statement_access: newAccess }),
          }));
        }
      }
      await Promise.all(promises);
    }

    async function saveFolderAccess(userEmail) {
      const rows = document.querySelectorAll('.folder-access-row[data-folder-id]');
      const promises = [];
      for (const row of rows) {
        const folderId  = row.dataset.folderId;
        const newAccess = row.querySelector('.folder-access-select').value;
        const existing  = currentUserFolderAccess[folderId];
        if (existing) {
          if (existing.docs_access !== newAccess) {
            if (newAccess === 'none') {
              promises.push(apiFetch(`/users_folders/${existing.id}`, { method: 'DELETE' }));
            } else {
              promises.push(apiFetch(`/users_folders/${existing.id}`, {
                method: 'PUT',
                body: JSON.stringify({ docs_access: newAccess }),
              }));
            }
          }
        } else if (newAccess !== 'none') {
          promises.push(apiFetch('/users_folders', {
            method: 'POST',
            body: JSON.stringify({ user_email: userEmail, folder_id: folderId, docs_access: newAccess }),
          }));
        }
      }
      await Promise.all(promises);
    }

    document.getElementById('btn-cancel').addEventListener('click', () => closeModal('modal-edit'));

    document.getElementById('btn-save').addEventListener('click', async () => {
      const name              = document.getElementById('edit-name').value.trim();
      const telegram_username = document.getElementById('edit-telegram').value.trim();
      const telegram_chat_id  = document.getElementById('edit-chat-id').value.trim();
      const is_active         = document.getElementById('edit-active').value === 'true';
      const is_admin          = document.getElementById('edit-is-admin').value === 'true';
      const can_see_salary    = document.getElementById('edit-can-see-salary').checked;
      const saveBtn           = document.getElementById('btn-save');
      saveBtn.disabled = true;
      saveBtn.textContent = t('saving');
      try {
        await apiFetch(`/users/${encodeURIComponent(editingEmail)}`, {
          method: 'PUT',
          body: JSON.stringify({ name, telegram_username, telegram_chat_id, is_active, is_admin, can_see_salary }),
        });
        await saveFolderAccess(editingEmail);
        await saveStatementAccess(editingEmail);
        closeModal('modal-edit');
        showToast(t('saved'), 'success');
        loadUsers();
      } catch(e) {
        console.error(e);
        showToast(e.message, 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = t('save');
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal('modal-edit');
    });

    window.onLogin = (user, admin) => {
      updateTexts();
      if (admin) renderAdminPage();
      else renderAccessDenied();
    };

    window.onLogout = () => {
      document.getElementById('page-content').innerHTML = '';
      updateTexts();
    };

    window.onLangChange = () => updateTexts();

    renderHeader('users');
    updateTexts();
  </script>

</body>
</html>
