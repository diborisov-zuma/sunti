<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunti — Контракты</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="_i18n.js"></script>
  <script src="_config.js"></script>
  <script src="_auth.js"></script>
  <script src="_header.js"></script>
  <style>
    .page-wrap { padding:16px 24px; }
    .sortable { cursor:pointer;user-select:none;white-space:nowrap; }
    .sortable:hover { color:#1a73e8; }
    .sort-arrow { font-size:0.65rem;margin-left:3px;color:#1a73e8; }
    .page-toolbar { display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap; }
    .page-toolbar h2 { font-size:1.1rem;color:#222;flex:1; }
    .toolbar-right { display:flex;align-items:center;gap:8px;flex-wrap:wrap; }

    select.filter-select, input.filter-select, input.filter-date {
      border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:0.85rem;color:#333;outline:none;background:#fff;
    }

    .ct-wrap { background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden; }
    .ct-table { width:100%;border-collapse:collapse; }
    .ct-table thead { background:#f8f8f8;border-bottom:1px solid #e8e8e8; }
    .ct-table th { padding:6px 7px;font-size:0.75rem;font-weight:600;color:#888;text-align:left;text-transform:uppercase;letter-spacing:0.02em; }
    .ct-table td { padding:7px 7px;font-size:0.85rem;color:#333;border-bottom:1px solid #f0f0f0; }
    .ct-table tr:last-child td { border-bottom:none; }
    .ct-table tr:hover td { background:#fafafa; }
    .ct-table tr.expanded td { background:#f0f4ff; }

    .empty-state { text-align:center;padding:64px 24px;color:#bbb; }
    .loading { text-align:center;padding:48px;color:#bbb; }

    .expand-btn { background:none;border:none;cursor:pointer;font-size:0.7rem;color:#888;padding:4px; }

    .detail-row td { padding:0 !important;border-bottom:1px solid #e8e8e8 !important; }
    .detail-inner { padding:16px 16px 16px 44px;background:#fafcff; }

    .inv-mini-table { width:100%;border-collapse:collapse;margin-top:8px; }
    .inv-mini-table th { padding:6px 10px;font-size:0.72rem;font-weight:600;color:#888;text-align:left;text-transform:uppercase;border-bottom:1px solid #e8e8e8; }
    .inv-mini-table td { padding:8px 10px;font-size:0.84rem;color:#333;border-bottom:1px solid #f0f0f0; }
    .inv-mini-table tr:last-child td { border-bottom:none; }
    .inv-mini-table tr:hover td { background:#f0f4ff; }
    .inv-mini-table tr.inv-expanded td { background:#e8f0fe; }

    .trx-detail { padding:12px 12px 12px 36px;background:#f4f7fb;border-bottom:1px solid #e8e8e8; }
    .trx-mini-table { width:100%;border-collapse:collapse;margin-top:6px; }
    .trx-mini-table th { padding:4px 8px;font-size:0.7rem;font-weight:600;color:#888;text-align:left; }
    .trx-mini-table td { padding:6px 8px;font-size:0.82rem;color:#333; }

    .badge { display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72rem;font-weight:600; }
    .badge-green { background:#e6f4ea;color:#1e8e3e; }
    .badge-yellow { background:#fef7e0;color:#e37400; }
    .badge-red { background:#fce8e6;color:#c5221f; }
    .badge-gray { background:#f0f0f0;color:#888; }

    .amount-col { font-weight:500;font-variant-numeric:tabular-nums; }
    .amount-col.expense { color:#c5221f; }
    .amount-col.income { color:#1e8e3e; }

    .field-group { margin-bottom:12px; }
    .field-group label { display:block;font-size:0.82rem;color:#666;margin-bottom:4px; }
    .field-group input, .field-group select, .field-group textarea {
      width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:0.9rem;outline:none;box-sizing:border-box;background:#fff;
    }
    .field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color:#1a73e8; }
    .field-group textarea { resize:vertical;min-height:50px; }
    .fields-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .fields-row-3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px; }

    .section-title { font-size:0.78rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin:12px 0 6px; }
    .icon-btn { background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;padding:5px 7px;display:inline-flex;align-items:center;justify-content:center;color:#666;transition:all 0.15s; }
    .icon-btn:hover { border-color:#c5221f;color:#c5221f;background:#fef7f6; }
    .icon-btn svg { width:16px;height:16px;display:block; }
  </style>
</head>
<body>
  <header id="header"></header>

  <div id="guest-view">
    <h2 id="t-guest-title"></h2>
    <p id="t-guest-sub"></p>
  </div>

  <div id="app-view" style="display:none">
    <div class="page-wrap">
      <div class="page-toolbar">
        <h2 id="t-page-title"></h2>
        <div class="toolbar-right">
          <select class="filter-select" id="filter-company"><option value="">—</option></select>
          <select class="filter-select" id="filter-folder"><option value="">—</option></select>
          <input type="text" class="filter-select" id="filter-search" placeholder="" style="min-width:160px">
          <select class="filter-select" id="filter-contractor"><option value="">—</option></select>
          <select class="filter-select" id="filter-responsible"><option value="">—</option></select>
          <select class="filter-select" id="filter-status">
            <option value="active"></option>
            <option value="estimate"></option>
            <option value="confirmed"></option>
            <option value="completed"></option>
            <option value="cancelled"></option>
            <option value="all"></option>
          </select>
          <button class="btn btn-primary" id="btn-create"></button>
        </div>
      </div>

      <div class="ct-wrap">
        <table class="ct-table">
          <thead>
            <tr>
              <th style="width:30px"></th>
              <th style="width:24px"></th>
              <th class="sortable" data-sort="date" id="th-date"></th>
              <th style="width:24px"></th>
              <th class="sortable" data-sort="name" id="th-name"></th>
              <th class="sortable" data-sort="contractor" id="th-contractor"></th>
              <th class="sortable" data-sort="total_amount" id="th-total"></th>
              <th class="sortable" data-sort="paid_amount" id="th-paid"></th>
              <th class="sortable" data-sort="remaining" id="th-remaining"></th>
              <th class="sortable" data-sort="progress_pct" id="th-progress"></th>
              <th class="sortable" data-sort="status" id="th-status"></th>
              <th style="width:100px"></th>
            </tr>
          </thead>
          <tbody id="ct-tbody"></tbody>
          <tfoot id="ct-tfoot" style="display:none">
            <tr style="background:#f8f8f8;font-weight:600;border-top:2px solid #e8e8e8">
              <td colspan="5" style="text-align:right;color:#888;padding:12px 7px" id="tf-label"></td>
              <td id="tf-total"></td>
              <td id="tf-paid"></td>
              <td id="tf-remaining"></td>
              <td id="tf-progress"></td>
              <td colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- Модалка: контракт -->
  <div class="modal-overlay" id="modal-contract">
    <div class="modal" style="width:600px;max-width:95vw;max-height:90vh;overflow-y:auto">
      <h3 id="t-modal-contract-title"></h3>
      <div class="fields-row">
        <div class="field-group">
          <label class="required" id="lbl-c-folder"></label>
          <select id="c-folder"></select>
        </div>
        <div class="field-group">
          <label class="required" id="lbl-c-contractor"></label>
          <select id="c-contractor"></select>
        </div>
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label class="required" id="lbl-c-name"></label>
          <input type="text" id="c-name">
        </div>
        <div class="field-group">
          <label id="lbl-c-extref"></label>
          <input type="text" id="c-extref">
        </div>
      </div>
      <div class="fields-row-3">
        <div class="field-group">
          <label id="lbl-c-date"></label>
          <input type="date" id="c-date">
        </div>
        <div class="field-group">
          <label id="lbl-c-direction"></label>
          <select id="c-direction">
            <option value="expense" id="c-opt-expense"></option>
            <option value="income" id="c-opt-income"></option>
          </select>
        </div>
        <div class="field-group">
          <label id="lbl-c-status"></label>
          <select id="c-status-select">
            <option value="estimate"></option>
            <option value="confirmed"></option>
            <option value="completed"></option>
            <option value="cancelled"></option>
          </select>
        </div>
      </div>
      <div class="fields-row-3">
        <div class="field-group">
          <label id="lbl-c-subtotal"></label>
          <input type="number" id="c-subtotal" min="0" step="0.01">
        </div>
        <div class="field-group">
          <label id="lbl-c-vat"></label>
          <input type="number" id="c-vat" min="0" step="0.01">
        </div>
        <div class="field-group">
          <label class="required" id="lbl-c-total"></label>
          <input type="number" id="c-total" min="0" step="0.01">
        </div>
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label id="lbl-c-responsible"></label>
          <select id="c-responsible"></select>
        </div>
        <div class="field-group">
          <label id="lbl-c-terms"></label>
          <input type="text" id="c-terms" placeholder="50/40/10">
        </div>
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label id="lbl-c-progress"></label>
          <input type="number" id="c-progress" min="0" max="100" step="1" placeholder="0">
        </div>
        <div class="field-group">
          <label id="lbl-c-notes"></label>
          <textarea id="c-notes" rows="2"></textarea>
        </div>
      </div>
      <div class="field-group">
        <label id="lbl-c-progress-notes"></label>
        <textarea id="c-progress-notes" rows="2"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-c-cancel"></button>
        <button class="btn btn-primary" id="btn-c-save"></button>
      </div>
    </div>
  </div>

  <!-- Модалка: инвойс (создание из контракта) -->
  <div class="modal-overlay" id="modal-invoice">
    <div class="modal" style="width:560px;max-width:95vw;max-height:90vh;overflow-y:auto">
      <h3 id="t-modal-inv-title"></h3>
      <div class="fields-row">
        <div class="field-group">
          <label class="required" id="lbl-i-name"></label>
          <input type="text" id="i-name">
        </div>
        <div class="field-group">
          <label class="required" id="lbl-i-date"></label>
          <input type="date" id="i-date">
        </div>
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label id="lbl-i-direction"></label>
          <select id="i-direction">
            <option value="expense"></option>
            <option value="income"></option>
          </select>
        </div>
        <div class="field-group">
          <label id="lbl-i-category"></label>
          <select id="i-category"></select>
        </div>
      </div>
      <div class="fields-row-3">
        <div class="field-group">
          <label id="lbl-i-subtotal"></label>
          <input type="number" id="i-subtotal" min="0" step="0.01">
        </div>
        <div class="field-group">
          <label id="lbl-i-vat-rate"></label>
          <select id="i-vat-rate">
            <option value="0">0%</option>
            <option value="7">7%</option>
          </select>
        </div>
        <div class="field-group">
          <label id="lbl-i-vat-amount"></label>
          <input type="number" id="i-vat-amount" min="0" step="0.01">
        </div>
      </div>
      <div class="fields-row-3">
        <div class="field-group">
          <label id="lbl-i-wht-rate"></label>
          <select id="i-wht-rate">
            <option value="0">0%</option>
            <option value="1">1%</option>
            <option value="2">2%</option>
            <option value="3">3%</option>
            <option value="5">5%</option>
            <option value="15">15%</option>
          </select>
        </div>
        <div class="field-group">
          <label id="lbl-i-wht-amount"></label>
          <input type="number" id="i-wht-amount" min="0" step="0.01">
        </div>
        <div class="field-group">
          <label class="required" id="lbl-i-total"></label>
          <input type="number" id="i-total" min="0" step="0.01">
        </div>
      </div>
      <div style="font-size:0.85rem;color:#666;margin-bottom:12px">
        <span id="lbl-i-payable"></span>: <strong id="i-payable-val">—</strong>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-i-cancel"></button>
        <button class="btn btn-primary" id="btn-i-save"></button>
      </div>
    </div>
  </div>

  <!-- Модалка: транзакция -->
  <div class="modal-overlay" id="modal-trx">
    <div class="modal" style="width:480px;max-width:95vw">
      <h3 id="t-modal-trx-title"></h3>
      <div class="fields-row">
        <div class="field-group">
          <label class="required" id="lbl-tx-date"></label>
          <input type="date" id="tx-date">
        </div>
        <div class="field-group">
          <label id="lbl-tx-direction"></label>
          <select id="tx-direction">
            <option value="expense"></option>
            <option value="income"></option>
          </select>
        </div>
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label id="lbl-tx-amount"></label>
          <input type="number" id="tx-amount" min="0" step="0.01">
        </div>
        <div class="field-group">
          <label class="required" id="lbl-tx-account"></label>
          <select id="tx-account"></select>
        </div>
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label class="required" id="lbl-tx-category"></label>
          <select id="tx-category"></select>
        </div>
        <div class="field-group">
          <label id="lbl-tx-desc"></label>
          <input type="text" id="tx-desc">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-tx-cancel"></button>
        <button class="btn btn-primary" id="btn-tx-save"></button>
      </div>
    </div>
  </div>

  <!-- Модалка: привязать инвойс -->
  <div class="modal-overlay" id="modal-link-inv">
    <div class="modal" style="width:560px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column">
      <h3 id="t-link-inv-title"></h3>
      <div id="link-inv-list" style="flex:1;overflow-y:auto;max-height:400px"></div>
      <div class="modal-actions" style="margin-top:12px">
        <button class="btn btn-outline" id="btn-link-inv-cancel"></button>
      </div>
    </div>
  </div>

  <!-- Модалка: загрузить файл (универсальная) -->
  <div class="modal-overlay" id="modal-file">
    <div class="modal" style="width:420px;max-width:95vw">
      <h3 id="t-file-title"></h3>
      <div class="field-group">
        <label id="lbl-file-input"></label>
        <input type="file" id="file-input" style="padding:6px">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-file-cancel"></button>
        <button class="btn btn-primary" id="btn-file-save"></button>
      </div>
    </div>
  </div>

  <!-- PDF Viewer -->
  <div class="modal-overlay" id="modal-pdf" style="z-index:300">
    <div style="background:#fff;border-radius:12px;width:90vw;height:90vh;max-width:1200px;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8e8e8">
        <span id="pdf-title" style="font-size:0.9rem;font-weight:500;color:#222"></span>
        <button class="btn btn-outline" onclick="closeModal('modal-pdf')" style="padding:2px 10px">✕</button>
      </div>
      <iframe id="pdf-iframe" style="flex:1;border:none" src=""></iframe>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ICON_TRASH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

    let allContracts     = [];
    let companiesCache   = [];
    let foldersCache     = [];
    let contractorsCache = [];
    let categoriesCache  = [];
    let typesCache       = [];
    let accountsCache    = [];
    let filterCompany    = '';
    let filterFolder     = '';
    let filterContractor = '';
    let filterStatus     = 'active';
    let filterResponsible = '';
    let filterSearch     = '';
    let searchDebounce   = null;
    let usersCache       = [];
    let sortField        = 'date';
    let sortDir          = 'desc'; // 'asc' | 'desc'
    let expandedContracts = {};
    let expandedInvoices  = {};
    let expandedTrx       = {};
    let contractInvoices  = {}; // contractId → [invoices]
    let contractFilesCache = {}; // contractId → [files]
    let contractDirectTrx  = {}; // contractId → [transactions]
    let invoiceTrx        = {}; // invoiceId → [transactions]
    let fileUploadCtx     = null; // { type:'contract'|'invoice'|'transaction', id, folderId, contractId }

    let currentContractMode = 'create';
    let currentContractId = null;
    let currentInvContractId = null; // contract for new invoice
    let currentTrxInvoiceId = null;
    let currentTrxMode = 'create';
    let currentTrxId = null;

    function fmt(v) {
      const n = typeof v === 'object' ? parseFloat(v?.value || v) : parseFloat(v);
      if (isNaN(n)) return '—';
      return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function formatDate(val) {
      if (!val) return '—';
      const d = new Date(val.value || val);
      if (isNaN(d)) return '—';
      return `${String(d.getUTCDate()).padStart(2,'0')}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${d.getUTCFullYear()}`;
    }
    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 3000);
    }
    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function numVal(v) { return typeof v === 'object' ? parseFloat(v?.value || 0) : parseFloat(v || 0); }
    function contractorName(c) { return c?.contractor_name_en || c?.contractor_name_th || '—'; }
    function statusBadge(s) {
      if (s === 'estimate')  return `<span class="badge badge-yellow">${t('estimate')}</span>`;
      if (s === 'confirmed') return `<span class="badge badge-green">${t('confirmed')}</span>`;
      if (s === 'active')    return `<span class="badge badge-green">${t('active')}</span>`;
      if (s === 'completed') return `<span class="badge badge-gray">${t('completed')}</span>`;
      if (s === 'cancelled') return `<span class="badge badge-red">${t('cancelled')}</span>`;
      return `<span class="badge badge-gray">${s || '—'}</span>`;
    }
    function amtCell(val, dir) {
      const n = numVal(val);
      const display = dir === 'expense' ? -n : n;
      const cls = display < 0 ? 'expense' : display > 0 ? 'income' : '';
      return `<span class="amount-col ${cls}">${fmt(display)}</span>`;
    }

    function updateTexts() {
      document.getElementById('t-guest-title').textContent = t('guestTitle');
      document.getElementById('t-guest-sub').textContent = t('guestSub');
      document.getElementById('t-page-title').textContent = t('contracts');
      document.getElementById('filter-search').placeholder = t('search');
      document.getElementById('btn-create').textContent = t('createContract');

      const fs = document.getElementById('filter-status');
      fs.options[0].text = t('active'); fs.options[1].text = t('estimate');
      fs.options[2].text = t('confirmed'); fs.options[3].text = t('completed');
      fs.options[4].text = t('cancelled'); fs.options[5].text = t('allStatuses');

      document.getElementById('th-date').textContent = t('date');
      document.getElementById('th-name').textContent = t('name');
      document.getElementById('th-contractor').textContent = t('contractor');
      document.getElementById('th-total').textContent = t('contractTotal');
      document.getElementById('th-paid').textContent = t('paidAmount');
      document.getElementById('th-remaining').textContent = t('remainingToPay');
      document.getElementById('th-progress').textContent = t('portalProgress');
      document.getElementById('th-status').textContent = t('statusLabel');

      // Contract modal
      document.getElementById('lbl-c-folder').textContent = t('folder');
      document.getElementById('lbl-c-contractor').textContent = t('contractor');
      document.getElementById('lbl-c-name').textContent = t('name');
      document.getElementById('lbl-c-extref').textContent = t('externalRef');
      document.getElementById('lbl-c-date').textContent = t('date');
      document.getElementById('lbl-c-direction').textContent = t('direction');
      document.getElementById('c-opt-expense').textContent = t('expense');
      document.getElementById('c-opt-income').textContent = t('income');
      document.getElementById('lbl-c-status').textContent = t('statusLabel');
      const cs = document.getElementById('c-status-select');
      cs.options[0].text = t('estimate'); cs.options[1].text = t('confirmed');
      cs.options[2].text = t('completed'); cs.options[3].text = t('cancelled');
      document.getElementById('lbl-c-subtotal').textContent = t('subtotal');
      document.getElementById('lbl-c-vat').textContent = t('vatAmount');
      document.getElementById('lbl-c-total').textContent = t('contractTotal');
      document.getElementById('lbl-c-responsible').textContent = t('responsible');
      document.getElementById('lbl-c-terms').textContent = t('paymentTerms');
      document.getElementById('lbl-c-progress').textContent = t('portalProgress') + ' %';
      document.getElementById('lbl-c-notes').textContent = t('notes');

      const [companies, folders, contractors, categories, types, accounts, users] = await Promise.all([
        apiFetch('/companies').catch(() => []),
        apiFetch('/folders').catch(() => []),
        apiFetch('/contractors?active=true').catch(() => []),
        apiFetch('/categories').catch(() => []),
        apiFetch('/category_types').catch(() => []),
        apiFetch('/company_accounts').catch(() => []),
        apiFetch('/users').catch(() => []),
      ]);
      companiesCache = companies; foldersCache = folders;

      fillCompanyFilter();

    function fillResponsibleFilter() {
      const sel = document.getElementById('filter-responsible');
      sel.innerHTML = `<option value="">${t('allResponsible')}</option>`;
      usersCache.forEach(u => {
        if (!u.is_active) return;
        const opt = document.createElement('option');
        opt.value = u.email; opt.textContent = u.name || u.email;
        sel.appendChild(opt);
      });
    }

    function fillResponsibleSelect(selectId, selectedEmail) {
      const sel = document.getElementById(selectId);
      if (!sel) return;
      sel.innerHTML = `<option value="">—</option>`;
      usersCache.forEach(u => {
        if (!u.is_active) return;
        const opt = document.createElement('option');
        opt.value = u.email; opt.textContent = u.name || u.email;
        if (u.email === selectedEmail) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function responsibleName(email) {
      if (!email) return '—';
      const u = usersCache.find(x => x.email === email);
      return u ? (u.name || u.email) : email;
    }

    function fillCompanyFilter() {
      const sel = document.getElementById('filter-company');
      sel.innerHTML = `<option value="">${t('selectCompanyFirst')}</option>`;
      companiesCache.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name;

      });

    function fillFolderFilter() {
      const sel = document.getElementById('filter-folder');

      const sel = document.getElementById('filter-contractor');

      sel.innerHTML = `<option value="">— ${t('contractor')} —</option>`;

    document.getElementById('filter-company').addEventListener('change', e => {

    document.getElementById('filter-folder').addEventListener('change', e => { filterFolder = e.target.value; loadContracts(); });
    document.getElementById('filter-search').addEventListener('input', e => {
      filterSearch = e.target.value.trim();
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(loadContracts, 300);
    });
    document.getElementById('filter-contractor').addEventListener('change', e => { filterContractor = e.target.value; loadContracts(); });
    document.getElementById('filter-responsible').addEventListener('change', e => { filterResponsible = e.target.value; loadContracts(); });
    document.getElementById('filter-status').addEventListener('change', e => { filterStatus = e.target.value; loadContracts(); });

    async function loadContracts() {
      const tbody = document.getElementById('ct-tbody');
      if (!filterCompany) {
        tbody.innerHTML = `<tr><td colspan="12" class="empty-state">${t('selectCompanyFirst')}</td></tr>`;
        return;
      }
      tbody.innerHTML = `<tr><td colspan="12" class="loading">${t('loading')}</td></tr>`;
      try {
        let url = `/contracts?company_id=${filterCompany}&status=${filterStatus}`;
        if (filterSearch) url += `&search=${encodeURIComponent(filterSearch)}`;
        if (filterFolder) url += `&folder_id=${filterFolder}`;
        if (filterContractor) url += `&contractor_id=${filterContractor}`;
        if (filterResponsible) url += `&responsible=${encodeURIComponent(filterResponsible)}`;
        allContracts = await apiFetch(url);
        renderContracts();
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="12" class="empty-state">${e.message}</td></tr>`;
      }
    }

    // ─── Render contracts ───

    function updateSortArrows() {
      document.querySelectorAll('.sortable').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (arrow) arrow.remove();
        if (th.dataset.sort === sortField) {
          th.insertAdjacentHTML('beforeend', `<span class="sort-arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>`);
        }
      });
    }

    function renderContracts() {
      const tbody = document.getElementById('ct-tbody');
      if (!allContracts.length) {
        tbody.innerHTML = `<tr><td colspan="12" class="empty-state">${t('noContracts')}</td></tr>`;
        const tf = document.getElementById('ct-tfoot'); if (tf) tf.style.display = 'none';
        return;
      }

      // Sort
      const sorted = [...allContracts].sort((a, b) => {
        let va, vb;
        switch(sortField) {
          case 'date':
            va = a.date?.value || a.date || ''; vb = b.date?.value || b.date || '';
            break;
          case 'name':
            va = (a.name || '').toLowerCase(); vb = (b.name || '').toLowerCase();
            break;
          case 'contractor':
            va = (a.contractor_name_en || a.contractor_name_th || '').toLowerCase();
            vb = (b.contractor_name_en || b.contractor_name_th || '').toLowerCase();
            break;
          case 'total_amount': va = numVal(a.total_amount); vb = numVal(b.total_amount); break;
          case 'invoiced_total': va = numVal(a.invoiced_total); vb = numVal(b.invoiced_total); break;
          case 'paid_amount': va = numVal(a.paid_amount); vb = numVal(b.paid_amount); break;
          case 'outstanding':
            va = numVal(a.total_amount) - numVal(a.invoiced_total);
            vb = numVal(b.total_amount) - numVal(b.invoiced_total); break;
          case 'remaining':
            va = numVal(a.total_amount) - numVal(a.paid_amount);
            vb = numVal(b.total_amount) - numVal(b.paid_amount); break;
          case 'progress_pct': va = numVal(a.progress_pct); vb = numVal(b.progress_pct); break;
          case 'status': va = a.status || ''; vb = b.status || ''; break;
          default: va = ''; vb = '';
        }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      tbody.innerHTML = '';
      updateSortArrows();
      sorted.forEach(c => {
        const isExp = expandedContracts[c.id];
        const dir = c.direction || 'expense';
        const outstanding = numVal(c.total_amount) - numVal(c.invoiced_total);

        const tr = document.createElement('tr');
        if (isExp) tr.className = 'expanded';
        tr.innerHTML = `
          <td><button class="expand-btn${isExp?' open':''}" data-expand-contract="${c.id}">${isExp?'▼':'▶'}</button></td>
          <td style="text-align:center;cursor:pointer;font-size:0.7rem" data-action="toggle-review" data-id="${c.id}">${c.needs_review ? '🔴' : '<span style="color:#ddd">○</span>'}</td>
          <td>${formatDate(c.date)}</td>
          <td style="text-align:center">${parseInt(c.file_count) > 0 ? '<span style="font-size:1rem" title="Files">📄</span>' : ''}</td>
          <td><strong>${c.name || '—'}</strong>${c.external_ref ? `<br><span style="font-size:0.75rem;color:#999">${c.external_ref}</span>` : ''}</td>
          <td style="font-size:0.82rem">${contractorName(c)}</td>
          <td>${amtCell(c.total_amount, dir)}</td>
          <td>${amtCell(c.paid_amount, dir)}</td>
          <td>${amtCell(numVal(c.total_amount) - numVal(c.paid_amount), dir)}</td>
          <td style="text-align:center"><strong>${numVal(c.progress_pct)}%</strong></td>
          <td>${statusBadge(c.status)}</td>
          <td>
            <div style="display:flex;gap:4px;align-items:center;justify-content:flex-end">
              <button class="btn btn-outline" style="padding:2px 8px;font-size:0.75rem" data-action="edit-contract" data-id="${c.id}">${t('edit')}</button>
              <button class="icon-btn" data-action="delete-contract" data-id="${c.id}" title="${t('delete')}">${ICON_TRASH}</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);

        // Detail row
        const detailTr = document.createElement('tr');
        detailTr.className = 'detail-row';
        detailTr.style.display = isExp ? '' : 'none';
        detailTr.id = `contract-detail-${c.id}`;
        detailTr.innerHTML = `<td colspan="12"><div class="detail-inner" id="contract-inner-${c.id}">${isExp ? '<div class="loading">'+t('loading')+'</div>' : ''}</div></td>`;
        tbody.appendChild(detailTr);

        if (isExp) loadContractDetail(c.id);
      });

      // Totals footer
      const tfoot = document.getElementById('ct-tfoot');
      if (tfoot && allContracts.length) {
        let sumTotal = 0, sumInvoiced = 0, sumPaid = 0;
        allContracts.forEach(c => {
          sumTotal += numVal(c.total_amount);
          sumInvoiced += numVal(c.invoiced_total);
          sumPaid += numVal(c.paid_amount);
        });
        const sumOutstanding = sumTotal - sumInvoiced;
        const dir = allContracts[0]?.direction || 'expense';
        document.getElementById('tf-label').textContent = t('totalAmount') + ':';
        document.getElementById('tf-total').innerHTML = `<div style="font-size:0.68rem;color:#888">${t('contractTotal')}</div>${amtCell(sumTotal, dir)}`;
        document.getElementById('tf-paid').innerHTML = `<div style="font-size:0.68rem;color:#888">${t('paidAmount')}</div>${amtCell(sumPaid, dir)}`;
        const sumRemaining = sumTotal - sumPaid;
        document.getElementById('tf-remaining').innerHTML = `<div style="font-size:0.68rem;color:#888">${t('remainingToPay')}</div>${amtCell(sumRemaining, dir)}`;
        document.getElementById('tf-progress').textContent = '';
        tfoot.style.display = '';
      } else if (tfoot) {
        tfoot.style.display = 'none';
      }
    }

    // ─── Contract detail (invoices) ───

    async function loadContractDetail(contractId) {
      const inner = document.getElementById(`contract-inner-${contractId}`);
      if (!inner) return;
      try {
        const [invs, cFiles, directTrx] = await Promise.all([
          apiFetch(`/contracts/${contractId}/invoices`),
          apiFetch(`/contract_files?contract_id=${contractId}`),
          apiFetch(`/transactions?contract_id=${contractId}`),
        ]);
        contractInvoices[contractId] = invs;
        contractFilesCache[contractId] = cFiles;
        contractDirectTrx[contractId] = directTrx;
        renderContractDetail(contractId, invs, cFiles, directTrx);
      } catch(e) {
        inner.innerHTML = `<div style="color:#c33">${e.message}</div>`;
      }
    }

    function renderFileList(files, entityType, entityId, contractId) {
      let html = `<div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${t('file')}</span>
        <button class="btn btn-outline" style="padding:2px 8px;font-size:0.72rem"
          data-action="add-file" data-entity-type="${entityType}" data-entity-id="${entityId}" data-contract-id="${contractId || ''}">${t('addFile')}</button>
      </div>`;
      if (!files || !files.length) {
        html += `<div style="color:#ccc;font-size:0.82rem;margin-bottom:10px">—</div>`;
      } else {
        files.forEach(f => {
          const size = f.file_size > 1048576 ? (f.file_size/1048576).toFixed(1)+' MB' : Math.round((f.file_size||0)/1024)+' KB';
          const isPdf = (f.file_name || '').toLowerCase().endsWith('.pdf');
          html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.82rem;margin-bottom:2px">
            ${isPdf ? `<button style="background:none;border:none;cursor:pointer;font-size:1rem;padding:0" title="View PDF"
              data-action="view-pdf" data-entity-type="${entityType}" data-file-id="${f.id}" data-file-name="${(f.file_name||'').replace(/"/g,'&quot;')}">👁</button>` : '<span style="width:1rem;display:inline-block"></span>'}
            <span style="flex:1;color:#333">${isPdf ? '📄' : '📎'} ${f.file_name || '—'} <span style="color:#999">(${size})</span></span>
            <button class="btn btn-outline" style="padding:1px 6px;font-size:0.72rem"
              data-action="download-file" data-entity-type="${entityType}" data-file-id="${f.id}">${t('download')}</button>
            <button class="btn btn-outline" style="padding:1px 6px;font-size:0.72rem;color:#c5221f;border-color:#c5221f"
              data-action="delete-file" data-entity-type="${entityType}" data-file-id="${f.id}"
              data-entity-id="${entityId}" data-contract-id="${contractId || ''}">×</button>
          </div>`;
        });
      }
      return html;
    }

    function renderContractDetail(contractId, invs, cFiles) {
      const inner = document.getElementById(`contract-inner-${contractId}`);
      if (!inner) return;
      const contract = allContracts.find(c => c.id === contractId);

      // Contract files
      let html = '';
      // Progress notes
      if (contract?.progress_notes) {
        html += `<div style="margin-bottom:12px;padding:10px 14px;background:#fff;border:1px solid #e8e8e8;border-radius:8px">
          <div style="font-size:0.75rem;color:#888;text-transform:uppercase;margin-bottom:4px">${t('progressNotes')}</div>
          <div style="font-size:0.85rem;color:#333;white-space:pre-wrap">${contract.progress_notes}</div>
        </div>`;
      }
      // Inline details (moved from table columns)
      const cDir = contract?.direction || 'expense';
      const cInvoiced = numVal(contract?.invoiced_total);
      const cOutstanding = numVal(contract?.total_amount) - cInvoiced;
      html += `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;font-size:0.82rem">
        <span style="color:#888">${t('folder')}: <strong style="color:#333">${contract?.folder_name || '—'}</strong></span>
        <span style="color:#888">${t('contractInvoiced')}: <strong>${amtCell(cInvoiced, cDir)}</strong></span>
        <span style="color:#888">${t('contractOutstanding')}: <strong>${amtCell(cOutstanding, cDir)}</strong></span>
      </div>`;

      if (contract?.responsible_email) {
        html += `<div style="font-size:0.82rem;color:#555;margin-bottom:8px">${t('responsible')}: <strong>${responsibleName(contract.responsible_email)}</strong></div>`;
      }
      if (contract?.notes) {
        html += `<div style="margin-bottom:12px;padding:10px 14px;background:#fff;border:1px solid #e8e8e8;border-radius:8px">
          <div style="font-size:0.75rem;color:#888;text-transform:uppercase;margin-bottom:4px">${t('notes')}</div>
          <div style="font-size:0.85rem;color:#333;white-space:pre-wrap">${contract.notes}</div>
        </div>`;

      // Direct payments (without invoice)

      if (directTrx.length) {
        html += `<div style="font-size:0.75rem;color:#888;text-transform:uppercase;margin:12px 0 6px">${t('paidAmount')} (${t('noContract').replace(t('noContract'), 'Direct')})</div>`;

        directTrx.forEach(tx => {
          const sign = tx.direction === 'expense' ? '-' : '';
          const cls = tx.direction === 'expense' ? 'expense' : 'income';

            <td>${formatDate(tx.date)}</td>
            <td><span class="amount-col ${cls}">${sign}${fmt(tx.amount)}</span></td>
            <td style="font-size:0.78rem">${tx.account_name || '—'}</td>

              <button class="btn btn-outline" style="padding:1px 6px;font-size:0.72rem"

                data-date="${tx.date ? (tx.date.value || tx.date) : ''}"
                data-direction="${tx.direction}" data-amount="${tx.amount}"

                data-desc="${(tx.description||'').replace(/"/g,'&quot;')}">${t('edit')}</button>

            </td>
          </tr>`;
        });
        html += `</tbody></table>`;
      }

      html += `<div style="display:flex;gap:8px;margin:10px 0">
        <button class="btn btn-primary" style="font-size:0.78rem;padding:4px 12px" data-action="create-inv" data-contract-id="${contractId}">${t('createInvoiceFromContract')}</button>
        <button class="btn btn-outline" style="font-size:0.78rem;padding:4px 12px" data-action="link-inv" data-contract-id="${contractId}">${t('linkInvoice')}</button>
        <button class="btn btn-outline" style="font-size:0.78rem;padding:4px 12px" data-action="add-direct-payment" data-contract-id="${contractId}">${t('addTransaction')}</button>

      if (!invs.length) {

        html += `<table class="inv-mini-table"><thead><tr>
          <th style="width:24px"></th><th>${t('date')}</th><th>${t('name')}</th>
          <th>${t('subtotal')}</th><th>VAT</th><th>WHT</th>
          <th>${t('totalAmount')}</th><th>${t('paidAmount')}</th><th>${t('statusLabel')}</th><th style="width:60px"></th>

        invs.forEach(inv => {

          const dir = inv.direction || 'expense';
          html += `<tr class="${invExp ? 'inv-expanded' : ''}" data-inv-id="${inv.id}">
            <td><button class="expand-btn${invExp?' open':''}" data-expand-invoice="${inv.id}" data-contract-id="${contractId}">${invExp?'▼':'▶'}</button></td>
            <td>${formatDate(inv.date)}</td>
            <td>${inv.name || '—'}</td>
            <td>${amtCell(inv.subtotal, dir)}</td>
            <td style="font-size:0.78rem">${fmt(numVal(inv.vat_amount))}</td>
            <td style="font-size:0.78rem">${fmt(numVal(inv.wht_amount))}</td>
            <td>${amtCell(inv.total_amount, dir)}</td>
            <td>${amtCell(inv.paid_amount, dir)}</td>
            <td>${statusBadge(inv.status)}</td>
            <td><button class="btn btn-outline" style="padding:1px 6px;font-size:0.72rem" data-action="unlink-inv" data-inv-id="${inv.id}" data-contract-id="${contractId}">${t('unlinkInvoice')}</button></td>
          </tr>`;
          // Invoice detail row (transactions)
          html += `<tr class="detail-row" style="display:${invExp ? '' : 'none'}" id="inv-detail-${inv.id}">
            <td colspan="10"><div class="trx-detail" id="inv-inner-${inv.id}">${invExp ? '<div class="loading">'+t('loading')+'</div>' : ''}</div></td>
          </tr>`;
        });
        html += '</tbody></table>';
      }
      inner.innerHTML = html;

      // Load expanded invoice details
      invs.forEach(inv => {
        if (expandedInvoices[inv.id]) loadInvoiceTrx(inv.id, contractId);
      });
    }

    // ─── Invoice detail (transactions) ───

    async function loadInvoiceTrx(invoiceId, contractId) {
      const inner = document.getElementById(`inv-inner-${invoiceId}`);
      if (!inner) return;
      try {
        const [trxs, invFiles] = await Promise.all([
          apiFetch(`/transactions?invoice_id=${invoiceId}`),
          apiFetch(`/invoice_files?invoice_id=${invoiceId}`),
        ]);
        invoiceTrx[invoiceId] = trxs;
        renderInvoiceTrx(invoiceId, trxs, contractId, invFiles);
      } catch(e) {
        inner.innerHTML = `<div style="color:#c33">${e.message}</div>`;
      }
    }

    function renderInvoiceTrx(invoiceId, trxs, contractId, invFiles) {
      const inner = document.getElementById(`inv-inner-${invoiceId}`);
      if (!inner) return;

      // Invoice files
      let html = renderFileList(invFiles, 'invoice', invoiceId, contractId);

      html += `<div style="display:flex;gap:8px;margin:8px 0">
        <button class="btn btn-primary" style="font-size:0.72rem;padding:3px 10px" data-action="add-trx" data-inv-id="${invoiceId}" data-contract-id="${contractId}">${t('addTransaction')}</button>
      </div>`;

      if (!trxs.length) {
        html += `<div style="color:#bbb;font-size:0.82rem">${t('noTransactions')}</div>`;
      } else {
        html += `<table class="trx-mini-table"><thead><tr>

    // ─── Actions ───

    document.addEventListener('click', async e => {
      // Toggle review
      const reviewBtn = e.target.closest('[data-action="toggle-review"]');
      if (reviewBtn) {
        const id = reviewBtn.dataset.id;
        const c = allContracts.find(x => x.id === id);
        if (!c) return;
        const newVal = !c.needs_review;
        try {
          await apiFetch(`/contracts/${id}`, { method: 'PUT', body: JSON.stringify({
            name: c.name, needs_review: newVal, status: c.status,
            direction: c.direction || 'expense',
            total_amount: String(numVal(c.total_amount)),
            subtotal: String(numVal(c.subtotal)),
            vat_amount: String(numVal(c.vat_amount)),
            progress_pct: String(numVal(c.progress_pct)),
            progress_notes: c.progress_notes || '',
            responsible_email: c.responsible_email || '',
            payment_terms: c.payment_terms || '',
            notes: c.notes || '',
          })});
          c.needs_review = newVal;
          renderContracts();
        } catch(err) { showToast(err.message, 'error'); }
        return;
      }

      // Sort header click
      const sortTh = e.target.closest('.sortable');
      if (sortTh) {
        const field = sortTh.dataset.sort;
        if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortField = field; sortDir = 'asc'; }
        renderContracts();
        updateSortArrows();
        return;
      }

      // Expand contract
      const expC = e.target.closest('[data-expand-contract]');
      if (expC) {
        const id = expC.dataset.expandContract;
        expandedContracts[id] = !expandedContracts[id];
        renderContracts();
        return;
      }

      // Expand invoice
      const expI = e.target.closest('[data-expand-invoice]');
      if (expI) {
        const id = expI.dataset.expandInvoice;
        expandedInvoices[id] = !expandedInvoices[id];
        const contractId = expI.dataset.contractId;
        renderContractDetail(contractId, contractInvoices[contractId] || [], contractFilesCache[contractId] || [], contractDirectTrx[contractId] || []);
        if (expandedInvoices[id]) loadInvoiceTrx(id, contractId);

      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'edit-contract') {
        const c = allContracts.find(x => x.id === btn.dataset.id);
        if (!c) return;
        currentContractMode = 'edit'; currentContractId = c.id;
        document.getElementById('t-modal-contract-title').textContent = t('editContract');
        fillModalFolders(c.folder_id); fillModalContractors(c.contractor_id);
        document.getElementById('c-name').value = c.name || '';
        document.getElementById('c-extref').value = c.external_ref || '';
        document.getElementById('c-date').value = c.date ? (c.date.value || c.date).split('T')[0] : '';
        document.getElementById('c-direction').value = c.direction || 'expense';
        document.getElementById('c-status-select').value = c.status || 'estimate';
        fillResponsibleSelect('c-responsible', c.responsible_email || '');
        document.getElementById('c-subtotal').value = numVal(c.subtotal) || '';
        document.getElementById('c-vat').value = numVal(c.vat_amount) || '';
        document.getElementById('c-total').value = numVal(c.total_amount) || '';
        document.getElementById('c-terms').value = c.payment_terms || '';
        document.getElementById('c-notes').value = c.notes || '';
        document.getElementById('c-progress').value = numVal(c.progress_pct) || '';
        document.getElementById('c-progress-notes').value = c.progress_notes || '';
        openModal('modal-contract');
      }

      if (action === 'delete-contract') {
        if (!confirm(t('confirmDelete'))) return;
        btn.disabled = true;
        try {
          await apiFetch(`/contracts/${btn.dataset.id}`, { method: 'DELETE' });
          showToast(t('deleted'), 'success'); loadContracts();
        } catch(err) { showToast(err.message, 'error'); btn.disabled = false; }

        document.getElementById('i-direction').value = contract.direction || 'expense';

        document.getElementById('i-subtotal').value = '';
        document.getElementById('i-vat-rate').value = '7';
        document.getElementById('i-vat-amount').value = '';
        document.getElementById('i-wht-rate').value = '0';
        document.getElementById('i-wht-amount').value = '';
        document.getElementById('i-total').value = '';
        document.getElementById('i-payable-val').textContent = '—';

        const contractId = btn.dataset.contractId;

            name: inv.name, status: inv.status, direction: inv.direction,
            total_amount: String(numVal(inv.total_amount)), paid_amount: String(numVal(inv.paid_amount)),
            subtotal: String(numVal(inv.subtotal)), vat_rate: String(numVal(inv.vat_rate)),
            vat_amount: String(numVal(inv.vat_amount)), wht_rate: String(numVal(inv.wht_rate)),
            wht_amount: String(numVal(inv.wht_amount)),
            category_id: inv.category_id || '', contractor_id: inv.contractor_id || '',
            contract_id: '', date: inv.date ? (inv.date.value || inv.date) : '',
          })});
          showToast(t('saved'), 'success');
          loadContractDetail(contractId);
          loadContracts(); // refresh totals
        } catch(err) { showToast(err.message, 'error'); btn.disabled = false; }

      if (action === 'pick-link-inv') {

        const contractId = currentInvContractId;
        btn.disabled = true;

          const contract = allContracts.find(c => c.id === contractId);

            name: btn.dataset.name, status: btn.dataset.status || 'active',

            total_amount: btn.dataset.total || '0', paid_amount: btn.dataset.paid || '0',
            subtotal: btn.dataset.subtotal || '0', vat_rate: btn.dataset.vatRate || '0',
            vat_amount: btn.dataset.vatAmount || '0', wht_rate: btn.dataset.whtRate || '0',
            wht_amount: btn.dataset.whtAmount || '0',
            category_id: btn.dataset.category || '', contractor_id: contract?.contractor_id || '',
            contract_id: contractId, date: btn.dataset.date || '',
          })});
          closeModal('modal-link-inv');
          showToast(t('saved'), 'success');
          loadContractDetail(contractId);
          loadContracts();
        } catch(err) { showToast(err.message, 'error'); btn.disabled = false; }
      }

      if (action === 'edit-direct-trx') {
        const contractId = btn.dataset.contractId;
        const contract = allContracts.find(c => c.id === contractId);
        currentTrxMode = 'edit'; currentTrxId = btn.dataset.id; currentTrxInvoiceId = null;
        window._directPaymentContractId = contractId;
        document.getElementById('t-modal-trx-title').textContent = t('edit');
        document.getElementById('tx-date').value = btn.dataset.date ? btn.dataset.date.split('T')[0] : '';
        document.getElementById('tx-direction').value = btn.dataset.direction || 'expense';
        document.getElementById('tx-amount').value = btn.dataset.amount;
        document.getElementById('tx-desc').value = btn.dataset.desc || '';
        fillAccountSelect(contract?.folder_id);
        document.getElementById('tx-account').value = btn.dataset.account || '';
        fillCategorySelect('tx-category', btn.dataset.category || '');
        openModal('modal-trx');
      }

      if (action === 'delete-direct-trx') {
        if (!confirm(t('confirmDelete'))) return;
        btn.disabled = true;
        const contractId = btn.dataset.contractId;
        try {
          await apiFetch(`/transactions/${btn.dataset.id}`, { method: 'DELETE' });
          showToast(t('deleted'), 'success');
          loadContractDetail(contractId);
          loadContracts();
        } catch(err) { showToast(err.message, 'error'); btn.disabled = false; }
      }

      if (action === 'add-direct-payment') {
        const contractId = btn.dataset.contractId;
        const contract = allContracts.find(c => c.id === contractId);
        currentTrxMode = 'create'; currentTrxId = null; currentTrxInvoiceId = null;
        // Store contract_id for save
        window._directPaymentContractId = contractId;
        document.getElementById('t-modal-trx-title').textContent = t('addTransaction');
        document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('tx-direction').value = contract?.direction || 'expense';
        document.getElementById('tx-amount').value = '';
        document.getElementById('tx-desc').value = contract?.name ? `Payment: ${contract.name}` : '';
        fillAccountSelect(contract?.folder_id);
        fillCategorySelect('tx-category', '');
        openModal('modal-trx');
      }

      if (action === 'add-trx') {
        const invoiceId = btn.dataset.invId;
        const contractId = btn.dataset.contractId;
        const contract = allContracts.find(c => c.id === contractId);
        const invs = contractInvoices[contractId] || [];
        const inv = invs.find(i => i.id === invoiceId);
        currentTrxMode = 'create'; currentTrxId = null; currentTrxInvoiceId = invoiceId;
        window._directPaymentContractId = null;
        document.getElementById('t-modal-trx-title').textContent = t('addTransaction');
        document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('tx-direction').value = inv?.direction || 'expense';
        document.getElementById('tx-amount').value = '';
        document.getElementById('tx-desc').value = '';
        fillAccountSelect(contract?.folder_id);
        fillCategorySelect('tx-category', '');
        openModal('modal-trx');
      }

      // ─── File actions ───

      if (action === 'add-file') {
        const entityType = btn.dataset.entityType;
        const entityId = btn.dataset.entityId;
        const contractId = btn.dataset.contractId;
        const contract = allContracts.find(c => c.id === contractId);
        fileUploadCtx = { type: entityType, id: entityId, folderId: contract?.folder_id || btn.dataset.folderId || '', contractId };
        document.getElementById('file-input').value = '';
        openModal('modal-file');
      }

      if (action === 'view-pdf') {
        const entityType = btn.dataset.entityType;
        const fileId = btn.dataset.fileId;
        const fileName = btn.dataset.fileName || 'PDF';
        const endpoint = entityType === 'contract' ? 'contract_files' : entityType === 'invoice' ? 'invoice_files' : 'transaction_files';
        try {
          const r = await apiFetch(`/${endpoint}/${fileId}/signed-download-url?view=true`);
          if (r.url) {
            document.getElementById('pdf-title').textContent = fileName;
            // Use Google Docs Viewer for reliable PDF rendering in iframe
            document.getElementById('pdf-iframe').src = `https://docs.google.com/gview?url=${encodeURIComponent(r.url)}&embedded=true`;
            openModal('modal-pdf');
          }
        } catch(err) { showToast(err.message, 'error'); }
      }

      if (action === 'download-file') {
        const entityType = btn.dataset.entityType;
        const fileId = btn.dataset.fileId;
        const endpoint = entityType === 'contract' ? 'contract_files' : entityType === 'invoice' ? 'invoice_files' : 'transaction_files';
        try {
          const r = await apiFetch(`/${endpoint}/${fileId}/signed-download-url`);
          if (r.url) window.open(r.url, '_blank');
        } catch(err) { showToast(err.message, 'error'); }
      }

      if (action === 'delete-file') {
        if (!confirm(t('confirmDelete'))) return;
        btn.disabled = true;
        const entityType = btn.dataset.entityType;
        const fileId = btn.dataset.fileId;
        const contractId = btn.dataset.contractId;
        const entityId = btn.dataset.entityId;
        const endpoint = entityType === 'contract' ? 'contract_files' : entityType === 'invoice' ? 'invoice_files' : 'transaction_files';
        try {
          await apiFetch(`/${endpoint}/${fileId}`, { method: 'DELETE' });
          showToast(t('deleted'), 'success');
          if (entityType === 'contract') loadContractDetail(contractId);
          else if (entityType === 'invoice') {
            // Find which contract owns this invoice
            for (const [cId, invs] of Object.entries(contractInvoices)) {
              if (invs.find(i => i.id === entityId)) { loadInvoiceTrx(entityId, cId); break; }
            }
          }
        } catch(err) { showToast(err.message, 'error'); btn.disabled = false; }
      }
    });

    // ─── Link invoice modal ───

    async function openLinkInvModal(contractId) {
      const contract = allContracts.find(c => c.id === contractId);
      if (!contract) return;
      const list = document.getElementById('link-inv-list');
      document.getElementById('t-link-inv-title').textContent = t('linkInvoice');
      list.innerHTML = `<div class="loading">${t('loading')}</div>`;
      openModal('modal-link-inv');
      try {
        const invs = await apiFetch(`/invoices?folder_id=${contract.folder_id}&limit=500`);
        const unlinked = (invs.rows || invs).filter(i =>
          !i.contract_id && i.contractor_id === contract.contractor_id && i.status !== 'deleted'
        );
        if (!unlinked.length) {
          list.innerHTML = `<div style="padding:20px;text-align:center;color:#bbb">${t('noInvoices')}</div>`;
          return;
        }
        list.innerHTML = unlinked.map(i => `
          <div style="padding:8px 12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center">
            <div>
              <strong>${i.name}</strong> <span style="color:#888;font-size:0.82rem">${formatDate(i.date)}</span>
              <br><span style="font-size:0.82rem;color:#666">${fmt(numVal(i.total_amount))}</span>
            </div>
            <button class="btn btn-primary" style="font-size:0.75rem;padding:3px 10px" data-action="pick-link-inv"
              data-inv-id="${i.id}" data-name="${(i.name||'').replace(/"/g,'&quot;')}"
              data-status="${i.status||'active'}" data-direction="${i.direction||'expense'}"
              data-total="${numVal(i.total_amount)}" data-paid="${numVal(i.paid_amount)}"
              data-subtotal="${numVal(i.subtotal)}" data-vat-rate="${numVal(i.vat_rate)}"
              data-vat-amount="${numVal(i.vat_amount)}" data-wht-rate="${numVal(i.wht_rate)}"
              data-wht-amount="${numVal(i.wht_amount)}" data-category="${i.category_id||''}"
              data-date="${i.date?(i.date.value||i.date):''}">${t('linkInvoice')}</button>
          </div>
        `).join('');
      } catch(e) { list.innerHTML = `<div style="color:#c33;padding:16px">${e.message}</div>`; }
    }

    // ─── Modal helpers ───

    function fillModalFolders(selectedId) {
      const sel = document.getElementById('c-folder');
      const list = filterCompany ? foldersCache.filter(f => f.company_id === filterCompany) : foldersCache;
      sel.innerHTML = `<option value="">—</option>`;
      list.forEach(f => {
        if (f.status === 'archive') return;
        const opt = document.createElement('option');
        opt.value = f.id; opt.textContent = f.name;
        if (f.id === selectedId) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function fillModalContractors(selectedId) {
      const sel = document.getElementById('c-contractor');
      sel.innerHTML = `<option value="">—</option>`;
      contractorsCache.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name_en || c.name_th || '—';
        if (c.id === selectedId) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function fillCategorySelect(selectId, selectedId) {
      const sel = document.getElementById(selectId);
      sel.innerHTML = `<option value="">— ${t('noCategory')} —</option>`;
      categoriesCache.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c['name_' + currentLang] || c.name || '—';
        if (c.id === selectedId) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function fillAccountSelect(folderId) {
      const sel = document.getElementById('tx-account');
      // Find company from folder
      const folder = foldersCache.find(f => f.id === folderId);
      const companyId = folder?.company_id || filterCompany;
      const list = companyId ? accountsCache.filter(a => a.company_id === companyId) : accountsCache;
      sel.innerHTML = `<option value="">—</option>`;
      list.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id; opt.textContent = a.name + (a.bank_name ? ' · ' + a.bank_name : '');
        sel.appendChild(opt);
      });
    }

    document.getElementById('btn-create').addEventListener('click', () => {
      if (!filterCompany) { showToast(t('selectCompanyFirst'), 'error'); return; }

      document.getElementById('t-modal-contract-title').textContent = t('createContract');

    document.getElementById('btn-c-save').addEventListener('click', async () => {
      const folder_id = document.getElementById('c-folder').value;
      const contractor_id = document.getElementById('c-contractor').value;
      const name = document.getElementById('c-name').value.trim();
      const total = document.getElementById('c-total').value;

      document.querySelectorAll('#modal-contract .invalid').forEach(el => el.classList.remove('invalid'));

      if (!folder_id) missing.push('c-folder');
      if (!contractor_id) missing.push('c-contractor');
      if (!name) missing.push('c-name');
      if (!total) missing.push('c-total');
      if (missing.length) {
        missing.forEach(id => document.getElementById(id).classList.add('invalid'));
        showToast(t('fillAllFields'), 'error'); return;

      const body = {
        folder_id, contractor_id, name,
        external_ref: document.getElementById('c-extref').value.trim(),

        progress_pct: document.getElementById('c-progress').value || '0',

        responsible_email: document.getElementById('c-responsible').value || '',

    // ─── Create transaction ───

    document.getElementById('btn-tx-cancel').addEventListener('click', () => closeModal('modal-trx'));
    document.getElementById('btn-tx-save').addEventListener('click', async () => {
      const date = document.getElementById('tx-date').value;
      const amount = document.getElementById('tx-amount').value;
      const account_id = document.getElementById('tx-account').value;
      const category_id = document.getElementById('tx-category').value;

      document.querySelectorAll('#modal-trx .invalid').forEach(el => el.classList.remove('invalid'));
      const missing = [];
      if (!date) missing.push('tx-date');
      if (!account_id) missing.push('tx-account');
      if (!category_id) missing.push('tx-category');
      if (missing.length) {
        missing.forEach(id => document.getElementById(id).classList.add('invalid'));
        showToast(t('fillAllFields'), 'error'); return;
      }

      // Get context: invoice-linked or direct contract payment
      const invId = currentTrxInvoiceId;
      const directContractId = window._directPaymentContractId || null;
      let folderId = '', contractorId = '', reloadContractId = '';

      if (invId) {
        for (const [cId, invs] of Object.entries(contractInvoices)) {
          const inv = invs.find(i => i.id === invId);
          if (inv) { folderId = inv.folder_id; contractorId = inv.contractor_id; reloadContractId = cId; break; }
        }
      } else if (directContractId) {
        const contract = allContracts.find(c => c.id === directContractId);
        if (contract) { folderId = contract.folder_id; contractorId = contract.contractor_id; reloadContractId = directContractId; }
      }

      closeModal('modal-trx');
      try {
        const txBody = {
          date, amount, direction: document.getElementById('tx-direction').value,
          category_id, description: document.getElementById('tx-desc').value,
          invoice_id: invId || '', folder_id: folderId, account_id, contractor_id: contractorId,
          contract_id: directContractId || '',
        };
        if (currentTrxMode === 'edit' && currentTrxId) {
          await apiFetch(`/transactions/${currentTrxId}`, { method: 'PUT', body: JSON.stringify(txBody) });
        } else {
          await apiFetch('/transactions', { method: 'POST', body: JSON.stringify(txBody) });
        }
        showToast(t('saved'), 'success');
        window._directPaymentContractId = null;
        if (reloadContractId) {
          loadContractDetail(reloadContractId);
          loadContracts();
        }
      } catch(e) { showToast(e.message, 'error'); }
    });

    document.getElementById('btn-link-inv-cancel').addEventListener('click', () => closeModal('modal-link-inv'));

    // ─── File upload ───
    document.getElementById('btn-file-cancel').addEventListener('click', () => closeModal('modal-file'));
    document.getElementById('btn-file-save').addEventListener('click', async () => {
      const file = document.getElementById('file-input').files[0];
      if (!file || !fileUploadCtx) { showToast(t('selectFile'), 'error'); return; }
      closeModal('modal-file');
      showToast(t('uploading'));
      const ctx = fileUploadCtx;
      try {
        const contentType = file.type || 'application/octet-stream';
        let endpoint, signBody, regBody;
        if (ctx.type === 'contract') {
          endpoint = 'contract_files';
          signBody = { contract_id: ctx.id, folder_id: ctx.folderId, file_name: file.name, content_type: contentType };
          regBody = (url) => ({ contract_id: ctx.id, file_name: file.name, file_url: url, file_size: file.size });
        } else if (ctx.type === 'invoice') {
          endpoint = 'invoice_files';
          signBody = { invoice_id: ctx.id, folder_id: ctx.folderId, file_name: file.name, content_type: contentType };
          regBody = (url) => ({ invoice_id: ctx.id, file_name: file.name, file_url: url, file_size: file.size });
        } else {
          endpoint = 'transaction_files';
          signBody = { transaction_id: ctx.id, folder_id: ctx.folderId, file_name: file.name, content_type: contentType };
          regBody = (url) => ({ transaction_id: ctx.id, file_name: file.name, file_url: url, file_size: file.size });
        }

        const { upload_url, file_url } = await apiFetch(`/${endpoint}/signed-upload-url`, {
          method: 'POST', body: JSON.stringify(signBody),
        });
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('PUT', upload_url);
          xhr.setRequestHeader('Content-Type', contentType);
          xhr.onload = () => xhr.status === 200 ? resolve() : reject(new Error('Upload failed'));
          xhr.onerror = () => reject(new Error('Upload error'));
          xhr.send(file);
        });
        await apiFetch(`/${endpoint}`, { method: 'POST', body: JSON.stringify(regBody(file_url)) });
        showToast(t('uploaded'), 'success');

        // Reload relevant detail
        if (ctx.type === 'contract') {
          loadContractDetail(ctx.id);
        } else if (ctx.type === 'invoice') {
          for (const [cId, invs] of Object.entries(contractInvoices)) {
            if (invs.find(i => i.id === ctx.id)) { loadInvoiceTrx(ctx.id, cId); break; }
          }
        }
      } catch(e) { showToast(e.message, 'error'); }
    });

    // ─── Keyboard ───
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeModal('modal-contract');
        closeModal('modal-invoice');
        closeModal('modal-trx');
        closeModal('modal-link-inv');
        closeModal('modal-file');
        closeModal('modal-pdf'); document.getElementById('pdf-iframe').src = '';
      }
    });

    // ─── Init ───
    window.onLogin = async () => {
      updateTexts();
      await loadRefs();
      fillFolderFilter(); fillContractorFilter();
    };
    window.onLogout = () => { updateTexts(); };
    window.onLangChange = () => { updateTexts(); renderContracts(); };

    renderHeader('contracts');
    updateTexts();
  </script>
</body>
</html>
