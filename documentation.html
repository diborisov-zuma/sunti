<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunti — Документация</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="_pdf_viewer.js"></script>
  <script src="_i18n.js"></script>
  <script src="_config.js"></script>
  <script src="_auth.js"></script>
  <script src="_header.js"></script>
  <style>
    /* Override sidebar width: 286px (220 + 30%) */
    .sidebar { width:286px; }

    select.filter-select {
      border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:0.85rem;color:#333;outline:none;background:#fff;cursor:pointer;
    }
    select.filter-select:focus { border-color:#1a73e8; }

    .cat-item {
      display:flex;align-items:center;gap:6px;
      padding:6px 12px;cursor:pointer;font-size:0.88rem;color:#333;
      border-radius:6px;margin:1px 6px;transition:background 0.1s;
    }
    .cat-item:hover { background:#f4f4f4; }
    .cat-item.active { background:#e8f0fe; }
    .cat-item.active .cat-name { color:#1a73e8;font-weight:500; }
    .cat-name { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .cat-actions { display:none;gap:2px;flex-shrink:0; }
    .cat-item:hover .cat-actions { display:flex; }

    .doc-card { background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px 18px;margin-bottom:10px;transition:border-color 0.15s; }
    .doc-card:hover { border-color:#1a73e8; }
    .doc-card-header { display:flex;justify-content:space-between;align-items:center;gap:12px; }
    .doc-card-name { font-size:0.95rem;font-weight:500;color:#222;flex:1; }
    .doc-card-version { font-size:0.78rem;color:#1a73e8;font-weight:600; }
    .doc-card-meta { font-size:0.78rem;color:#999;margin-top:4px; }
    .doc-card-desc { font-size:0.84rem;color:#666;margin-top:6px; }

    .version-list { margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0; }
    .version-row { display:flex;align-items:center;gap:10px;padding:4px 0;font-size:0.82rem; }
    .version-row .v-num { font-weight:600;color:#1a73e8;min-width:28px; }
    .version-row .v-date { color:#888;min-width:80px; }
    .version-row .v-file { color:#333;flex:1; }
    .version-row .v-notes { color:#666;font-style:italic;flex:2; }

    .empty-state { text-align:center;padding:64px 24px;color:#bbb; }
    .loading { text-align:center;padding:48px;color:#bbb; }

    .field-group { margin-bottom:12px; }
    .field-group label { display:block;font-size:0.82rem;color:#666;margin-bottom:4px; }
    .field-group input, .field-group select, .field-group textarea {
      width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:0.9rem;outline:none;box-sizing:border-box;background:#fff;
    }
    .field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color:#1a73e8; }
    .fields-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .badge-current { background:#e6f4ea;color:#1e8e3e;padding:1px 6px;border-radius:8px;font-size:0.68rem;font-weight:600; }
  </style>
</head>
<body>
  <header id="header"></header>

  <div id="guest-view"><h2 id="t-guest-title"></h2><p id="t-guest-sub"></p></div>

  <div id="app-view" style="display:none">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title" id="t-categories-title"></span>
        </div>
        <div style="padding:8px">
          <select class="filter-select" id="filter-folder" style="width:100%">
            <option value="">—</option>
          </select>
        </div>
        <div id="cat-list" style="flex:1;overflow-y:auto;padding:4px 0"></div>
        <div style="padding:8px" id="cat-admin-btns" style="display:none">
          <button class="btn btn-outline" style="width:100%;font-size:0.78rem" id="btn-add-cat"></button>
        </div>
      </div>
      <div class="main-area" id="doc-main">
        <div class="empty-state" id="t-select-project"></div>
      </div>
    </div>
  </div>

  <!-- Модалка: документ -->
  <div class="modal-overlay" id="modal-doc">
    <div class="modal" style="width:500px;max-width:95vw">
      <h3 id="t-modal-doc-title"></h3>
      <div class="field-group">
        <label class="required" id="lbl-doc-name"></label>
        <input type="text" id="doc-name">
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label id="lbl-doc-category"></label>
          <select id="doc-category"></select>
        </div>
        <div class="field-group">
          <label id="lbl-doc-order"></label>
          <input type="number" id="doc-order" min="0" value="0">
        </div>
      </div>
      <div class="field-group">
        <label id="lbl-doc-desc"></label>
        <textarea id="doc-desc" rows="2"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-doc-cancel"></button>
        <button class="btn btn-primary" id="btn-doc-save"></button>
      </div>
    </div>
  </div>

  <!-- Модалка: загрузить версию (мульти-файл) -->
  <div class="modal-overlay" id="modal-version">
    <div class="modal" style="width:520px;max-width:95vw">
      <h3 id="t-modal-ver-title"></h3>
      <div class="field-group">
        <label id="lbl-ver-file"></label>
        <input type="file" id="ver-file" multiple style="padding:6px">
      </div>
      <div class="field-group">
        <label id="lbl-ver-notes"></label>
        <input type="text" id="ver-notes" placeholder="">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-ver-cancel"></button>
        <button class="btn btn-primary" id="btn-ver-save"></button>
      </div>
    </div>
  </div>

  <!-- Модалка: добавить файлы к существующей версии -->
  <div class="modal-overlay" id="modal-add-files">
    <div class="modal" style="width:520px;max-width:95vw">
      <h3 id="t-modal-addfiles-title"></h3>
      <div class="field-group">
        <label id="lbl-addfiles-file"></label>
        <input type="file" id="addfiles-file" multiple style="padding:6px">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-addfiles-cancel"></button>
        <button class="btn btn-primary" id="btn-addfiles-save"></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allDocs = [];
    let categories = [];
    let foldersCache = [];
    let selectedFolder = '';
    let selectedCategory = '';
    let accessLevel = 'none';
    let expandedDocs = {};
    let docVersions = {};
    let currentDocMode = 'create';
    let currentDocId = null;
    let currentVerDocId = null;
    let currentAddFilesVerId = null;
    let currentAddFilesDocId = null;
    let versionFilesCache = {}; // verId → [files]

    function fmt(v) { const n=parseFloat(v); return isNaN(n)?'—':n; }
    function formatDate(val) {
      if (!val) return '—';
      const d = new Date(val.value || val);
      if (isNaN(d)) return '—';
      return `${String(d.getUTCDate()).padStart(2,'0')}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${d.getUTCFullYear()}`;
    }
    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 3000);
    }
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function catLabel(c) { return c['name_' + currentLang] || c.name || c.name_en || '—'; }

    function updateTexts() {
      document.getElementById('t-guest-title').textContent = t('guestTitle');
      document.getElementById('t-guest-sub').textContent = t('guestSub');
      document.getElementById('t-categories-title').textContent = t('docCategories');
      document.getElementById('t-select-project').textContent = t('portalSelectProject');
      document.getElementById('btn-add-cat').textContent = t('addDocCategory');
      document.getElementById('t-modal-doc-title').textContent = t('addDocument');
      document.getElementById('lbl-doc-name').textContent = t('documentName');
      document.getElementById('lbl-doc-category').textContent = t('category');
      document.getElementById('lbl-doc-order').textContent = t('orderLabel');
      document.getElementById('lbl-doc-desc').textContent = t('description');
      document.getElementById('btn-doc-cancel').textContent = t('cancel');
      document.getElementById('btn-doc-save').textContent = t('save');
      document.getElementById('t-modal-ver-title').textContent = t('uploadVersion');
      document.getElementById('lbl-ver-file').textContent = t('file');
      document.getElementById('lbl-ver-notes').textContent = t('versionNotes');
      document.getElementById('btn-ver-cancel').textContent = t('cancel');
      document.getElementById('btn-ver-save').textContent = t('save');
      document.getElementById('t-modal-addfiles-title').textContent = t('addFilesToVersion');
      document.getElementById('lbl-addfiles-file').textContent = t('file');
      document.getElementById('btn-addfiles-cancel').textContent = t('cancel');
      document.getElementById('btn-addfiles-save').textContent = t('save');
      updateHeaderTexts();
    }

    async function loadRefs() {
      try { foldersCache = await apiFetch('/folders?access=docs'); } catch(e) { foldersCache = []; }
      fillFolderSelect();
    }

    function fillFolderSelect() {
      const sel = document.getElementById('filter-folder');
      sel.innerHTML = `<option value="">${t('portalSelectProject')}</option>`;
      foldersCache.forEach(f => {
        if (f.status === 'archive') return;
        const opt = document.createElement('option');
        opt.value = f.id; opt.textContent = f.name;
        sel.appendChild(opt);
      });
    }

    document.getElementById('filter-folder').addEventListener('change', e => {
      selectedFolder = e.target.value;
      selectedCategory = '';
      if (selectedFolder) loadDocs();
      else document.getElementById('doc-main').innerHTML = `<div class="empty-state">${t('portalSelectProject')}</div>`;
    });

    async function loadDocs() {
      const main = document.getElementById('doc-main');
      main.innerHTML = `<div class="loading">${t('loading')}</div>`;
      try {
        // Load categories for this folder
        try { categories = await apiFetch(`/project_doc_categories?folder_id=${selectedFolder}`); } catch(e) { categories = []; }
        const data = await apiFetch(`/project_docs?folder_id=${selectedFolder}`);
        allDocs = data.rows || [];
        accessLevel = data.access_level || 'none';
        renderCategories();
        renderDocs();
      } catch(e) { main.innerHTML = `<div class="empty-state">${e.message}</div>`; }
    }

    function renderCategories() {
      const list = document.getElementById('cat-list');
      // Count docs per category
      const docCountByCat = {};
      allDocs.forEach(d => { if (d.category_id) docCountByCat[d.category_id] = (docCountByCat[d.category_id] || 0) + 1; });

      list.innerHTML = `<div class="cat-item ${!selectedCategory ? 'active' : ''}" data-cat-id=""><span class="cat-name">${t('allCategories')}</span></div>`;
      categories.forEach(c => {
        const count = docCountByCat[c.id] || 0;
        const actions = isAdmin ? `<span class="cat-actions">
          <button class="icon-btn" data-cat-action="rename" data-cat-id="${c.id}" title="${t('rename')}">✎</button>
          ${count === 0 ? `<button class="icon-btn del" data-cat-action="delete" data-cat-id="${c.id}" title="${t('delete')}">✕</button>` : ''}
        </span>` : '';
        list.innerHTML += `<div class="cat-item ${selectedCategory === c.id ? 'active' : ''}" data-cat-id="${c.id}"><span class="cat-name">${catLabel(c)}</span>${actions}</div>`;
      });

      // Show admin buttons (add category)
      const adminBtns = document.getElementById('cat-admin-btns');
      if (adminBtns) adminBtns.style.display = isAdmin ? '' : 'none';
    }

    document.getElementById('cat-list').addEventListener('click', async e => {
      // Rename category
      const renameBtn = e.target.closest('[data-cat-action="rename"]');
      if (renameBtn) {
        e.stopPropagation();
        const catId = renameBtn.dataset.catId;
        const cat = categories.find(c => c.id === catId);
        if (!cat) return;
        const newName = prompt(t('rename'), catLabel(cat));
        if (!newName || newName === catLabel(cat)) return;
        try {
          await apiFetch(`/project_doc_categories/${catId}`, { method: 'PUT', body: JSON.stringify({ name: newName, name_en: newName }) });
          categories = await apiFetch(`/project_doc_categories?folder_id=${selectedFolder}`);
          renderCategories();
          showToast(t('saved'), 'success');
        } catch(err) { showToast(err.message, 'error'); }
        return;
      }
      // Delete category
      const deleteBtn = e.target.closest('[data-cat-action="delete"]');
      if (deleteBtn) {
        e.stopPropagation();
        const catId = deleteBtn.dataset.catId;
        if (!confirm(t('confirmDelete'))) return;
        deleteBtn.disabled = true;
        try {
          await apiFetch(`/project_doc_categories/${catId}`, { method: 'DELETE' });
          categories = await apiFetch(`/project_doc_categories?folder_id=${selectedFolder}`);
          if (selectedCategory === catId) selectedCategory = '';
          renderCategories();
          renderDocs();
          showToast(t('deleted'), 'success');
        } catch(err) { showToast(err.message, 'error'); deleteBtn.disabled = false; }
        return;
      }
      // Select category
      const item = e.target.closest('.cat-item');
      if (!item) return;
      selectedCategory = item.dataset.catId;
      renderCategories();
      renderDocs();
    });

    function renderDocs() {
      const main = document.getElementById('doc-main');
      let filtered = allDocs;
      if (selectedCategory) filtered = filtered.filter(d => d.category_id === selectedCategory);

      let html = '';
      if (accessLevel === 'editor') {
        html += `<div style="margin-bottom:16px">
          <button class="btn btn-primary" id="btn-add-doc">${t('addDocument')}</button>
        </div>`;
      }

      if (!filtered.length) {
        html += `<div class="empty-state">${t('noDocuments')}</div>`;
        main.innerHTML = html;
        bindAddDoc();
        return;
      }

      filtered.forEach(d => {
        const isExp = expandedDocs[d.id];
        const catName = d.category_name_en || d.category_name || '';
        html += `<div class="doc-card" data-doc-id="${d.id}">
          <div class="doc-card-header">
            <div class="doc-card-name">${d.name || '—'}</div>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="doc-card-version">v${d.current_version || 0}</span>
              ${d.latest_version_id && d.latest_file_name ? `<button class="btn btn-outline" style="padding:2px 8px;font-size:0.75rem" data-action="download" data-ver-id="${d.latest_version_id}">${t('download')}</button>` : ''}
              ${accessLevel === 'editor' ? `
                <button class="btn btn-outline" style="padding:2px 8px;font-size:0.75rem" data-action="upload-ver" data-doc-id="${d.id}">${t('uploadVersion')}</button>
                <button class="btn btn-outline" style="padding:2px 8px;font-size:0.75rem" data-action="edit-doc" data-doc-id="${d.id}">${t('edit')}</button>
                <button class="btn btn-outline" style="padding:2px 8px;font-size:0.75rem;color:#c5221f" data-action="delete-doc" data-doc-id="${d.id}">${t('delete')}</button>
              ` : ''}
            </div>
          </div>
          ${catName ? `<div class="doc-card-meta">${catName}</div>` : ''}
          ${d.description ? `<div class="doc-card-desc">${d.description}</div>` : ''}
          ${d.latest_files_count > 0 || d.latest_file_name ? `<div class="doc-card-meta">${d.latest_files_count > 0 ? d.latest_files_count + ' ' + t('filesCount') : (d.latest_file_name || '')} · ${formatDate(d.latest_uploaded_at)}${d.latest_notes ? ' · ' + d.latest_notes : ''}</div>` : ''}
          <div style="margin-top:6px">
            <button style="background:none;border:none;cursor:pointer;font-size:0.78rem;color:#1a73e8" data-action="toggle-versions" data-doc-id="${d.id}">${isExp ? '▾' : '▸'} ${t('versionHistory')} ${d.current_version ? '('+d.current_version+')' : ''}</button>
          </div>
          ${isExp ? `<div class="version-list" id="versions-${d.id}">${docVersions[d.id] ? renderVersions(d.id) : '<div class="loading" style="padding:8px">'+t('loading')+'</div>'}</div>` : ''}
        </div>`;
      });

      main.innerHTML = html;
      bindAddDoc();

      // Load versions for expanded docs
      filtered.forEach(d => {
        if (expandedDocs[d.id] && !docVersions[d.id]) loadVersions(d.id);
      });
    }

    function bindAddDoc() {
      const btn = document.getElementById('btn-add-doc');
      if (btn) btn.addEventListener('click', () => {
        currentDocMode = 'create'; currentDocId = null;
        document.getElementById('t-modal-doc-title').textContent = t('addDocument');
        document.getElementById('doc-name').value = '';
        document.getElementById('doc-desc').value = '';
        document.getElementById('doc-order').value = '0';
        // Pre-select the category currently chosen in the left sidebar (if any)
        fillDocCategorySelect(selectedCategory || '');
        openModal('modal-doc');
      });
    }

    function fillDocCategorySelect(selectedId) {
      const sel = document.getElementById('doc-category');
      sel.innerHTML = `<option value="">—</option>`;
      categories.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = catLabel(c);
        if (c.id === selectedId) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    async function loadVersions(docId) {
      try {
        const rows = await apiFetch(`/project_docs/${docId}/versions`);
        docVersions[docId] = rows;
        const el = document.getElementById(`versions-${docId}`);
        if (el) el.innerHTML = renderVersions(docId);
      } catch(e) { console.error(e); }
    }

    function renderVersions(docId) {
      const versions = docVersions[docId] || [];
      if (!versions.length) return `<div style="color:#bbb;font-size:0.82rem">—</div>`;
      return versions.map((v, i) => {
        const fc = parseInt(v.files_count) || 0;
        const hasLegacyFile = v.file_name && v.file_url;
        const totalFiles = fc + (hasLegacyFile ? 1 : 0);
        const filesLoaded = versionFilesCache[v.id];
        const isFilesOpen = filesLoaded && filesLoaded.length > 0;
        let html = `<div style="border-bottom:1px solid #f0f0f0;padding:6px 0">
          <div class="version-row">
            <span class="v-num">v${v.version_number}</span>
            ${i === 0 ? `<span class="badge-current">${t('currentVersion')}</span>` : ''}
            <span class="v-date">${formatDate(v.uploaded_at)}</span>
            <span class="v-file">${totalFiles} ${t('filesCount')}</span>
            <span class="v-notes">${v.notes || ''}</span>
            <button class="btn btn-outline" style="padding:1px 6px;font-size:0.72rem" data-action="show-ver-files" data-ver-id="${v.id}" data-doc-id="${docId}">${isFilesOpen ? '▾' : '▸'} ${t('file')}</button>
            ${accessLevel === 'editor' ? `<button class="btn btn-outline" style="padding:1px 6px;font-size:0.72rem" data-action="add-ver-files" data-ver-id="${v.id}" data-doc-id="${docId}">${t('addFilesToVersion')}</button>` : ''}
          </div>`;
        if (isFilesOpen) {
          html += `<div style="padding:4px 0 4px 32px" id="ver-files-${v.id}">`;
          filesLoaded.forEach(f => {
            const size = f.file_size > 1048576 ? (f.file_size/1048576).toFixed(1)+' MB' : Math.round((f.file_size||0)/1024)+' KB';
            const isPdf = (f.file_name || '').toLowerCase().endsWith('.pdf');
            const isImg = /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(f.file_name || '');
            const fileIcon = isPdf ? '📄' : (isImg ? '🖼' : '📎');
            html += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:0.8rem">
              ${isPdf || isImg ? `<button style="background:none;border:none;cursor:pointer;font-size:0.9rem;padding:0" data-action="preview-file" data-ver-id="${f.id}" data-file-name="${(f.file_name||'').replace(/"/g,'&quot;')}" data-is-pdf="${isPdf}">👁</button>` : ''}
              <span style="flex:1;color:#333">${fileIcon} ${f.file_name || '—'} <span style="color:#999">(${size})</span></span>
              <button class="btn btn-outline" style="padding:1px 6px;font-size:0.7rem" data-action="download" data-ver-id="${f.id}">${t('download')}</button>
              ${accessLevel === 'editor' && !f.legacy ? `<button class="btn btn-outline" style="padding:1px 6px;font-size:0.7rem;color:#c5221f" data-action="delete-ver-file" data-file-id="${f.id}" data-ver-id="${v.id}" data-doc-id="${docId}">×</button>` : ''}
            </div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
        return html;
      }).join('');
    }

    // ─── Actions ───

    document.addEventListener('click', async e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'toggle-versions') {
        const docId = btn.dataset.docId;
        expandedDocs[docId] = !expandedDocs[docId];
        renderDocs();
        return;
      }

      if (action === 'preview-file') {
        try {
          const r = await apiFetch(`/project_docs/${btn.dataset.verId}/signed-download-url`);
          if (r.url) {
            if (btn.dataset.isPdf === 'true') {
              openPdfViewer(r.url, btn.dataset.fileName || 'PDF');
            } else {
              let lb = document.getElementById('image-lightbox');
              if (!lb) {
                lb = document.createElement('div');
                lb.id = 'image-lightbox';
                lb.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer';
                lb.innerHTML = '<img style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.5)">';
                lb.addEventListener('click', () => lb.style.display = 'none');
                document.body.appendChild(lb);
              }
              lb.querySelector('img').src = r.url;
              lb.style.display = 'flex';
            }
          }
        } catch(err) { showToast(err.message, 'error'); }
      }

      if (action === 'download') {
        try {
          const r = await apiFetch(`/project_docs/${btn.dataset.verId}/signed-download-url`);
          if (r.url) window.open(r.url, '_blank');
        } catch(err) { showToast(err.message, 'error'); }
      }

      if (action === 'upload-ver') {
        currentVerDocId = btn.dataset.docId;
        document.getElementById('ver-file').value = '';
        document.getElementById('ver-notes').value = '';
        openModal('modal-version');
      }

      if (action === 'show-ver-files') {
        const verId = btn.dataset.verId;
        const docId = btn.dataset.docId;
        if (versionFilesCache[verId]) {
          delete versionFilesCache[verId];
          const el = document.getElementById(`versions-${docId}`);
          if (el) el.innerHTML = renderVersions(docId);
        } else {
          try {
            const files = await apiFetch(`/project_docs/${verId}/files`);
            versionFilesCache[verId] = files;
            const el = document.getElementById(`versions-${docId}`);
            if (el) el.innerHTML = renderVersions(docId);
          } catch(e) { showToast(e.message, 'error'); }
        }
        return;
      }

      if (action === 'add-ver-files') {
        currentAddFilesVerId = btn.dataset.verId;
        currentAddFilesDocId = btn.dataset.docId;
        document.getElementById('addfiles-file').value = '';
        openModal('modal-add-files');
        return;
      }

      if (action === 'delete-ver-file') {
        if (!confirm(t('confirmDelete'))) return;
        btn.disabled = true;
        try {
          await apiFetch(`/project_docs/version-files/${btn.dataset.fileId}`, { method: 'DELETE' });
          showToast(t('deleted'), 'success');
          const verId = btn.dataset.verId;
          const docId = btn.dataset.docId;
          const files = await apiFetch(`/project_docs/${verId}/files`);
          versionFilesCache[verId] = files;
          const el = document.getElementById(`versions-${docId}`);
          if (el) el.innerHTML = renderVersions(docId);
        } catch(e) { showToast(e.message, 'error'); btn.disabled = false; }
        return;
      }

      if (action === 'edit-doc') {
        const doc = allDocs.find(d => d.id === btn.dataset.docId);
        if (!doc) return;
        currentDocMode = 'edit'; currentDocId = doc.id;
        document.getElementById('t-modal-doc-title').textContent = t('editDocument');
        document.getElementById('doc-name').value = doc.name || '';
        document.getElementById('doc-desc').value = doc.description || '';
        document.getElementById('doc-order').value = doc.sort_order || 0;
        fillDocCategorySelect(doc.category_id || '');
        openModal('modal-doc');
      }

      if (action === 'delete-doc') {
        if (!confirm(t('confirmDelete'))) return;
        btn.disabled = true;
        try {
          await apiFetch(`/project_docs/${btn.dataset.docId}`, { method: 'DELETE' });
          showToast(t('deleted'), 'success');
          loadDocs();
        } catch(err) { showToast(err.message, 'error'); btn.disabled = false; }
      }
    });

    // ─── Save doc ───

    document.getElementById('btn-doc-cancel').addEventListener('click', () => closeModal('modal-doc'));
    document.getElementById('btn-doc-save').addEventListener('click', async () => {
      const name = document.getElementById('doc-name').value.trim();
      if (!name) { document.getElementById('doc-name').classList.add('invalid'); showToast(t('fillAllFields'), 'error'); return; }
      document.getElementById('doc-name').classList.remove('invalid');

      const body = {
        folder_id: selectedFolder,
        name,
        category_id: document.getElementById('doc-category').value || '',
        description: document.getElementById('doc-desc').value.trim(),
        sort_order: document.getElementById('doc-order').value || '0',
      };

      closeModal('modal-doc');
      try {
        if (currentDocMode === 'create') {
          await apiFetch('/project_docs', { method: 'POST', body: JSON.stringify(body) });
        } else {
          await apiFetch(`/project_docs/${currentDocId}`, { method: 'PUT', body: JSON.stringify(body) });
        }
        showToast(t('saved'), 'success');
        loadDocs();
      } catch(e) { showToast(e.message, 'error'); }
    });

    // ─── Upload version ───

    async function uploadFileToGCS(file, folderId, documentId) {
      const contentType = file.type || 'application/octet-stream';
      const { upload_url, file_url } = await apiFetch('/project_docs/signed-upload-url', {
        method: 'POST',
        body: JSON.stringify({ folder_id: folderId, document_id: documentId, file_name: file.name, content_type: contentType }),
      });
      await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', upload_url);
        xhr.setRequestHeader('Content-Type', contentType);
        xhr.onload = () => xhr.status === 200 ? resolve() : reject(new Error('Upload failed'));
        xhr.onerror = () => reject(new Error('Upload error'));
        xhr.send(file);
      });
      return { file_url, file_name: file.name, file_size: file.size };
    }

    document.getElementById('btn-ver-cancel').addEventListener('click', () => closeModal('modal-version'));
    document.getElementById('btn-ver-save').addEventListener('click', async () => {
      const fileList = document.getElementById('ver-file').files;
      if (!fileList.length) { showToast(t('selectFile'), 'error'); return; }
      closeModal('modal-version');
      showToast(t('uploading'));
      try {
        const files = [];
        for (const file of fileList) {
          const f = await uploadFileToGCS(file, selectedFolder, currentVerDocId);
          files.push(f);
        }
        await apiFetch(`/project_docs/${currentVerDocId}/versions`, {
          method: 'POST',
          body: JSON.stringify({ files, notes: document.getElementById('ver-notes').value.trim() }),
        });
        showToast(t('uploaded'), 'success');
        docVersions[currentVerDocId] = null;
        versionFilesCache = {};
        expandedDocs[currentVerDocId] = true;
        loadDocs();
      } catch(e) { showToast(e.message, 'error'); }
    });

    // ─── Add files to existing version ───
    document.getElementById('btn-addfiles-cancel').addEventListener('click', () => closeModal('modal-add-files'));
    document.getElementById('btn-addfiles-save').addEventListener('click', async () => {
      const fileList = document.getElementById('addfiles-file').files;
      if (!fileList.length) { showToast(t('selectFile'), 'error'); return; }
      closeModal('modal-add-files');
      showToast(t('uploading'));
      try {
        const files = [];
        for (const file of fileList) {
          const f = await uploadFileToGCS(file, selectedFolder, currentAddFilesDocId);
          files.push(f);
        }
        await apiFetch(`/project_docs/versions/${currentAddFilesVerId}/add-files`, {
          method: 'POST',
          body: JSON.stringify({ files }),
        });
        showToast(t('uploaded'), 'success');
        // Refresh files for this version
        const vfData = await apiFetch(`/project_docs/${currentAddFilesVerId}/files`);
        versionFilesCache[currentAddFilesVerId] = vfData;
        docVersions[currentAddFilesDocId] = null;
        loadDocs();
      } catch(e) { showToast(e.message, 'error'); }
    });

    // ─── Add category ───

    document.getElementById('btn-add-cat').addEventListener('click', () => {
      if (!selectedFolder) { showToast(t('portalSelectProject'), 'error'); return; }
      const name = prompt(t('name') + ':');
      if (!name) return;
      apiFetch('/project_doc_categories', { method: 'POST', body: JSON.stringify({ name, name_en: name, folder_id: selectedFolder }) })
        .then(async () => {
          try { categories = await apiFetch(`/project_doc_categories?folder_id=${selectedFolder}`); } catch(e) { categories = []; }
          renderCategories();
          showToast(t('saved'), 'success');
        })
        .catch(e => showToast(e.message, 'error'));
    });

    // ─── Keyboard ───
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal('modal-doc'); closeModal('modal-version'); closeModal('modal-add-files'); }
    });

    // ─── Init ───
    window.onLogin = async () => { updateTexts(); await loadRefs(); };
    window.onLogout = () => { updateTexts(); };
    window.onLangChange = () => { updateTexts(); if (allDocs.length) { renderCategories(); renderDocs(); } };

    renderHeader('documentation');
    updateTexts();
  </script>
</body>
</html>
