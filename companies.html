<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunti — Юр. лица</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="_i18n.js"></script>
  <script src="_config.js"></script>
  <script src="_auth.js"></script>
  <script src="_header.js"></script>
  <style>
    .page-content { max-width: 900px; margin: 32px auto; padding: 0 24px; }
    .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px; }
    .page-header h1 { font-size:1.2rem;color:#222; }

    .table-wrap { background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden; }
    table { width:100%;border-collapse:collapse; }
    thead { background:#f8f8f8;border-bottom:1px solid #e8e8e8; }
    th { padding:10px 16px;font-size:0.78rem;font-weight:600;color:#888;text-align:left;text-transform:uppercase;letter-spacing:0.04em; }
    td { padding:12px 16px;font-size:0.9rem;color:#333;border-bottom:1px solid #f0f0f0; }
    tr.co-row:hover td { background:#fafafa; }
    tr.co-row:last-child td { border-bottom:none; }

    .expand-btn { background:none;border:none;cursor:pointer;font-size:0.75rem;color:#bbb;padding:2px 6px;border-radius:4px;transition:all 0.15s; }
    .expand-btn:hover { background:#e8e8e8;color:#555; }
    .expand-btn.open { color:#1a73e8; }

    .co-detail-row td { padding:0;background:#f8faff;border-bottom:1px solid #e0e8ff; }
    .co-detail-inner { padding:14px 16px 14px 48px; }

    .acc-table { width:100%;border-collapse:collapse;background:#fff;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden; }
    .acc-table th { padding:8px 12px;font-size:0.72rem;font-weight:600;color:#888;text-align:left;background:#f8f8f8;border-bottom:1px solid #e8e8e8; }
    .acc-table td { padding:9px 12px;font-size:0.85rem;color:#333;border-bottom:1px solid #f0f0f0; }
    .acc-table tr:last-child td { border-bottom:none; }
    .acc-table tr.inactive td { opacity:0.55; }

    .acc-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px; }
    .acc-section-title { font-size:0.78rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.04em; }
    .acc-divider { font-size:0.7rem;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:0.05em;padding:10px 0 4px; }

    .status-dot { display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle; }
    .status-dot.active { background:#1e8e3e; }
    .status-dot.inactive { background:#bbb; }

    .empty-state { text-align:center;padding:48px 24px;color:#bbb; }
    .loading { text-align:center;padding:40px;color:#bbb; }

    .field-group { margin-bottom:14px; }
    .field-group label { display:block;font-size:0.82rem;color:#666;margin-bottom:4px; }
    .field-group input, .field-group select { width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:0.9rem;outline:none;box-sizing:border-box; }
    .field-group input:focus, .field-group select:focus { border-color:#1a73e8; }
    .checkbox-row { display:flex;align-items:center;gap:10px;padding:10px 0; }
    .checkbox-row input[type=checkbox] { width:18px;height:18px;cursor:pointer; }
    .checkbox-row label { font-size:0.9rem;color:#333;cursor:pointer;flex:1; }
  </style>
</head>
<body>
  <header id="header"></header>

  <div id="guest-view">
    <h2 id="t-guest-title"></h2>
    <p id="t-guest-sub"></p>
    <div style="display:flex;justify-content:center;margin-top:24px">
      <a href="index.html" class="btn btn-primary" id="t-login"></a>
    </div>
  </div>

  <div id="app-view">
    <div class="page-content">
      <div class="page-header">
        <h1 id="t-page-title"></h1>
        <button class="btn btn-primary" id="btn-add-company"></button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:32px"></th>
              <th id="t-col-name"></th>
              <th id="t-col-reg"></th>
              <th style="width:120px"></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Модалка компании -->
  <div class="modal-overlay" id="modal-company">
    <div class="modal" style="width:480px;max-width:95vw">
      <h3 id="t-modal-company-title"></h3>
      <div class="field-group">
        <label id="t-co-name-label"></label>
        <input type="text" id="co-name">
      </div>
      <div class="field-group">
        <label id="t-co-reg-label"></label>
        <input type="text" id="co-reg">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-co-cancel"></button>
        <button class="btn btn-primary" id="btn-co-save"></button>
      </div>
    </div>
  </div>

  <!-- Модалка счёта -->
  <div class="modal-overlay" id="modal-account">
    <div class="modal" style="width:480px;max-width:95vw">
      <h3 id="t-modal-account-title"></h3>
      <div class="field-group">
        <label id="t-acc-name-label"></label>
        <input type="text" id="acc-name">
      </div>
      <div class="field-group">
        <label id="t-acc-bank-label"></label>
        <input type="text" id="acc-bank">
      </div>
      <div class="field-group">
        <label id="t-acc-number-label"></label>
        <input type="text" id="acc-number">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="acc-is-active" checked>
        <label for="acc-is-active" id="t-acc-active-label"></label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="btn-acc-cancel"></button>
        <button class="btn btn-primary" id="btn-acc-save"></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let companiesCache = [];
    let accountsByCompany = {};
    let expandedCo = {};

    let editingCompanyId = null;
    let editingAccount   = null; // { mode, id?, companyId }

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.className = 'toast', 3000);
    }

    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

    function updateTexts() {
      setText('t-guest-title',          t('guestTitle'));
      setText('t-guest-sub',            t('guestSub'));
      setText('t-login',                t('login'));
      setText('t-page-title',           t('companies'));
      setText('t-col-name',             t('name'));
      setText('t-col-reg',              t('registrationNumber'));
      setText('t-modal-company-title',  editingCompanyId ? t('editCompany') : t('addCompany'));
      setText('t-co-name-label',        t('name'));
      setText('t-co-reg-label',         t('registrationNumber'));
      setText('btn-co-cancel',          t('cancel'));
      setText('btn-co-save',            t('save'));
      setText('t-modal-account-title',  editingAccount && editingAccount.mode === 'edit' ? t('editAccount') : t('addAccount'));
      setText('t-acc-name-label',       t('name'));
      setText('t-acc-bank-label',       t('bankName'));
      setText('t-acc-number-label',     t('bankAccount'));
      setText('t-acc-active-label',     t('isActiveLabel'));
      setText('btn-acc-cancel',         t('cancel'));
      setText('btn-acc-save',           t('save'));
      document.getElementById('btn-add-company').textContent = t('addCompany');
      updateHeaderTexts();
    }

    async function loadCompanies() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = `<tr><td colspan="4" class="loading">${t('loading')}</td></tr>`;
      try {
        companiesCache = await apiFetch('/companies');
        renderCompanies();
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty-state">${e.message}</td></tr>`;
      }
    }

    function renderCompanies() {
      const tbody = document.getElementById('tbody');
      if (!companiesCache.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty-state">—</td></tr>`;
        return;
      }
      tbody.innerHTML = '';
      companiesCache.forEach(c => {
        const isOpen = expandedCo[c.id] || false;
        const tr = document.createElement('tr');
        tr.className = 'co-row';
        tr.innerHTML = `
          <td><button class="expand-btn${isOpen?' open':''}" data-co-id="${c.id}">${isOpen?'▼':'▶'}</button></td>
          <td><strong>${c.name}</strong></td>
          <td style="color:#666">${c.registration_number || '—'}</td>
          <td>
            <button class="btn btn-outline"
              data-action="edit-company"
              data-id="${c.id}"
              data-name="${(c.name||'').replace(/"/g,'&quot;')}"
              data-reg="${(c.registration_number||'').replace(/"/g,'&quot;')}">${t('edit')}</button>
          </td>
        `;
        tbody.appendChild(tr);

        const trDetail = document.createElement('tr');
        trDetail.className = 'co-detail-row';
        trDetail.dataset.detailFor = c.id;
        trDetail.style.display = isOpen ? '' : 'none';
        trDetail.innerHTML = `<td colspan="4"><div class="co-detail-inner" id="detail-${c.id}"><div class="loading" style="padding:10px">${t('loading')}</div></div></td>`;
        tbody.appendChild(trDetail);

        if (isOpen) loadAccounts(c.id);
      });
    }

    async function loadAccounts(companyId) {
      const inner = document.getElementById(`detail-${companyId}`);
      if (!inner) return;
      try {
        const accounts = await apiFetch(`/company_accounts?company_id=${companyId}`);
        accountsByCompany[companyId] = accounts;
        renderAccounts(companyId);
      } catch(e) {
        inner.innerHTML = `<div style="color:#c33;font-size:0.85rem">${e.message}</div>`;
      }
    }

    function renderAccounts(companyId) {
      const inner = document.getElementById(`detail-${companyId}`);
      if (!inner) return;
      const accounts = accountsByCompany[companyId] || [];
      const active   = accounts.filter(a => a.is_active !== false);
      const inactive = accounts.filter(a => a.is_active === false);

      let html = `
        <div class="acc-header">
          <span class="acc-section-title">${t('companyAccounts')}</span>
          <button class="btn btn-outline" style="padding:4px 10px;font-size:0.8rem" data-action="add-account" data-co-id="${companyId}">${t('addAccount')}</button>
        </div>
      `;

      if (!accounts.length) {
        html += `<div style="color:#bbb;font-size:0.85rem;padding:6px 0">${t('noAccounts')}</div>`;
        inner.innerHTML = html;
        return;
      }

      html += accountsTable(active, companyId);
      if (inactive.length) {
        html += `<div class="acc-divider">${t('inactive')}</div>`;
        html += accountsTable(inactive, companyId);
      }
      inner.innerHTML = html;
    }

    function accountsTable(accounts, companyId) {
      let h = `<table class="acc-table"><thead><tr>
        <th>${t('name')}</th>
        <th>${t('bankName')}</th>
        <th>${t('bankAccount')}</th>
        <th style="width:100px"></th>
      </tr></thead><tbody>`;
      accounts.forEach(a => {
        const isActive = a.is_active !== false;
        h += `<tr class="${isActive ? '' : 'inactive'}">
          <td><span class="status-dot ${isActive?'active':'inactive'}"></span>${a.name}</td>
          <td style="color:#666">${a.bank_name || '—'}</td>
          <td style="color:#666;font-variant-numeric:tabular-nums">${a.bank_account || '—'}</td>
          <td>
            <button class="btn btn-outline" style="padding:3px 8px;font-size:0.78rem"
              data-action="edit-account"
              data-id="${a.id}"
              data-co-id="${companyId}"
              data-name="${(a.name||'').replace(/"/g,'&quot;')}"
              data-bank="${(a.bank_name||'').replace(/"/g,'&quot;')}"
              data-number="${(a.bank_account||'').replace(/"/g,'&quot;')}"
              data-active="${isActive}">${t('edit')}</button>
          </td>
        </tr>`;
      });
      h += `</tbody></table>`;
      return h;
    }

    document.addEventListener('click', e => {
      const ex = e.target.closest('.expand-btn');
      if (ex && ex.dataset.coId) {
        const id = ex.dataset.coId;
        expandedCo[id] = !expandedCo[id];
        const dr = document.querySelector(`tr[data-detail-for="${id}"]`);
        if (dr) dr.style.display = expandedCo[id] ? '' : 'none';
        ex.textContent = expandedCo[id] ? '▼' : '▶';
        ex.classList.toggle('open', expandedCo[id]);
        if (expandedCo[id]) loadAccounts(id);
        return;
      }

      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'edit-company') {
        editingCompanyId = btn.dataset.id;
        document.getElementById('co-name').value = btn.dataset.name || '';
        document.getElementById('co-reg').value  = btn.dataset.reg || '';
        setText('t-modal-company-title', t('editCompany'));
        openModal('modal-company');
      }

      if (action === 'add-account') {
        editingAccount = { mode: 'create', companyId: btn.dataset.coId };
        document.getElementById('acc-name').value   = '';
        document.getElementById('acc-bank').value   = '';
        document.getElementById('acc-number').value = '';
        document.getElementById('acc-is-active').checked = true;
        setText('t-modal-account-title', t('addAccount'));
        openModal('modal-account');
      }

      if (action === 'edit-account') {
        editingAccount = { mode: 'edit', id: btn.dataset.id, companyId: btn.dataset.coId };
        document.getElementById('acc-name').value   = btn.dataset.name || '';
        document.getElementById('acc-bank').value   = btn.dataset.bank || '';
        document.getElementById('acc-number').value = btn.dataset.number || '';
        document.getElementById('acc-is-active').checked = btn.dataset.active === 'true';
        setText('t-modal-account-title', t('editAccount'));
        openModal('modal-account');
      }
    });

    document.getElementById('btn-add-company').addEventListener('click', () => {
      editingCompanyId = null;
      document.getElementById('co-name').value = '';
      document.getElementById('co-reg').value  = '';
      setText('t-modal-company-title', t('addCompany'));
      openModal('modal-company');
    });

    document.getElementById('btn-co-cancel').addEventListener('click', () => closeModal('modal-company'));
    document.getElementById('btn-co-save').addEventListener('click', async () => {
      const name = document.getElementById('co-name').value.trim();
      const registration_number = document.getElementById('co-reg').value.trim();
      if (!name) { showToast(t('fillAllFields'), 'error'); return; }
      closeModal('modal-company');
      try {
        if (editingCompanyId) {
          await apiFetch(`/companies/${editingCompanyId}`, { method: 'PUT', body: JSON.stringify({ name, registration_number }) });
        } else {
          await apiFetch('/companies', { method: 'POST', body: JSON.stringify({ name, registration_number }) });
        }
        showToast(t('saved'), 'success');
        await loadCompanies();
      } catch(e) { showToast(e.message, 'error'); }
    });

    document.getElementById('btn-acc-cancel').addEventListener('click', () => closeModal('modal-account'));
    document.getElementById('btn-acc-save').addEventListener('click', async () => {
      if (!editingAccount) return;
      const name         = document.getElementById('acc-name').value.trim();
      const bank_name    = document.getElementById('acc-bank').value.trim();
      const bank_account = document.getElementById('acc-number').value.trim();
      const is_active    = document.getElementById('acc-is-active').checked;
      if (!name) { showToast(t('fillAllFields'), 'error'); return; }
      closeModal('modal-account');
      try {
        const body = JSON.stringify({ company_id: editingAccount.companyId, name, bank_name, bank_account, is_active });
        if (editingAccount.mode === 'edit') {
          await apiFetch(`/company_accounts/${editingAccount.id}`, { method: 'PUT', body });
        } else {
          await apiFetch('/company_accounts', { method: 'POST', body });
        }
        showToast(t('saved'), 'success');
        await loadAccounts(editingAccount.companyId);
      } catch(e) { showToast(e.message, 'error'); }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal('modal-company'); closeModal('modal-account'); }
    });

    window.onLogin = async () => {
      updateTexts();
      if (!isAdmin) {
        document.getElementById('app-view').innerHTML = `<div class="empty-state" style="margin-top:60px">403 — admins only</div>`;
        return;
      }
      await loadCompanies();
    };
    window.onLogout = () => {
      document.getElementById('tbody').innerHTML = '';
      updateTexts();
    };
    window.onLangChange = () => { updateTexts(); renderCompanies(); };

    renderHeader('companies');
    updateTexts();
  </script>
</body>
</html>
