<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunti — AI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="_i18n.js"></script>
  <script src="_config.js"></script>
  <script src="_auth.js"></script>
  <script src="_header.js"></script>
  <style>
    .ai-wrap { max-width:900px;margin:0 auto;padding:24px; }
    .ai-toolbar { display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap; }
    .ai-toolbar h2 { font-size:1.2rem;color:#222;flex:1; }

    .ai-form { background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:20px 24px;margin-bottom:20px; }
    .ai-form .field-row { display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap; }
    .ai-form .field-group { display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px; }
    .ai-form label { font-size:0.78rem;font-weight:600;color:#888;text-transform:uppercase; }
    .ai-form select, .ai-form input[type="file"] {
      border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:0.88rem;color:#333;outline:none;background:#fff;
    }

    .upload-area {
      border:2px dashed #ddd;border-radius:10px;padding:32px;text-align:center;color:#999;
      cursor:pointer;transition:border-color 0.2s,background 0.2s;
    }
    .upload-area:hover { border-color:#1a73e8;background:#f8fbff; }
    .upload-area.has-file { border-color:#1e8e3e;background:#f0faf0; }
    .upload-area .icon { font-size:2rem;margin-bottom:8px; }
    .upload-area .file-name { font-size:0.9rem;color:#333;font-weight:500; }

    .ai-result { background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:20px 24px; }
    .ai-result h3 { font-size:1rem;color:#222;margin:0 0 12px; }
    .ai-result pre {
      background:#f8f8f8;border:1px solid #e8e8e8;border-radius:8px;padding:14px;
      font-size:0.84rem;color:#333;white-space:pre-wrap;word-wrap:break-word;
      max-height:500px;overflow-y:auto;line-height:1.5;
    }
    .ai-loading { text-align:center;padding:40px;color:#888; }
    .ai-loading .spinner { display:inline-block;width:24px;height:24px;border:3px solid #e8e8e8;border-top-color:#1a73e8;border-radius:50%;animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <header id="header"></header>
  <div id="guest-view"></div>

  <div id="app-view" style="display:none">
  <div class="ai-wrap">
    <div class="ai-toolbar">
      <h2 id="t-ai-title">AI Document Analysis</h2>
    </div>

    <div class="ai-form">
      <div class="field-row">
        <div class="field-group">
          <label id="lbl-ai-type">Document type</label>
          <select id="ai-doc-type">
            <option value="invoice">Invoice</option>
            <option value="contract">Contract</option>
          </select>
        </div>
        <div class="field-group">
          <label id="lbl-ai-folder">Project *</label>
          <select id="ai-folder" required>
            <option value="">—</option>
          </select>
        </div>
      </div>

      <div class="upload-area" id="upload-area" onclick="document.getElementById('ai-file').click()">
        <div class="icon">📄</div>
        <div id="upload-label">Drop PDF here or click to select</div>
        <div class="file-name" id="upload-filename" style="display:none"></div>
        <input type="file" id="ai-file" accept=".pdf,image/*" style="display:none">
      </div>

      <div style="margin-top:16px;text-align:center">
        <button class="btn btn-primary" id="btn-analyze" disabled style="padding:8px 24px;font-size:0.95rem">
          🤖 Analyze document
        </button>
      </div>
    </div>

    <div id="ai-result-area" style="display:none">
      <div class="ai-result">
        <h3 id="t-ai-result-title">Analysis result</h3>
        <div id="ai-result-content"></div>
        <div id="ai-actions" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid #e8e8e8;display:flex;gap:10px;flex-wrap:wrap"></div>
      </div>
    </div>
  </div>

  </div><!-- /app-view -->

  <!-- Contractor creation modal -->
  <div class="modal-overlay" id="modal-contractor" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:12px;width:480px;max-width:95vw;padding:20px 24px">
      <h3 style="margin:0 0 16px">Create contractor</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-size:0.72rem;color:#888">Name (EN)</label>
          <input type="text" id="mc-name-en" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:0.88rem"></div>
        <div><label style="font-size:0.72rem;color:#888">Name (TH)</label>
          <input type="text" id="mc-name-th" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:0.88rem"></div>
        <div><label style="font-size:0.72rem;color:#888">Tax ID</label>
          <input type="text" id="mc-tax-id" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:0.88rem"></div>
        <div><label style="font-size:0.72rem;color:#888">Type</label>
          <select id="mc-type" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:0.88rem">
            <option value="juristic">Juristic</option>
            <option value="individual">Individual</option>
            <option value="foreign_juristic">Foreign juristic</option>
            <option value="foreign_individual">Foreign individual</option>
          </select></div>
        <div><label style="font-size:0.72rem;color:#888">Branch</label>
          <input type="text" id="mc-branch" value="HQ" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:0.88rem"></div>
        <div><label style="font-size:0.72rem;color:#888">VAT registered</label>
          <select id="mc-vat" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:0.88rem">
            <option value="true">Yes</option><option value="false">No</option>
          </select></div>
        <div style="grid-column:span 2"><label style="font-size:0.72rem;color:#888">Address</label>
          <input type="text" id="mc-address" style="width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:0.88rem"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn btn-outline" id="mc-cancel" style="padding:6px 16px">Cancel</button>
        <button class="btn btn-primary" id="mc-save" style="padding:6px 16px">Save & Confirm</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    renderHeader('ai');

    let foldersCache = [];
    let contractorsCache = [];
    let categoriesCache = [];

    window.onLogin = async function(user, admin) {
      await Promise.all([loadFolders(), loadContractors(), loadCategories()]);
      updateTexts();
    };

    function updateTexts() {
      document.getElementById('t-ai-title').textContent = t('aiTitle');
      document.getElementById('lbl-ai-type').textContent = t('aiDocType');
      document.getElementById('lbl-ai-folder').textContent = t('folder') + ' *';
      document.getElementById('upload-label').textContent = t('aiUploadHint');
      document.getElementById('btn-analyze').textContent = '🤖 ' + t('aiAnalyze');
      document.getElementById('t-ai-result-title').textContent = t('aiResultTitle');
      // Doc type options
      const sel = document.getElementById('ai-doc-type');
      sel.options[0].text = t('navInvoices');
      sel.options[1].text = t('navContracts');
    }

    async function loadFolders() {
      try {
        const folders = await apiFetch('/folders');
        foldersCache = folders;
        const sel = document.getElementById('ai-folder');
        sel.innerHTML = `<option value="">—</option>`;
        folders.forEach(f => {
          if (f.status === 'archive') return;
          const opt = document.createElement('option');
          opt.value = f.id; opt.textContent = f.name;
          sel.appendChild(opt);
        });
      } catch(e) { console.error(e); }
    }

    async function loadContractors() {
      try { contractorsCache = await apiFetch('/contractors'); } catch(e) { console.error(e); }
    }
    async function loadCategories() {
      try { categoriesCache = await apiFetch('/categories'); } catch(e) { console.error(e); }
    }

    // File selection
    const fileInput = document.getElementById('ai-file');
    const uploadArea = document.getElementById('upload-area');
    const btnAnalyze = document.getElementById('btn-analyze');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        document.getElementById('upload-filename').textContent = file.name;
        document.getElementById('upload-filename').style.display = 'block';
        document.getElementById('upload-label').style.display = 'none';
        uploadArea.classList.add('has-file');
        checkReady();
      }
    });

    // Drag & drop
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#1a73e8'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
    uploadArea.addEventListener('drop', e => {
      e.preventDefault(); uploadArea.style.borderColor = '';
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
      }
    });

    document.getElementById('ai-folder').addEventListener('change', checkReady);

    function checkReady() {
      const hasFile = fileInput.files.length > 0;
      const hasFolder = document.getElementById('ai-folder').value;
      btnAnalyze.disabled = !(hasFile && hasFolder);
    }

    let lastAnalysis = null;

    function fmt(v) {
      const n = parseFloat(v);
      if (isNaN(n)) return '—';
      return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderAnalysis(a) {
      if (a.parse_error || a.raw) {
        return `<div style="color:#c5221f;margin-bottom:8px">${a.parse_error}</div><pre>${a.raw || ''}</pre>`;
      }

      const c = a.contractor || {};
      const am = a.amounts || {};
      const items = a.line_items || [];
      const warnings = a.warnings || [];

      let html = '';

      // Confidence & warnings
      if (a.confidence != null) {
        const pct = Math.round(a.confidence * 100);
        const color = pct >= 80 ? '#1e8e3e' : pct >= 50 ? '#e37400' : '#c5221f';
        html += `<div style="margin-bottom:12px;font-size:0.85rem">Confidence: <strong style="color:${color}">${pct}%</strong></div>`;
      }
      if (warnings.length) {
        html += `<div style="background:#fef7e0;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:0.82rem;color:#8a6d00">
          ⚠ ${warnings.join('<br>⚠ ')}</div>`;
      }

      // Document info
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-bottom:16px;font-size:0.88rem">
        <div><span style="color:#888">Type:</span> <strong>${a.document_type || '—'}</strong></div>
        <div><span style="color:#888">Number:</span> <strong>${a.document_number || '—'}</strong></div>
        <div><span style="color:#888">Date:</span> <strong>${a.date || '—'}</strong></div>
        <div><span style="color:#888">Due date:</span> <strong>${a.due_date || '—'}</strong></div>
        <div><span style="color:#888">Direction:</span> <strong>${a.direction || '—'}</strong></div>
        <div><span style="color:#888">Currency:</span> <strong>${am.currency || '—'}</strong></div>
      </div>`;

      // Contractor
      const contractorMatch = c.matched_id ? '✅ Found in system' : '🆕 New contractor';
      const contractorColor = c.matched_id ? '#e6f4ea' : '#fef7e0';
      html += `<div style="background:${contractorColor};border-radius:8px;padding:12px 14px;margin-bottom:12px">
        <div style="font-size:0.75rem;color:#888;text-transform:uppercase;margin-bottom:4px">Contractor — ${contractorMatch}</div>
        <div style="font-size:0.95rem;font-weight:600">${c.name || '—'}</div>
        ${c.name_th ? `<div style="font-size:0.85rem;color:#555">${c.name_th}</div>` : ''}
        <div style="font-size:0.82rem;color:#666;margin-top:4px">
          ${c.tax_id ? `Tax ID: ${c.tax_id} · ` : ''}${c.type || ''} · ${c.branch || ''}
          ${c.address ? `<br>${c.address}` : ''}
        </div>
      </div>`;

      // Category
      const cat = a.category || {};
      if (cat.matched_id || cat.suggested_name) {
        html += `<div style="font-size:0.85rem;margin-bottom:12px"><span style="color:#888">Category:</span>
          ${cat.matched_id ? '✅' : '❓'} <strong>${cat.suggested_name || '—'}</strong></div>`;
      }

      // Line items
      if (items.length) {
        html += `<table style="width:100%;border-collapse:collapse;margin-bottom:12px;font-size:0.84rem">
          <thead><tr style="background:#f8f8f8;border-bottom:1px solid #e8e8e8">
            <th style="padding:6px 8px;text-align:left;color:#888;font-size:0.72rem">DESCRIPTION</th>
            <th style="padding:6px 8px;text-align:right;color:#888;font-size:0.72rem">QTY</th>
            <th style="padding:6px 8px;text-align:right;color:#888;font-size:0.72rem">PRICE</th>
            <th style="padding:6px 8px;text-align:right;color:#888;font-size:0.72rem">AMOUNT</th>
          </tr></thead><tbody>`;
        items.forEach(it => {
          html += `<tr style="border-bottom:1px solid #f0f0f0">
            <td style="padding:6px 8px">${it.description || '—'}</td>
            <td style="padding:6px 8px;text-align:right">${it.quantity ?? '—'}</td>
            <td style="padding:6px 8px;text-align:right">${fmt(it.unit_price)}</td>
            <td style="padding:6px 8px;text-align:right;font-weight:500">${fmt(it.amount)}</td>
          </tr>`;
        });
        html += `</tbody></table>`;
      }

      // Amounts summary
      html += `<div style="background:#f8f8f8;border-radius:8px;padding:12px 14px;margin-bottom:12px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;font-size:0.88rem">
          <div>Subtotal: <strong>${fmt(am.subtotal)}</strong></div>
          <div>VAT ${am.vat_rate ? `(${am.vat_rate}%)` : ''}: <strong>${fmt(am.vat_amount)}</strong></div>
          <div>WHT ${am.wht_rate ? `(${am.wht_rate}%)` : ''}: <strong>${fmt(am.wht_amount)}</strong></div>
          <div>Total: <strong>${fmt(am.total)}</strong></div>
          <div style="grid-column:span 2;font-size:1rem;margin-top:4px;color:#1a73e8">Payable: <strong>${fmt(am.payable)}</strong></div>
        </div>
      </div>`;

      // Payment terms / notes
      if (a.payment_terms) html += `<div style="font-size:0.85rem;margin-bottom:4px"><span style="color:#888">Payment terms:</span> ${a.payment_terms}</div>`;
      if (a.notes) html += `<div style="font-size:0.85rem;color:#666">${a.notes}</div>`;

      return html;
    }

    let stepConfirmed = { contractor: false, name: false, amounts: false, category: false };

    function checkCreateReady() {
      const btn = document.getElementById('btn-create-doc');
      if (!btn) return;
      const ready = stepConfirmed.contractor && stepConfirmed.name && stepConfirmed.amounts && stepConfirmed.category;
      btn.disabled = !ready;
      btn.style.background = ready ? '#1a73e8' : '#ccc';
      btn.style.cursor = ready ? 'pointer' : 'not-allowed';
    }

    function confirmBtn(id) {
      const b = document.getElementById(id);
      if (!b) return;
      b.textContent = '✅ Confirmed'; b.disabled = true; b.style.background = '#e6f4ea';
    }

    function renderActions(a) {
      const actionsEl = document.getElementById('ai-actions');
      if (!a || a.parse_error) { actionsEl.style.display = 'none'; return; }
      actionsEl.style.display = 'block';
      stepConfirmed = { contractor: false, name: false, amounts: false, category: false };

      const c = a.contractor || {};
      const am = a.amounts || {};
      const cat = a.category || {};
      const docType = document.getElementById('ai-doc-type').value;
      const suggestedName = a.document_number || a.notes || 'AI imported';
      const inputStyle = 'border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-size:0.85rem;outline:none;width:110px;text-align:right';
      const selStyle = 'flex:1;border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:0.88rem;outline:none;background:#fff';

      // Build contractor options
      let ctrOptions = `<option value="">— select —</option>`;
      contractorsCache.forEach(ct => {
        const name = ct.name_en || ct.name_th || '—';
        const sel = ct.id === c.matched_id ? ' selected' : '';
        ctrOptions += `<option value="${ct.id}"${sel}>${name}${ct.tax_id ? ' ('+ct.tax_id+')' : ''}</option>`;
      });

      // Build category options
      let catOptions = `<option value="">— select —</option>`;
      categoriesCache.forEach(ct => {
        const name = ct.name_en || ct.name || '—';
        const sel = ct.id === cat.matched_id ? ' selected' : '';
        catOptions += `<option value="${ct.id}"${sel}>${name} (${ct.type || ''})</option>`;
      });

      let html = '';

      // Step 1: Contractor
      html += `<div style="margin-bottom:10px;padding:12px 14px;background:#f8f8f8;border-radius:8px">
        <div style="font-size:0.72rem;color:#888;text-transform:uppercase;margin-bottom:6px">Step 1: Contractor</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <select id="ai-contractor-select" style="${selStyle}">${ctrOptions}</select>
          <button class="btn btn-outline" id="btn-confirm-contractor" style="padding:4px 14px;font-size:0.82rem;color:#1e8e3e;border-color:#1e8e3e">Confirm</button>
          <button class="btn btn-primary" id="btn-new-contractor" style="padding:4px 14px;font-size:0.82rem;background:#e37400">+ New</button>
        </div>
      </div>`;

      // Step 2: Document name
      html += `<div style="margin-bottom:10px;padding:12px 14px;background:#f8f8f8;border-radius:8px">
        <div style="font-size:0.72rem;color:#888;text-transform:uppercase;margin-bottom:6px">Step 2: Document name</div>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="text" id="ai-doc-name" value="${suggestedName.replace(/"/g, '&quot;')}"
            style="flex:1;border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:0.88rem;outline:none">
          <button class="btn btn-outline" id="btn-confirm-name" style="padding:4px 14px;font-size:0.82rem;color:#1e8e3e;border-color:#1e8e3e">Confirm</button>
        </div>
      </div>`;

      // Step 3: Amounts
      html += `<div style="margin-bottom:10px;padding:12px 14px;background:#f8f8f8;border-radius:8px">
        <div style="font-size:0.72rem;color:#888;text-transform:uppercase;margin-bottom:6px">Step 3: Amounts</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div><label style="font-size:0.72rem;color:#888">Subtotal</label><br>
            <input type="number" id="ai-subtotal" value="${am.subtotal || 0}" min="0" step="0.01" style="${inputStyle}"></div>
          <div><label style="font-size:0.72rem;color:#888">VAT (${am.vat_rate || 0}%)</label><br>
            <input type="number" id="ai-vat" value="${am.vat_amount || 0}" min="0" step="0.01" style="${inputStyle}"></div>
          <div><label style="font-size:0.72rem;color:#888">Total</label><br>
            <input type="number" id="ai-total" value="${am.total || 0}" min="0" step="0.01" style="${inputStyle}"></div>
          <button class="btn btn-outline" id="btn-confirm-amounts" style="padding:4px 14px;font-size:0.82rem;color:#1e8e3e;border-color:#1e8e3e;align-self:flex-end">Confirm</button>
        </div>
      </div>`;

      // Step 4: Category
      html += `<div style="margin-bottom:10px;padding:12px 14px;background:#f8f8f8;border-radius:8px">
        <div style="font-size:0.72rem;color:#888;text-transform:uppercase;margin-bottom:6px">Step 4: Category</div>
        <div style="display:flex;align-items:center;gap:8px">
          <select id="ai-category-select" style="${selStyle}">${catOptions}</select>
          <button class="btn btn-outline" id="btn-confirm-category" style="padding:4px 14px;font-size:0.82rem;color:#1e8e3e;border-color:#1e8e3e">Confirm</button>
        </div>
      </div>`;

      // Create button
      html += `<div style="text-align:center;margin-top:14px">
        <button class="btn btn-primary" id="btn-create-doc" style="padding:8px 24px;font-size:0.95rem;background:#ccc;cursor:not-allowed" disabled>
          📄 Create ${docType === 'invoice' ? t('navInvoices').toLowerCase() : t('navContracts').toLowerCase()}</button>
      </div>`;

      actionsEl.innerHTML = html;

      // --- Event handlers ---

      // Step 1: Confirm contractor
      document.getElementById('btn-confirm-contractor').addEventListener('click', () => {
        const sel = document.getElementById('ai-contractor-select');
        if (!sel.value) { showToast('Select a contractor', 'error'); return; }
        lastAnalysis.contractor.matched_id = sel.value;
        stepConfirmed.contractor = true;
        confirmBtn('btn-confirm-contractor');
        sel.disabled = true; sel.style.background = '#f0f0f0';
        checkCreateReady();
      });

      // Step 1: Open new contractor modal
      document.getElementById('btn-new-contractor').addEventListener('click', () => {
        document.getElementById('mc-name-en').value = c.name || '';
        document.getElementById('mc-name-th').value = c.name_th || '';
        document.getElementById('mc-tax-id').value = c.tax_id || '';
        document.getElementById('mc-type').value = c.type || 'juristic';
        document.getElementById('mc-branch').value = c.branch || 'HQ';
        document.getElementById('mc-vat').value = (am.vat_rate > 0) ? 'true' : 'false';
        document.getElementById('mc-address').value = c.address || '';
        document.getElementById('modal-contractor').style.display = 'flex';
      });

      // Step 2: Confirm name
      document.getElementById('btn-confirm-name').addEventListener('click', () => {
        const v = document.getElementById('ai-doc-name').value.trim();
        if (!v) { showToast('Document name is required', 'error'); return; }
        stepConfirmed.name = true;
        confirmBtn('btn-confirm-name');
        document.getElementById('ai-doc-name').readOnly = true;
        document.getElementById('ai-doc-name').style.background = '#f0f0f0';
        checkCreateReady();
      });

      // Step 3: Confirm amounts
      document.getElementById('btn-confirm-amounts').addEventListener('click', () => {
        stepConfirmed.amounts = true;
        confirmBtn('btn-confirm-amounts');
        ['ai-subtotal','ai-vat','ai-total'].forEach(id => {
          const el = document.getElementById(id); if (el) { el.readOnly = true; el.style.background = '#f0f0f0'; }
        });
        checkCreateReady();
      });

      // Step 4: Confirm category
      document.getElementById('btn-confirm-category').addEventListener('click', () => {
        stepConfirmed.category = true;
        confirmBtn('btn-confirm-category');
        const sel = document.getElementById('ai-category-select');
        sel.disabled = true; sel.style.background = '#f0f0f0';
        checkCreateReady();
      });

      // Create document
      document.getElementById('btn-create-doc').addEventListener('click', async () => {
        const docBtn = document.getElementById('btn-create-doc');
        docBtn.disabled = true;
        const folderId = document.getElementById('ai-folder').value;
        const docName = document.getElementById('ai-doc-name').value.trim();
        const subtotal = document.getElementById('ai-subtotal').value;
        const vatAmount = document.getElementById('ai-vat').value;
        const total = document.getElementById('ai-total').value;
        const contractorId = document.getElementById('ai-contractor-select').value;
        const categoryId = document.getElementById('ai-category-select').value;
        const paymentTerms = a.payment_terms || '';
        const notes = [a.notes || '', paymentTerms ? 'Payment terms: ' + paymentTerms : ''].filter(Boolean).join('\n');

        try {
          if (docType === 'invoice') {
            const body = {
              folder_id: folderId, name: docName,
              date: a.date || new Date().toISOString().slice(0, 10),
              direction: a.direction || 'expense',
              total_amount: String(total), subtotal: String(subtotal),
              vat_rate: String(am.vat_rate || 0), vat_amount: String(vatAmount),
              wht_rate: String(am.wht_rate || 0), wht_amount: String(am.wht_amount || 0),
              category_id: categoryId, contractor_id: contractorId, status: 'active',
            };
            await apiFetch('/invoices', { method: 'POST', body: JSON.stringify(body) });
            docBtn.textContent = '✅ Invoice created'; docBtn.style.background = '#1e8e3e';
            showToast('Invoice created', 'success');
          } else {
            const body = {
              folder_id: folderId, contractor_id: contractorId, name: docName,
              date: a.date || '', direction: a.direction || 'expense',
              total_amount: String(total), subtotal: String(subtotal),
              vat_amount: String(vatAmount), status: 'active', notes: notes || '',
            };
            await apiFetch('/contracts', { method: 'POST', body: JSON.stringify(body) });
            docBtn.textContent = '✅ Contract created'; docBtn.style.background = '#1e8e3e';
            showToast('Contract created', 'success');
          }
        } catch(e) { showToast(e.message, 'error'); docBtn.disabled = false; }
      });
    }

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(el._t); el._t = setTimeout(() => el.className = 'toast', 3000);
    }

    // Analyze
    btnAnalyze.addEventListener('click', async () => {
      const file = fileInput.files[0];
      const folderId = document.getElementById('ai-folder').value;
      const docType = document.getElementById('ai-doc-type').value;
      if (!file || !folderId) return;

      btnAnalyze.disabled = true;
      const resultArea = document.getElementById('ai-result-area');
      const resultContent = document.getElementById('ai-result-content');
      resultArea.style.display = 'block';
      resultContent.innerHTML = `<div class="ai-loading"><div class="spinner"></div><div style="margin-top:12px">${t('aiAnalyzing')}</div></div>`;
      document.getElementById('ai-actions').style.display = 'none';

      try {
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        const response = await apiFetch('/ai_documents', {
          method: 'POST',
          body: JSON.stringify({
            file_base64: base64,
            file_name: file.name,
            content_type: file.type || 'application/pdf',
            doc_type: docType,
            folder_id: folderId,
          }),
        });

        lastAnalysis = response.analysis;
        resultContent.innerHTML = renderAnalysis(lastAnalysis);
        renderActions(lastAnalysis);
      } catch(e) {
        resultContent.innerHTML = `<div style="color:#c5221f;padding:16px">${e.message}</div>`;
      }
      btnAnalyze.disabled = false;
    });

    // Contractor modal handlers
    document.getElementById('mc-cancel').addEventListener('click', () => {
      document.getElementById('modal-contractor').style.display = 'none';
    });
    document.getElementById('mc-save').addEventListener('click', async () => {
      const saveBtn = document.getElementById('mc-save');
      saveBtn.disabled = true;
      try {
        const body = {
          name_en: document.getElementById('mc-name-en').value.trim(),
          name_th: document.getElementById('mc-name-th').value.trim(),
          tax_id: document.getElementById('mc-tax-id').value.trim(),
          type: document.getElementById('mc-type').value,
          branch: document.getElementById('mc-branch').value.trim() || 'HQ',
          is_vat_registered: document.getElementById('mc-vat').value === 'true',
          address_en: document.getElementById('mc-address').value.trim(),
          is_active: true,
        };
        if (!body.name_en && !body.name_th) { showToast('Name is required', 'error'); saveBtn.disabled = false; return; }
        const res = await apiFetch('/contractors', { method: 'POST', body: JSON.stringify(body) });
        if (res.id) {
          // Add to cache and dropdown
          const newC = { id: res.id, name_en: body.name_en, name_th: body.name_th, tax_id: body.tax_id };
          contractorsCache.push(newC);
          const sel = document.getElementById('ai-contractor-select');
          const opt = document.createElement('option');
          opt.value = res.id;
          opt.textContent = (body.name_en || body.name_th) + (body.tax_id ? ' ('+body.tax_id+')' : '');
          opt.selected = true;
          sel.appendChild(opt);
          // Auto-confirm contractor
          if (lastAnalysis) lastAnalysis.contractor.matched_id = res.id;
          stepConfirmed.contractor = true;
          confirmBtn('btn-confirm-contractor');
          sel.disabled = true; sel.style.background = '#f0f0f0';
          checkCreateReady();
          document.getElementById('modal-contractor').style.display = 'none';
          showToast('Contractor created & confirmed', 'success');
        }
      } catch(e) { showToast(e.message, 'error'); }
      saveBtn.disabled = false;
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('modal-contractor').style.display = 'none';
    });

    window.onLangChange = updateTexts;
  </script>
</body>
</html>
