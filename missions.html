<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunti — Tasks</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="_i18n.js"></script>
<script src="_config.js"></script>
<script src="_auth.js"></script>
<script src="_header.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="_pdf_viewer.js"></script>
<style>
  :root {
    --m-bg: #f5f7fa;
    --m-border: #e2e8f0;
    --m-text: #0f172a;
    --m-muted: #64748b;
    --m-primary: #1a73e8;
    --m-red: #ef4444;
    --m-orange: #f59e0b;
    --m-blue: #3b82f6;
    --m-grey: #94a3b8;
    --m-green: #10b981;
  }
  .missions-page { display: flex; gap: 0; height: calc(100vh - 56px); background: var(--m-bg); }
  .missions-main { flex: 1; overflow-y: auto; padding: 20px 28px; }
  .missions-toolbar { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .missions-toolbar h2 { margin: 0; font-size: 1.4rem; font-weight: 700; color: var(--m-text); }

  /* Mission groups */
  .mission-group { margin-bottom: 16px; }
  .mission-group-header {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px;
    border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
    user-select: none;
  }
  .mission-group-header .group-icon { font-size: 1rem; }
  .mission-group-header .group-count {
    background: rgba(0,0,0,0.08); border-radius: 10px; padding: 1px 8px;
    font-size: 0.72rem; font-weight: 600;
  }
  .mission-group-header .group-toggle { margin-left: auto; font-size: 0.7rem; color: var(--m-muted); }
  .mission-group-header.overdue { background: #fee2e2; color: #991b1b; }
  .mission-group-header.today { background: #dbeafe; color: #1e40af; }
  .mission-group-header.week { background: #f0fdf4; color: #166534; }
  .mission-group-header.nodate { background: #f1f5f9; color: #475569; }
  .mission-group-header.watching { background: #fef3c7; color: #92400e; }
  .mission-group-header.done { background: #f0fdf4; color: #065f46; }
  .mission-group-body { }
  .mission-group-body.collapsed { display: none; }

  /* Mission rows */
  .mission-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: #fff; border: 1px solid var(--m-border); border-radius: 8px;
    margin: 4px 0; cursor: pointer; transition: box-shadow 0.15s;
    font-size: 0.88rem;
  }
  .mission-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .mission-row.active { border-color: var(--m-primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
  .mission-priority-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .mission-priority-dot.urgent { background: var(--m-red); }
  .mission-priority-dot.high { background: var(--m-orange); }
  .mission-priority-dot.normal { background: var(--m-blue); }
  .mission-priority-dot.low { background: var(--m-grey); }
  .mission-title { flex: 1; font-weight: 500; color: var(--m-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mission-entity { font-size: 0.78rem; color: var(--m-muted); white-space: nowrap; }
  .mission-due { font-size: 0.78rem; color: var(--m-muted); white-space: nowrap; }
  .mission-assignee { font-size: 0.78rem; color: var(--m-muted); white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }

  /* Side panel */
  .side-panel {
    position: fixed; top: 56px; right: -540px; width: 520px; height: calc(100vh - 56px);
    background: white; border-left: 1px solid var(--m-border);
    box-shadow: -8px 0 24px rgba(0,0,0,0.1); transition: right 0.3s ease;
    overflow-y: auto; z-index: 90; display: flex; flex-direction: column;
  }
  .side-panel.open { right: 0; }
  .sp-head {
    padding: 18px 20px; border-bottom: 1px solid var(--m-border);
    position: relative; flex-shrink: 0;
  }
  .sp-head .sp-close {
    background: #f1f5f9; border: 1px solid #e2e8f0;
    font-size: 18px; color: var(--m-muted); cursor: pointer; line-height: 1;
    width: 32px; height: 32px; min-width: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sp-head .sp-close:hover { background: #e2e8f0; color: #333; }
  .sp-body { flex: 1; padding: 16px 20px; overflow-y: auto; }
  .sp-field { margin-bottom: 14px; }
  .sp-field label { display: block; font-size: 0.78rem; color: var(--m-muted); margin-bottom: 4px; font-weight: 600; }
  .sp-field select, .sp-field input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 0.88rem; box-sizing: border-box; }
  .sp-field select:focus, .sp-field input:focus { border-color: var(--m-primary); outline: none; }
  .sp-actions { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--m-border); flex-shrink: 0; }
  .sp-actions button { padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid #ddd; background: #fff; }
  .sp-actions .btn-done { background: var(--m-green); color: #fff; border-color: var(--m-green); }
  .sp-actions .btn-block { background: #fbbf24; color: #333; border-color: #fbbf24; }
  .sp-actions .btn-cancel-m { background: var(--m-red); color: #fff; border-color: var(--m-red); }
  .sp-actions .btn-reopen { background: var(--m-primary); color: #fff; border-color: var(--m-primary); }

  /* Comments */
  .comment-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.84rem; }
  .comment-item .comment-author { font-weight: 600; color: var(--m-text); }
  .comment-item .comment-date { font-size: 0.72rem; color: var(--m-muted); margin-left: 8px; }
  .comment-item .comment-body { margin-top: 4px; color: #444; white-space: pre-wrap; }
  .comment-form { display: flex; gap: 8px; margin-top: 8px; }
  .comment-form input { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 0.85rem; }
  .comment-form button { padding: 7px 14px; background: var(--m-primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }

  /* History */
  .history-item { font-size: 0.78rem; color: var(--m-muted); padding: 4px 0; border-bottom: 1px solid #f8f8f8; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 12px;
    width: min(920px, 94vw); max-height: 90vh; min-height: min(620px, 84vh); overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 24px;
  }
  .modal-box h3 { margin: 0 0 16px; font-size: 1.1rem; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 0.82rem; color: #666; margin-bottom: 4px; }
  .modal-field input, .modal-field select, .modal-field textarea {
    width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px;
    font-size: 0.9rem; outline: none; box-sizing: border-box; background: #fff;
  }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: var(--m-primary); }
  .modal-field textarea { min-height: 60px; resize: vertical; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .priority-selector { display: flex; gap: 6px; }
  .priority-selector button {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #ddd; background: #f8f8f8;
    cursor: pointer; font-size: 0.82rem; font-weight: 600;
  }
  .priority-selector button.active { color: #fff; }
  .priority-selector button[data-p="low"].active { background: var(--m-grey); border-color: var(--m-grey); }
  .priority-selector button[data-p="normal"].active { background: var(--m-blue); border-color: var(--m-blue); }
  .priority-selector button[data-p="high"].active { background: var(--m-orange); border-color: var(--m-orange); }
  .priority-selector button[data-p="urgent"].active { background: var(--m-red); border-color: var(--m-red); }
  .lang-tabs { display: flex; gap: 4px; margin-bottom: 6px; }
  .lang-tabs button { padding: 3px 10px; border: 1px solid #ddd; border-radius: 4px; background: #f8f8f8; cursor: pointer; font-size: 0.75rem; }
  .lang-tabs button.active { background: var(--m-primary); color: #fff; border-color: var(--m-primary); }
  .translate-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; margin-left: 4px; }

  .watcher-chip { display: inline-flex; align-items: center; gap: 4px; background: #e8f0fe; border-radius: 12px; padding: 2px 10px 2px 8px; font-size: 0.78rem; margin: 2px; }
  .watcher-chip .remove-watcher { cursor: pointer; font-size: 0.9rem; color: var(--m-muted); }

  .sub-mission-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 0.84rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
  .sub-mission-row:hover { background: #f8f8f8; }

  .entity-link { color: var(--m-primary); text-decoration: none; font-size: 0.84rem; }
  .entity-link:hover { text-decoration: underline; }

  .collapsible-header { cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--m-muted); padding: 6px 0; user-select: none; }
  .collapsible-header:hover { color: var(--m-text); }
  .collapsible-body.collapsed { display: none; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--m-muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
</style>
</head>
<body>
  <header id="header"></header>

  <div id="guest-view">
    <h2 id="t-guest-title"></h2>
    <p id="t-guest-sub"></p>
  </div>

  <div id="app-view" style="display:none">
    <div class="missions-page">
      <div class="missions-main" id="missions-main">
        <div class="missions-toolbar">
          <h2>My Day</h2>
          <button class="btn btn-primary" id="btn-new-mission" style="font-size:0.82rem;padding:5px 14px">+ Mission</button>
        </div>
        <div id="missions-list">
          <div class="empty-state"><div class="icon">📋</div><div id="t-missions-loading">Loading...</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Side panel overlay + panel -->
  <div id="sp-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:85" onclick="closeSidePanel()"></div>
  <div class="side-panel" id="side-panel">
    <div class="sp-head">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2 id="sp-title" style="margin:0;font-size:1.1rem;font-weight:700"></h2>
        <button class="sp-close" onclick="closeSidePanel()">×</button>
      </div>
    </div>
    <div class="sp-body" id="sp-body"></div>
    <div class="sp-actions" id="sp-actions"></div>
  </div>

  <!-- Create Mission modal -->
  <div class="modal-overlay" id="modal-new-mission">
    <div class="modal-box">
      <h3 id="t-modal-title"></h3>

      <div class="modal-field">
        <label id="t-lbl-title">Title</label>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
          <div class="lang-tabs" id="title-lang-tabs">
            <button class="active" data-lang="ru" onclick="switchTitleLang('ru')">RU</button>
            <button data-lang="en" onclick="switchTitleLang('en')">EN</button>
            <button data-lang="th" onclick="switchTitleLang('th')">TH</button>
          </div>
          <button class="translate-btn" onclick="translateTitle()" title="Translate">🌐</button>
        </div>
        <input type="text" id="m-title-ru" placeholder="Заголовок" style="display:block">
        <input type="text" id="m-title-en" placeholder="Title" style="display:none">
        <input type="text" id="m-title-th" placeholder="หัวข้อ" style="display:none">
      </div>

      <div class="modal-field">
        <label id="t-lbl-desc">Description</label>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
          <div class="lang-tabs" id="desc-lang-tabs">
            <button class="active" data-lang="ru" onclick="switchDescLang('ru')">RU</button>
            <button data-lang="en" onclick="switchDescLang('en')">EN</button>
            <button data-lang="th" onclick="switchDescLang('th')">TH</button>
          </div>
          <button class="translate-btn" onclick="translateDesc()" title="Translate">🌐</button>
        </div>
        <textarea id="m-desc-ru" rows="3" placeholder="Описание" style="display:block"></textarea>
        <textarea id="m-desc-en" rows="3" placeholder="Description" style="display:none"></textarea>
        <textarea id="m-desc-th" rows="3" placeholder="คำอธิบาย" style="display:none"></textarea>
      </div>

      <div class="modal-field">
        <label id="t-lbl-priority">Priority</label>
        <div class="priority-selector" id="priority-selector">
          <button data-p="low" onclick="setPriority('low')">Low</button>
          <button data-p="normal" class="active" onclick="setPriority('normal')">Normal</button>
          <button data-p="high" onclick="setPriority('high')">High</button>
          <button data-p="urgent" onclick="setPriority('urgent')">Urgent</button>
        </div>
      </div>

      <div class="modal-field">
        <label id="t-lbl-due">Due date</label>
        <input type="date" id="m-due-date" lang="en-GB">
      </div>

      <div class="modal-field">
        <label id="t-lbl-entity">Link to entity</label>
        <input type="text" id="m-entity-search" placeholder="Search..." autocomplete="off">
        <div id="m-entity-results" style="max-height:150px;overflow-y:auto;border:1px solid #ddd;border-radius:6px;display:none"></div>
        <div id="m-entity-selected" style="margin-top:4px"></div>
      </div>

      <div class="modal-field">
        <label id="t-lbl-assignee">Assignee</label>
        <select id="m-assignee"><option value="">—</option></select>
      </div>

      <div class="modal-field" id="mf-watchers">
        <label id="t-lbl-watchers">Watchers</label>
        <select id="m-watcher-add"><option value="">+ Add watcher</option></select>
        <div id="m-watchers-list" style="margin-top:4px"></div>
      </div>

      <div class="modal-field" id="mf-notify" style="display:flex;gap:16px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="m-notify-tg-assignee"> <span id="t-notify-assignee">Notify assignee TG</span>
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="m-notify-tg-watchers"> <span id="t-notify-watchers">Notify watchers TG</span>
        </label>
      </div>

      <div class="modal-field" id="mf-files" style="display:none">
        <label id="t-lbl-files">Files</label>
        <div id="m-files-list" style="margin-bottom:8px"></div>
        <input type="file" id="m-file-input" multiple style="display:none">
        <button type="button" class="btn btn-outline" id="t-btn-attach" style="font-size:0.8rem;padding:5px 12px" onclick="document.getElementById('m-file-input').click()">📎 <span id="t-attach-label">Add file</span></button>
      </div>

      <div class="modal-actions">
        <button class="btn btn-outline" id="t-btn-cancel" onclick="closeNewMissionModal()">Cancel</button>
        <button class="btn btn-primary" id="t-btn-save" onclick="saveMission()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const entityIcons = { contract:'📋', invoice:'💼', material:'📦', payment:'💵', payment_schedules:'📅', sales:'🛒', sales_contracts:'📝', sales_payments:'💰', task:'🏗', wa_contacts:'💬', delivery_schedule:'🚚' };

    let missionsData = [];
    let usersCache = {};
    let selectedMission = null;
    let editingMissionId = null;
    let newMissionPriority = 'normal';

    // Self-contained labels for the history panel (avoids touching _i18n.js)
    const HIST_LABELS = {
      ru: { created:'Создано', status:'Статус', assigned:'Исполнитель', due:'Срок', priority:'Приоритет', reopened:'Переоткрыто', edited:'Изменено', edit:'Редактировать', title:'заголовок', description:'описание', title_en:'заголовок (EN)', title_th:'заголовок (TH)', description_en:'описание (EN)', description_th:'описание (TH)' },
      en: { created:'Created', status:'Status', assigned:'Assignee', due:'Due date', priority:'Priority', reopened:'Reopened', edited:'Edited', edit:'Edit', title:'title', description:'description', title_en:'title (EN)', title_th:'title (TH)', description_en:'description (EN)', description_th:'description (TH)' },
      th: { created:'สร้าง', status:'สถานะ', assigned:'ผู้รับผิดชอบ', due:'กำหนดส่ง', priority:'ความสำคัญ', reopened:'เปิดใหม่', edited:'แก้ไข', edit:'แก้ไข', title:'หัวข้อ', description:'คำอธิบาย', title_en:'หัวข้อ (EN)', title_th:'หัวข้อ (TH)', description_en:'คำอธิบาย (EN)', description_th:'คำอธิบาย (TH)' },
    };
    function histT(key) {
      const d = HIST_LABELS[currentLang] || HIST_LABELS.ru;
      return d[key] || HIST_LABELS.ru[key] || key;
    }

    function canEditMission(m) {
      if (!m || typeof currentMe === 'undefined' || !currentMe) return false;
      return currentMe.is_admin === true || m.author_id === currentMe.id;
    }
    let newMissionEntity = null;
    let newMissionWatchers = [];
    let currentTitleLang = 'ru';
    let currentDescLang = 'ru';

    function fmtDateDMY(val) {
      if (!val) return '—';
      const d = new Date(val.value || val);
      if (isNaN(d)) return '—';
      return `${String(d.getUTCDate()).padStart(2,'0')}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${d.getUTCFullYear()}`;
    }

    function showToast(msg, isError) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => el.className = 'toast', 3000);
    }

    function getMissionTitle(m) {
      if (!m) return '';
      // Russian is stored in the base `title` column (no `title_ru` field exists).
      if (currentLang === 'ru') return m.title || m.title_en || m.title_th || '';
      return m['title_' + currentLang] || m.title || m.title_en || m.title_th || '';
    }

    function getMissionDescription(m) {
      if (!m) return '';
      // Russian is stored in the base `description` column (no `description_ru` field exists).
      if (currentLang === 'ru') return m.description || m.description_en || m.description_th || '';
      return m['description_' + currentLang] || m.description || m.description_en || m.description_th || '';
    }

    function getUserName(userId) {
      const u = usersCache[userId];
      if (!u) return '—';
      return u.name || u.email || '—';
    }

    function getEntityIcon(type) {
      return entityIcons[type] || '🔗';
    }

    // --- Data loading ---

    async function loadDashboard() {
      try {
        const [missionsRes, usersRes] = await Promise.all([
          apiFetch(`/missions?view=dashboard&user_id=${currentMe.id}`),
          apiFetch('/users')
        ]);
        missionsData = missionsRes;
        usersRes.forEach(u => { usersCache[u.id] = u; });
        renderMissions();
        populateUserSelects();
      } catch (e) {
        console.error('Failed to load dashboard:', e);
        document.getElementById('missions-list').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${e.message}</div></div>`;
      }
    }

    function populateUserSelects() {
      const users = Object.values(usersCache).filter(u => u.is_active !== false);
      const assigneeSel = document.getElementById('m-assignee');
      const watcherSel = document.getElementById('m-watcher-add');
      assigneeSel.innerHTML = '<option value="">—</option>' + users.map(u => `<option value="${u.id}">${u.name || u.email}</option>`).join('');
      watcherSel.innerHTML = '<option value="">+ Add watcher</option>' + users.map(u => `<option value="${u.id}">${u.name || u.email}</option>`).join('');
    }

    // --- Render groups ---

    function groupMissions(missions) {
      const now = new Date();
      const todayStr = now.toISOString().slice(0, 10);
      const endOfWeek = new Date(now);
      endOfWeek.setDate(endOfWeek.getDate() + (7 - endOfWeek.getDay()));
      const endOfWeekStr = endOfWeek.toISOString().slice(0, 10);

      const groups = {
        overdue: [], today: [], week: [], nodate: [], watching: [], done: []
      };

      missions.forEach(m => {
        // Closed missions (done/cancelled) always go to the collapsed "done" group,
        // regardless of any API-provided group — a cancelled mission must never
        // appear under Overdue/Today even if its due date is in the past.
        if (m.status === 'done' || m.status === 'completed' || m.status === 'cancelled') { groups.done.push(m); return; }
        if (m.group) {
          // API may provide a computed group
          if (groups[m.group]) { groups[m.group].push(m); return; }
        }
        // Fallback: compute client-side
        if (m.is_watching && m.assignee_user_id !== currentMe.id) { groups.watching.push(m); return; }
        if (!m.due_at) { groups.nodate.push(m); return; }
        const due = (m.due_at.value || m.due_at).slice(0, 10);
        if (due < todayStr) { groups.overdue.push(m); return; }
        if (due === todayStr) { groups.today.push(m); return; }
        if (due <= endOfWeekStr) { groups.week.push(m); return; }
        groups.nodate.push(m);
      });

      return groups;
    }

    function renderMissions() {
      const groups = groupMissions(missionsData);
      const container = document.getElementById('missions-list');

      const groupDefs = [
        { key: 'overdue', icon: '🔥', label: t('missionOverdue'), cls: 'overdue', collapsed: false },
        { key: 'today', icon: '📅', label: t('missionToday'), cls: 'today', collapsed: false },
        { key: 'week', icon: '⏰', label: t('missionThisWeek'), cls: 'week', collapsed: false },
        { key: 'nodate', icon: '🌫', label: t('missionNoDate'), cls: 'nodate', collapsed: false },
        { key: 'watching', icon: '👀', label: t('missionWatching'), cls: 'watching', collapsed: true },
        { key: 'done', icon: '✅', label: t('missionDoneToday'), cls: 'done', collapsed: true },
      ];

      const createdTs = (m) => {
        const v = m && m.created_at ? (m.created_at.value || m.created_at) : '';
        return v || '';
      };

      let html = '';
      groupDefs.forEach(gd => {
        const items = groups[gd.key] || [];
        // Sort within each group by creation date (date of entry), oldest first
        items.sort((a, b) => createdTs(a).localeCompare(createdTs(b)));
        html += `<div class="mission-group">
          <div class="mission-group-header ${gd.cls}" onclick="toggleGroup(this)">
            <span class="group-icon">${gd.icon}</span>
            <span>${gd.label}</span>
            <span class="group-count">${items.length}</span>
            <span class="group-toggle">${gd.collapsed ? '▸' : '▾'}</span>
          </div>
          <div class="mission-group-body${gd.collapsed ? ' collapsed' : ''}">`;
        if (items.length === 0) {
          html += `<div style="padding:10px 14px;color:var(--m-muted);font-size:0.82rem">—</div>`;
        } else {
          items.forEach(m => {
            const title = getMissionTitle(m);
            const entityIcon = m.entity_type ? getEntityIcon(m.entity_type) : '';
            const entityName = m.entity_name || '';
            html += `<div class="mission-row" data-mission-id="${m.id}" onclick="openMission('${m.id}')">
              <span class="mission-priority-dot ${m.priority || 'normal'}"></span>
              <span class="mission-title">${escHtml(title)}</span>
              <span class="mission-entity">${entityIcon} ${escHtml(entityName)}</span>
              <span class="mission-due">${fmtDateDMY(m.due_at)}</span>
              <span class="mission-assignee">${escHtml(getUserName(m.assignee_user_id))}</span>
            </div>`;
          });
        }
        html += `</div></div>`;
      });

      container.innerHTML = html;
    }

    function escHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toggleGroup(header) {
      const body = header.nextElementSibling;
      const toggle = header.querySelector('.group-toggle');
      body.classList.toggle('collapsed');
      toggle.textContent = body.classList.contains('collapsed') ? '▸' : '▾';
    }

    // --- Side panel ---

    function openMission(id) {
      const m = missionsData.find(x => x.id === id || x.id === parseInt(id));
      if (!m) return;
      selectedMission = m;

      // Highlight active row
      document.querySelectorAll('.mission-row').forEach(r => r.classList.remove('active'));
      const row = document.querySelector(`.mission-row[data-mission-id="${m.id}"]`);
      if (row) row.classList.add('active');

      const title = getMissionTitle(m);
      document.getElementById('sp-title').textContent = title;

      const body = document.getElementById('sp-body');
      let html = '';

      // Description (main text) — right after the title
      const desc = getMissionDescription(m);
      if (desc) {
        html += `<div class="sp-field sp-description">
          <div style="white-space:pre-wrap;word-break:break-word;font-size:0.9rem;line-height:1.45">${escHtml(desc)}</div>
        </div>`;
      }

      // Status
      html += `<div class="sp-field">
        <label>${t('missionStatus')}</label>
        <select id="sp-status" onchange="changeStatus(this.value)">
          <option value="open"${m.status==='open'?' selected':''}>${t('statusOpen')}</option>
          <option value="in_progress"${m.status==='in_progress'?' selected':''}>${t('statusInProgress')}</option>
          <option value="blocked"${m.status==='blocked'?' selected':''}>${t('statusBlocked')}</option>
          <option value="done"${m.status==='done'?' selected':''}>${t('statusDone')}</option>
          <option value="cancelled"${m.status==='cancelled'?' selected':''}>${t('statusCancelled')}</option>
        </select>
      </div>`;

      // Priority
      html += `<div class="sp-field">
        <label>${t('missionPriority')}</label>
        <select id="sp-priority" onchange="changePriority(this.value)">
          <option value="low"${m.priority==='low'?' selected':''}>${t('priorityLow')}</option>
          <option value="normal"${m.priority==='normal'?' selected':''}>${t('priorityNormal')}</option>
          <option value="high"${m.priority==='high'?' selected':''}>${t('priorityHigh')}</option>
          <option value="urgent"${m.priority==='urgent'?' selected':''}>${t('priorityUrgent')}</option>
        </select>
      </div>`;

      // Due date
      html += `<div class="sp-field">
        <label>${t('missionDueDate')}</label>
        <input type="date" id="sp-due" value="${m.due_at ? (m.due_at.value || m.due_at).slice(0,10) : ''}" lang="en-GB" onchange="changeDue(this.value)">
      </div>`;

      // Assignee
      html += `<div class="sp-field">
        <label>${t('missionAssignee')}</label>
        <div>${escHtml(getUserName(m.assignee_user_id))}</div>
      </div>`;

      // Watchers
      const watcherNames = (m.watchers || []).map(w => getUserName(w.user_id || w)).join(', ');
      html += `<div class="sp-field">
        <label>${t('missionWatchers')}</label>
        <div>${watcherNames || '—'}</div>
      </div>`;

      // Linked entity
      if (m.entity_type && m.entity_id) {
        const icon = getEntityIcon(m.entity_type);
        html += `<div class="sp-field">
          <label>${t('missionLinkedTo')}</label>
          <div>${icon} ${escHtml(m.entity_name || m.entity_type + ' #' + m.entity_id)}</div>
        </div>`;
      }

      // Sub-missions
      html += `<div class="sp-field">
        <div class="collapsible-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">${t('missionSubMissions')} ▾</div>
        <div id="sp-sub-missions"></div>
      </div>`;

      // Comments
      html += `<div class="sp-field">
        <label>${t('missionComments')}</label>
        <div id="sp-comments"><div style="color:var(--m-muted);font-size:0.82rem">${t('loading')}</div></div>
        <div class="comment-form">
          <input type="text" id="sp-comment-input" placeholder="${t('addComment')}">
          <button onclick="postComment()">${t('sendBtn')}</button>
        </div>
      </div>`;

      // History (collapsed)
      html += `<div class="sp-field">
        <div class="collapsible-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
          ${t('missionHistory')} ▸
        </div>
        <div class="collapsible-body collapsed" id="sp-history"><div style="color:var(--m-muted);font-size:0.82rem">${t('loading')}</div></div>
      </div>`;

      body.innerHTML = html;

      // Actions
      const actions = document.getElementById('sp-actions');
      let actHtml = '';
      if (m.status !== 'done' && m.status !== 'cancelled') {
        actHtml += `<button class="btn-done" onclick="setMissionStatus('done')">✓ ${t('missionDone')}</button>`;
        actHtml += `<button class="btn-block" onclick="setMissionStatus('blocked')">⏸ ${t('missionBlock')}</button>`;
        actHtml += `<button class="btn-cancel-m" onclick="setMissionStatus('cancelled')">✕ ${t('missionCancel')}</button>`;
      } else {
        actHtml += `<button class="btn-reopen" onclick="setMissionStatus('open')">↺ ${t('missionReopen')}</button>`;
      }
      if (canEditMission(m)) {
        actHtml += `<button onclick="openEditMissionModal()" style="background:#eef1f8;border:1px solid #c9d2e3;color:#2b3a55;border-radius:6px;padding:7px 12px;cursor:pointer;font-size:0.85rem">✎ ${histT('edit')}</button>`;
      }
      actions.innerHTML = actHtml;

      document.getElementById('sp-overlay').style.display = 'block';
      document.getElementById('side-panel').classList.add('open');

      // Load comments and history
      loadComments(m.id);
      loadSubMissions(m.id);
      loadHistory(m.id);
    }

    function closeSidePanel() {
      document.getElementById('sp-overlay').style.display = 'none';
      document.getElementById('side-panel').classList.remove('open');
      document.querySelectorAll('.mission-row').forEach(r => r.classList.remove('active'));
      selectedMission = null;
    }

    async function loadComments(missionId) {
      try {
        const comments = await apiFetch(`/mission_comments?mission_id=${missionId}`);
        const el = document.getElementById('sp-comments');
        if (!comments.length) { el.innerHTML = `<div style="color:var(--m-muted);font-size:0.82rem">${t('noComments')}</div>`; return; }
        el.innerHTML = comments.map(c => `<div class="comment-item">
          <span class="comment-author">${escHtml(getUserName(c.author_id))}</span>
          <span class="comment-date">${fmtDateDMY(c.created_at)}</span>
          <div class="comment-body">${escHtml(c.body || c.text || '')}</div>
        </div>`).join('');
      } catch (e) {
        document.getElementById('sp-comments').innerHTML = `<div style="color:var(--m-red);font-size:0.82rem">${e.message}</div>`;
      }
    }

    async function loadSubMissions(missionId) {
      try {
        const subs = await apiFetch(`/missions?parent_id=${missionId}`);
        const el = document.getElementById('sp-sub-missions');
        if (!subs.length) { el.innerHTML = '<div style="color:var(--m-muted);font-size:0.82rem">—</div>'; return; }
        el.innerHTML = subs.map(s => `<div class="sub-mission-row" onclick="openMission('${s.id}')">
          <span class="mission-priority-dot ${s.priority || 'normal'}"></span>
          <span>${escHtml(getMissionTitle(s))}</span>
        </div>`).join('');
      } catch (e) {
        document.getElementById('sp-sub-missions').innerHTML = '—';
      }
    }

    function eventLabel(ev) {
      let p = {};
      try { p = typeof ev.payload === 'string' ? JSON.parse(ev.payload || '{}') : (ev.payload || {}); } catch (e) {}
      const dpart = s => (s ? String(s).slice(0, 10) : '—');
      switch (ev.event_type) {
        case 'created':          return histT('created');
        case 'status_changed':   return `${histT('status')}: ${p.from || '—'} → ${p.to || '—'}`;
        case 'assigned':         return `${histT('assigned')}: ${getUserName(p.to) || '—'}`;
        case 'due_changed':      return `${histT('due')}: ${dpart(p.from)} → ${dpart(p.to)}`;
        case 'priority_changed': return `${histT('priority')}: ${p.from || '—'} → ${p.to || '—'}`;
        case 'reopened':         return histT('reopened');
        case 'edited':           return `${histT('edited')}: ${(p.fields || []).map(f => histT(f)).join(', ')}`;
        default:                 return ev.event_type;
      }
    }

    async function loadHistory(missionId) {
      const el = document.getElementById('sp-history');
      try {
        const events = await apiFetch(`/missions/${missionId}/events`);
        if (!events.length) { el.innerHTML = '<div style="color:var(--m-muted);font-size:0.82rem">—</div>'; return; }
        el.innerHTML = events.map(ev => `<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:0.82rem">
          <div>${escHtml(eventLabel(ev))}</div>
          <div style="color:var(--m-muted);font-size:0.74rem">${escHtml(ev.actor_name || '')} · ${fmtDateDMY(ev.created_at)}</div>
        </div>`).join('');
      } catch (e) {
        el.innerHTML = `<div style="color:var(--m-red);font-size:0.82rem">${escHtml(e.message)}</div>`;
      }
    }

    async function postComment() {
      if (!selectedMission) return;
      const input = document.getElementById('sp-comment-input');
      const text = input.value.trim();
      if (!text) return;
      try {
        await apiFetch('/mission_comments', {
          method: 'POST',
          body: JSON.stringify({ mission_id: selectedMission.id, body: text })
        });
        input.value = '';
        loadComments(selectedMission.id);
      } catch (e) { showToast(e.message, true); }
    }

    async function changeStatus(val) {
      if (!selectedMission) return;
      try {
        await apiFetch(`/missions/${selectedMission.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status: val })
        });
        selectedMission.status = val;
        showToast(t('statusUpdated'));
      } catch (e) { showToast(e.message, true); }
    }

    async function changePriority(val) {
      if (!selectedMission) return;
      try {
        await apiFetch(`/missions/${selectedMission.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ priority: val })
        });
        selectedMission.priority = val;
        showToast(t('priorityUpdated'));
      } catch (e) { showToast(e.message, true); }
    }

    async function changeDue(val) {
      if (!selectedMission) return;
      try {
        await apiFetch(`/missions/${selectedMission.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ due_at: val || null })
        });
        selectedMission.due_at = val || null;
        showToast(t('dueUpdated'));
      } catch (e) { showToast(e.message, true); }
    }

    async function setMissionStatus(status) {
      if (!selectedMission) return;
      let body = { status };

      if (status === 'blocked') {
        const reason = prompt(t('missionBlockReason'));
        if (reason === null) return;
        body.block_reason = reason;
        // Also post a comment
        if (reason) {
          try { await apiFetch('/mission_comments', { method: 'POST', body: JSON.stringify({ mission_id: selectedMission.id, body: '⏸ ' + reason }) }); } catch(e) {}
        }
      }
      if (status === 'cancelled') {
        const reason = prompt(t('missionCancelReason'));
        if (reason === null) return;
        body.completion_note = reason;
      }

      try {
        await apiFetch(`/missions/${selectedMission.id}`, {
          method: 'PATCH',
          body: JSON.stringify(body)
        });
        showToast(t('statusUpdated'));
        closeSidePanel();
        loadDashboard();
      } catch (e) { showToast(e.message, true); }
    }

    // --- Create Mission modal ---

    function openNewMissionModal() {
      editingMissionId = null;
      document.getElementById('modal-new-mission').classList.add('open');
      document.getElementById('t-modal-title').textContent = t('missionNew');
      // Watchers + TG-notify only apply when creating a new mission
      document.getElementById('mf-watchers').style.display = '';
      document.getElementById('mf-notify').style.display = 'flex';
      // Files attach to an existing mission only — hide until the mission is saved
      document.getElementById('mf-files').style.display = 'none';
      // Reset form
      ['m-title-ru','m-title-en','m-title-th','m-desc-ru','m-desc-en','m-desc-th','m-due-date','m-entity-search'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      // Default due date = tomorrow (local time, no UTC shift)
      const tmr = new Date();
      tmr.setDate(tmr.getDate() + 1);
      const dueEl = document.getElementById('m-due-date');
      if (dueEl) dueEl.value = `${tmr.getFullYear()}-${String(tmr.getMonth() + 1).padStart(2, '0')}-${String(tmr.getDate()).padStart(2, '0')}`;
      // Default assignee = current user (author)
      document.getElementById('m-assignee').value = (typeof currentMe !== 'undefined' && currentMe) ? currentMe.id : '';
      newMissionPriority = 'normal';
      newMissionEntity = null;
      newMissionWatchers = [];
      updatePriorityButtons();
      renderWatcherChips();
      document.getElementById('m-entity-selected').innerHTML = '';
      document.getElementById('m-entity-results').style.display = 'none';
    }

    window._openMissionModal = openNewMissionModal;

    function openEditMissionModal() {
      const m = selectedMission;
      if (!m) return;
      if (!canEditMission(m)) { showToast(t('accessDenied') || 'Forbidden', true); return; }
      editingMissionId = m.id;
      document.getElementById('modal-new-mission').classList.add('open');
      document.getElementById('t-modal-title').textContent = histT('edit');
      // Pre-fill fields from the mission
      document.getElementById('m-title-ru').value = m.title || '';
      document.getElementById('m-title-en').value = m.title_en || '';
      document.getElementById('m-title-th').value = m.title_th || '';
      document.getElementById('m-desc-ru').value  = m.description || '';
      document.getElementById('m-desc-en').value  = m.description_en || '';
      document.getElementById('m-desc-th').value  = m.description_th || '';
      newMissionPriority = m.priority || 'normal';
      updatePriorityButtons();
      const dueEl = document.getElementById('m-due-date');
      dueEl.value = m.due_at ? (m.due_at.value || m.due_at).slice(0, 10) : '';
      document.getElementById('m-assignee').value = m.assignee_user_id || m.assignee_id || '';
      if (m.entity_type && m.entity_id) {
        newMissionEntity = { entity_type: m.entity_type, entity_id: m.entity_id };
        document.getElementById('m-entity-selected').innerHTML =
          `<span style="font-size:0.84rem">${getEntityIcon(m.entity_type)} ${escHtml(m.entity_name || (m.entity_type + ' #' + m.entity_id))} <span style="cursor:pointer;color:var(--m-red)" onclick="clearEntity()">✕</span></span>`;
      } else {
        newMissionEntity = null;
        document.getElementById('m-entity-selected').innerHTML = '';
      }
      document.getElementById('m-entity-results').style.display = 'none';
      // Watchers + TG-notify are not editable via PATCH — hide in edit mode
      document.getElementById('mf-watchers').style.display = 'none';
      document.getElementById('mf-notify').style.display = 'none';
      // Files — available for an existing mission
      document.getElementById('mf-files').style.display = '';
      document.getElementById('m-file-input').value = '';
      loadMissionFiles(editingMissionId);
      switchTitleLang('ru');
      switchDescLang('ru');
    }

    function closeNewMissionModal() {
      editingMissionId = null;
      document.getElementById('modal-new-mission').classList.remove('open');
    }

    // --- Mission file attachments (edit mode only) ---

    async function loadMissionFiles(missionId) {
      const el = document.getElementById('m-files-list');
      if (!missionId) { el.innerHTML = ''; return; }
      try {
        const files = await apiFetch(`/mission_files?mission_id=${missionId}`);
        renderMissionFiles(files);
      } catch (e) {
        el.innerHTML = `<div style="color:var(--m-red);font-size:0.8rem">${escHtml(e.message)}</div>`;
      }
    }

    function renderMissionFiles(files) {
      const el = document.getElementById('m-files-list');
      if (!files || !files.length) {
        el.innerHTML = '<div style="color:#bbb;font-size:0.82rem">—</div>';
        return;
      }
      el.innerHTML = files.map(f => {
        const fs = f.file_size > 1048576 ? (f.file_size/1048576).toFixed(1)+' MB' : Math.round((f.file_size||0)/1024)+' KB';
        const isPdf = (f.file_name || '').toLowerCase().endsWith('.pdf');
        const isImg = /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(f.file_name || '');
        const canPreview = isPdf || isImg;
        const previewAction = isPdf ? 'view-pdf' : 'view-image';
        return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:0.84rem;border-bottom:1px solid #f0f0f0">
          ${canPreview ? `<button type="button" style="background:none;border:none;cursor:pointer;font-size:1rem;padding:0" title="${isPdf ? 'PDF' : 'IMG'}" data-mfaction="${previewAction}" data-file-id="${f.id}">👁</button>` : '<span style="width:1rem;display:inline-block"></span>'}
          <span style="flex:1;color:#333">${isPdf ? '📄' : (isImg ? '🖼' : '📎')} ${escHtml(f.file_name || '—')} <span style="color:#999">(${fs})</span></span>
          <button type="button" class="btn btn-outline" style="padding:1px 7px;font-size:0.72rem" data-mfaction="download-file" data-file-id="${f.id}">${t('download')}</button>
          <button type="button" class="btn btn-outline" style="padding:1px 7px;font-size:0.72rem;color:#c5221f" data-mfaction="delete-file" data-file-id="${f.id}">×</button>
        </div>`;
      }).join('');
    }

    async function uploadMissionFiles() {
      const input = document.getElementById('m-file-input');
      const files = Array.from(input.files || []);
      if (!files.length || !editingMissionId) return;
      showToast(t('uploading'));
      for (const file of files) {
        try {
          const contentType = file.type || 'application/octet-stream';
          const { upload_url, file_url } = await apiFetch('/mission_files/signed-upload-url', {
            method: 'POST',
            body: JSON.stringify({ mission_id: editingMissionId, file_name: file.name, content_type: contentType }),
          });
          await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('PUT', upload_url);
            xhr.setRequestHeader('Content-Type', contentType);
            xhr.onload = () => xhr.status === 200 ? resolve() : reject(new Error('Upload failed'));
            xhr.onerror = () => reject(new Error('Upload error'));
            xhr.send(file);
          });
          await apiFetch('/mission_files', {
            method: 'POST',
            body: JSON.stringify({ mission_id: editingMissionId, file_name: file.name, file_url, file_size: file.size }),
          });
        } catch (e) { showToast(e.message, true); }
      }
      input.value = '';
      showToast(t('uploaded'));
      loadMissionFiles(editingMissionId);
    }

    function showImageLightbox(url) {
      let lb = document.getElementById('image-lightbox');
      if (!lb) {
        lb = document.createElement('div');
        lb.id = 'image-lightbox';
        lb.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:400;display:flex;align-items:center;justify-content:center;cursor:pointer';
        lb.innerHTML = '<img style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.5)">';
        lb.addEventListener('click', () => lb.style.display = 'none');
        document.body.appendChild(lb);
      }
      lb.querySelector('img').src = url;
      lb.style.display = 'flex';
    }

    document.getElementById('m-file-input').addEventListener('change', uploadMissionFiles);
    document.getElementById('m-files-list').addEventListener('click', async e => {
      const btn = e.target.closest('[data-mfaction]');
      if (!btn) return;
      const act = btn.dataset.mfaction;
      const fileId = btn.dataset.fileId;
      try {
        if (act === 'view-pdf') {
          const r = await apiFetch(`/mission_files/${fileId}/signed-download-url?view=true`);
          if (r.url) openPdfViewer(r.url, 'PDF');
        } else if (act === 'view-image') {
          const r = await apiFetch(`/mission_files/${fileId}/signed-download-url?view=true`);
          if (r.url) showImageLightbox(r.url);
        } else if (act === 'download-file') {
          const r = await apiFetch(`/mission_files/${fileId}/signed-download-url`);
          if (r.url) window.open(r.url, '_blank');
        } else if (act === 'delete-file') {
          if (!confirm(t('confirmDelete'))) return;
          await apiFetch(`/mission_files/${fileId}`, { method: 'DELETE' });
          loadMissionFiles(editingMissionId);
        }
      } catch (err) { showToast(err.message, true); }
    });

    function switchTitleLang(lang) {
      currentTitleLang = lang;
      ['ru','en','th'].forEach(l => {
        document.getElementById('m-title-' + l).style.display = l === lang ? 'block' : 'none';
      });
      document.querySelectorAll('#title-lang-tabs button').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });
    }

    function switchDescLang(lang) {
      currentDescLang = lang;
      ['ru','en','th'].forEach(l => {
        document.getElementById('m-desc-' + l).style.display = l === lang ? 'block' : 'none';
      });
      document.querySelectorAll('#desc-lang-tabs button').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });
    }

    function setPriority(p) {
      newMissionPriority = p;
      updatePriorityButtons();
    }

    function updatePriorityButtons() {
      document.querySelectorAll('#priority-selector button').forEach(b => {
        b.classList.toggle('active', b.dataset.p === newMissionPriority);
      });
    }

    async function translateTitle() {
      const ru = document.getElementById('m-title-ru').value;
      const en = document.getElementById('m-title-en').value;
      const source = ru || en;
      if (!source) return;
      const srcLang = ru ? 'ru' : 'en';
      const targetLangs = ['ru','en','th'].filter(l => l !== srcLang);
      try {
        const res = await apiFetch('/translate', {
          method: 'POST',
          body: JSON.stringify({ text: source, source_lang: srcLang, target_langs: targetLangs })
        });
        const tr = res.translations || res;
        if (tr.en) document.getElementById('m-title-en').value = tr.en;
        if (tr.ru) document.getElementById('m-title-ru').value = tr.ru;
        if (tr.th) document.getElementById('m-title-th').value = tr.th;
      } catch (e) { showToast(t('translationFailed'), true); }
    }

    async function translateDesc() {
      const ru = document.getElementById('m-desc-ru').value;
      const en = document.getElementById('m-desc-en').value;
      const source = ru || en;
      if (!source) return;
      const srcLang = ru ? 'ru' : 'en';
      const targetLangs = ['ru','en','th'].filter(l => l !== srcLang);
      try {
        const res = await apiFetch('/translate', {
          method: 'POST',
          body: JSON.stringify({ text: source, source_lang: srcLang, target_langs: targetLangs })
        });
        const tr = res.translations || res;
        if (tr.en) document.getElementById('m-desc-en').value = tr.en;
        if (tr.ru) document.getElementById('m-desc-ru').value = tr.ru;
        if (tr.th) document.getElementById('m-desc-th').value = tr.th;
      } catch (e) { showToast(t('translationFailed'), true); }
    }

    // Entity search
    let entitySearchTimer = null;
    document.addEventListener('DOMContentLoaded', () => {
      const esInput = document.getElementById('m-entity-search');
      if (esInput) {
        esInput.addEventListener('input', () => {
          clearTimeout(entitySearchTimer);
          entitySearchTimer = setTimeout(() => searchEntity(esInput.value), 300);
        });
      }

      const watcherSel = document.getElementById('m-watcher-add');
      if (watcherSel) {
        watcherSel.addEventListener('change', () => {
          const uid = watcherSel.value;
          if (uid && !newMissionWatchers.includes(uid)) {
            newMissionWatchers.push(uid);
            renderWatcherChips();
          }
          watcherSel.value = '';
        });
      }
    });

    async function searchEntity(q) {
      const resultsEl = document.getElementById('m-entity-results');
      if (!q || q.length < 2) { resultsEl.style.display = 'none'; return; }
      try {
        const results = await apiFetch(`/search?q=${encodeURIComponent(q)}&limit=10`);
        if (!results.length) { resultsEl.style.display = 'none'; return; }
        resultsEl.style.display = 'block';
        resultsEl.innerHTML = results.map(r => `
          <div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:0.84rem"
               onmouseover="this.style.background='#f0f4ff'" onmouseout="this.style.background=''"
               onclick="selectEntity('${r.entity_type}','${r.entity_id}','${escHtml(r.name || r.title || '')}')">
            ${getEntityIcon(r.entity_type)} ${escHtml(r.name || r.title || r.entity_type + ' #' + r.entity_id)}
          </div>
        `).join('');
      } catch (e) { resultsEl.style.display = 'none'; }
    }

    function selectEntity(type, id, name) {
      newMissionEntity = { entity_type: type, entity_id: id };
      document.getElementById('m-entity-selected').innerHTML = `<span style="font-size:0.84rem">${getEntityIcon(type)} ${name} <span style="cursor:pointer;color:var(--m-red)" onclick="clearEntity()">✕</span></span>`;
      document.getElementById('m-entity-results').style.display = 'none';
      document.getElementById('m-entity-search').value = '';
    }

    function clearEntity() {
      newMissionEntity = null;
      document.getElementById('m-entity-selected').innerHTML = '';
    }

    function renderWatcherChips() {
      const el = document.getElementById('m-watchers-list');
      el.innerHTML = newMissionWatchers.map(uid => `
        <span class="watcher-chip">${escHtml(getUserName(uid))} <span class="remove-watcher" onclick="removeWatcher('${uid}')">×</span></span>
      `).join('');
    }

    function removeWatcher(uid) {
      newMissionWatchers = newMissionWatchers.filter(w => w !== uid);
      renderWatcherChips();
    }

    async function saveMission() {
      const payload = {
        title_ru: document.getElementById('m-title-ru').value,
        title_en: document.getElementById('m-title-en').value,
        title_th: document.getElementById('m-title-th').value,
        description_ru: document.getElementById('m-desc-ru').value,
        description_en: document.getElementById('m-desc-en').value,
        description_th: document.getElementById('m-desc-th').value,
        priority: newMissionPriority,
        due_at: document.getElementById('m-due-date').value || null,
        assignee_user_id: document.getElementById('m-assignee').value || null,
        watcher_user_ids: newMissionWatchers,
        notify_assignee_tg: document.getElementById('m-notify-tg-assignee').checked,
        notify_watchers_tg: document.getElementById('m-notify-tg-watchers').checked,
      };
      if (newMissionEntity) {
        payload.entity_type = newMissionEntity.entity_type;
        payload.entity_id = newMissionEntity.entity_id;
      }
      if (!payload.title_ru && !payload.title_en && !payload.title_th) {
        showToast(t('titleRequired'), true);
        return;
      }
      try {
        if (editingMissionId) {
          // Edit mode → PATCH only the editable content fields
          const patch = {
            title_ru: payload.title_ru, title_en: payload.title_en, title_th: payload.title_th,
            description_ru: payload.description_ru, description_en: payload.description_en, description_th: payload.description_th,
            priority: payload.priority,
            due_at: payload.due_at,
            assignee_user_id: payload.assignee_user_id,
          };
          if (newMissionEntity) {
            patch.entity_type = newMissionEntity.entity_type;
            patch.entity_id = newMissionEntity.entity_id;
          } else {
            patch.entity_type = '';
            patch.entity_id = '';
          }
          const editedId = editingMissionId;
          await apiFetch(`/missions/${editedId}`, { method: 'PATCH', body: JSON.stringify(patch) });
          showToast(t('saved'));
          closeNewMissionModal();
          await loadDashboard();
          if (missionsData.find(x => x.id === editedId)) openMission(editedId);
          return;
        }
        await apiFetch('/missions', { method: 'POST', body: JSON.stringify(payload) });
        showToast(t('saved'));
        closeNewMissionModal();
        loadDashboard();
      } catch (e) { showToast(e.message, true); }
    }

    function updateTexts() {
      updateHeaderTexts();
      const nbtn = document.getElementById('btn-new-mission'); if (nbtn) nbtn.textContent = '+ ' + t('taskSingular');
      document.getElementById('t-guest-title').textContent  = t('guestTitle');
      document.getElementById('t-guest-sub').textContent    = t('guestSub');
      document.getElementById('t-modal-title').textContent  = t('missionNew');
      document.getElementById('t-lbl-title').textContent    = t('name');
      document.getElementById('t-lbl-desc').textContent     = t('description');
      document.getElementById('t-lbl-priority').textContent = t('missionPriority');
      document.getElementById('t-lbl-due').textContent      = t('missionDueDate');
      document.getElementById('t-lbl-entity').textContent   = t('missionLinkedTo');
      document.getElementById('t-lbl-assignee').textContent = t('missionAssignee');
      document.getElementById('t-lbl-watchers').textContent = t('missionWatchers');
      document.getElementById('t-btn-cancel').textContent   = t('cancel');
      document.getElementById('t-btn-save').textContent     = t('save');
      // Modal priority selector buttons
      const prMap = { low: 'priorityLow', normal: 'priorityNormal', high: 'priorityHigh', urgent: 'priorityUrgent' };
      document.querySelectorAll('#priority-selector button').forEach(b => {
        const k = prMap[b.dataset.p];
        if (k) b.textContent = t(k);
      });
      // Notify-TG labels + entity search placeholder
      const naEl = document.getElementById('t-notify-assignee'); if (naEl) naEl.textContent = t('notifyAssigneeTg');
      const nwEl = document.getElementById('t-notify-watchers'); if (nwEl) nwEl.textContent = t('notifyWatchersTg');
      const esEl = document.getElementById('m-entity-search'); if (esEl) esEl.placeholder = t('search') + '...';
      const mlEl = document.getElementById('t-missions-loading'); if (mlEl) mlEl.textContent = t('loading');
      const lf = document.getElementById('t-lbl-files'); if (lf) lf.textContent = t('file');
      const al = document.getElementById('t-attach-label'); if (al) al.textContent = t('addFile');
      if (missionsData.length) renderMissions();
    }

    window.onLangChange = () => updateTexts();

    // --- Init ---

    renderHeader('missions');
    updateTexts();

    document.getElementById('btn-new-mission').addEventListener('click', openNewMissionModal);

    function onLogin() {
      loadDashboard();
      updateTexts();
      // Check if navigated with ?action=new
      const params = new URLSearchParams(window.location.search);
      if (params.get('action') === 'new') {
        setTimeout(openNewMissionModal, 300);
      }
    }
  </script>
</body>
</html>
